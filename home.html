<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI算力投研工具</title>
<style>
:root { --bg: #0f1117; --card: #1a1d2e; --border: #2a2f45; --text: #e0e4f0; --muted: #7b8299; --blue: #3b82f6; --green: #10b981; --purple: #8b5cf6; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system,'PingFang SC',sans-serif; background:var(--bg); color:var(--text); display:flex; align-items:center; justify-content:center; min-height:100vh; }
.container { text-align:center; }
.container h1 { font-size:28px; margin-bottom:8px; background:linear-gradient(135deg,var(--blue),var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.container p { color:var(--muted); margin-bottom:32px; font-size:14px; }
.links { display:flex; gap:16px; justify-content:center; flex-wrap:wrap; }
.link-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:24px 32px; text-decoration:none; color:var(--text); transition:all 0.2s; min-width:200px; }
.link-card:hover { border-color:var(--blue); transform:translateY(-2px); }
.link-card .icon { font-size:32px; margin-bottom:12px; }
.link-card .title { font-size:15px; font-weight:600; }
.link-card .desc { font-size:11px; color:var(--muted); margin-top:6px; }
</style>
</head>
<body>
<div class="container">
  <h1>AI算力产业链投研工具</h1>
  <p>产业看板 · 客户情报 · 投研数据</p>
  <div class="links">
    <a href="index.html" class="link-card">
      <div class="icon">🔬</div>
      <div class="title">AI算力产业看板</div>
      <div class="desc">14赛道 · 27标的 · 11 BOM</div>
    </a>
    <a href="customer-intel.html" class="link-card">
      <div class="icon">📊</div>
      <div class="title">客户情报看板</div>
      <div class="desc">22家核心客户 · 情报追踪</div>
    </a>
  </div>
</div>
</body>
</html>
