<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;--surface3:#243049;
--text:#e5e7eb;--text2:#9ca3af;--text3:#6b7280;
--accent:#3b82f6;--accent2:#60a5fa;--gold:#f59e0b;--green:#10b981;--red:#ef4444;--purple:#8b5cf6;
--border:#1e293b;--border2:#334155;

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);font-size:13px;overflow:hidden;height:100vh}
a{color:var(--accent2);text-decoration:none}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

.layout{display:flex;height:100vh;width:100vw}
#sidebar{width:var(--nav-w);min-width:var(--nav-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:10}
#sidebar .logo{padding:20px 16px 12px;border-bottom:1px solid var(--border)}
#sidebar .logo h1{font-size:16px;color:var(--gold);font-weight:700;letter-spacing:1px}
#sidebar .logo p{font-size:11px;color:var(--text3);margin-top:4px}
#sidebar nav{flex:1;padding:8px 0}
#sidebar nav .nav-item{display:flex;align-items:center;gap:10px;padding:11px 18px;cursor:pointer;color:var(--text2);transition:all .15s;font-size:13px;border-left:3px solid transparent}
#sidebar nav .nav-item:hover{background:var(--surface2);color:var(--text)}
#sidebar nav .nav-item.active{background:var(--surface2);color:var(--accent2);border-left-color:var(--accent)}
#sidebar nav .nav-item .icon{font-size:16px;width:22px;text-align:center}
#sidebar .sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);font-size:10px;color:var(--text3)}

#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#dashboard-summary{background:var(--surface);border-bottom:1px solid var(--border);overflow:visible;flex-shrink:0}
#detail-area{flex:1;overflow-y:auto;padding:16px 20px}

#right-panel{width:var(--right-w);min-width:var(--right-w);background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column}
#right-search{padding:10px 12px;border-bottom:1px solid var(--border)}
#right-search input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:7px 10px 7px 30px;color:var(--text);font-size:12px;outline:none}
#right-search input:focus{border-color:var(--accent)}
#right-search{position:relative}
#right-search::before{content:'🔍';position:absolute;left:20px;top:50%;transform:translateY(-50%);font-size:12px}

#price-scroll{flex:40;overflow-y:auto}
.right-section-title{padding:10px 14px 6px;font-size:12px;font-weight:600;color:var(--text2);letter-spacing:1px;position:sticky;top:0;background:var(--surface);z-index:2}

.stats-bar{display:flex;gap:0;padding:10px 16px;flex-wrap:wrap;align-items:center}
.stat-chip{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:12px;display:flex;align-items:center;gap:6px;margin:3px 4px}
.stat-chip .num{color:var(--gold);font-weight:700;font-size:15px}
.stat-chip .label{color:var(--text2)}

.flow-tree-wrap{padding:8px 16px 12px;overflow-x:auto}
.flow-tree{display:flex;align-items:stretch;gap:0;min-width:800px;position:relative}
.flow-col{display:flex;flex-direction:column;gap:6px;align-items:center;flex-shrink:0}
.flow-col-label{font-size:10px;color:var(--text3);margin-bottom:4px;font-weight:600;letter-spacing:1px}
.flow-node{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:8px 10px;cursor:pointer;transition:all .15s;min-width:110px;text-align:center;position:relative}
.flow-node:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 2px 8px rgba(59,130,246,.2)}
.flow-node.active{border-color:var(--gold);box-shadow:0 0 12px rgba(245,158,11,.15)}
.flow-node .fn-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px}
.flow-node .fn-score{font-size:18px;font-weight:800;margin-bottom:4px}
.flow-node .fn-bars{display:flex;gap:2px;justify-content:center}
.fn-bar{width:28px;height:4px;border-radius:2px}
.fn-bar.g{background:var(--green)}.fn-bar.p{background:var(--gold)}.fn-bar.b{background:var(--purple)}
.flow-arrow{display:flex;align-items:center;justify-content:center;padding:0 6px;color:var(--text3);font-size:20px;flex-shrink:0}

.top5-row{display:flex;gap:8px;padding:4px 16px 10px;overflow-x:auto}
.top5-card{background:linear-gradient(135deg,#1a1f35,#1e293b);border:1px solid var(--gold);border-radius:8px;padding:8px 12px;min-width:130px;cursor:pointer;flex-shrink:0;transition:all .15s}
.top5-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(245,158,11,.15)}
.top5-card .t5-name{font-size:12px;font-weight:600;color:var(--gold)}
.top5-card .t5-score{font-size:16px;font-weight:800;color:var(--text)}

.stocks-row{display:flex;gap:6px;padding:2px 16px 10px;overflow-x:auto}
.stock-mini{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;min-width:100px;cursor:pointer;flex-shrink:0;transition:all .15s;text-align:center}
.stock-mini:hover{border-color:var(--accent)}
.stock-mini .sm-name{font-size:11px;color:var(--text);font-weight:600}
.stock-mini .sm-peg{font-size:14px;font-weight:700}
.stock-mini .sm-sector{font-size:10px;color:var(--text3)}
.peg-low{color:var(--green)}.peg-mid{color:var(--gold)}.peg-high{color:var(--red)}

.detail-section{margin-bottom:20px}
.detail-section h2{font-size:16px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.detail-section h3{font-size:14px;font-weight:600;color:var(--text2);margin:12px 0 8px}

.sector-table{width:100%;border-collapse:collapse}
.sector-table th{text-align:left;padding:8px 10px;font-size:11px;color:var(--text3);border-bottom:1px solid var(--border);font-weight:600}
.sector-table td{padding:7px 10px;border-bottom:1px solid var(--border);font-size:12px}
.sector-table tr{cursor:pointer;transition:background .1s}
.sector-table tr:hover{background:var(--surface2)}
.score-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-weight:700;font-size:12px}
.score-high{background:rgba(16,185,129,.15);color:var(--green)}
.score-mid{background:rgba(245,158,11,.15);color:var(--gold)}
.score-low{background:rgba(156,163,175,.15);color:var(--text2)}
.risk-badge{font-size:10px;padding:2px 6px;border-radius:4px}
.risk-high{background:rgba(239,68,68,.15);color:var(--red)}
.risk-medium{background:rgba(245,158,11,.15);color:var(--gold)}
.risk-low{background:rgba(16,185,129,.15);color:var(--green)}
.layer-badge{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:600}
.layer-up{background:rgba(139,92,246,.15);color:var(--purple)}
.layer-mid{background:rgba(59,130,246,.15);color:var(--accent)}
.layer-sup{background:rgba(245,158,11,.15);color:var(--gold)}
.layer-down{background:rgba(16,185,129,.15);color:var(--green)}

.score-bars{display:flex;gap:3px;align-items:center}
.sb{height:8px;border-radius:2px;min-width:4px}

.sector-detail{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:16px}
.sector-detail h2{font-size:18px;margin-bottom:10px}
.sd-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.sd-card{background:var(--surface2);border-radius:8px;padding:12px 14px}
.sd-card h4{font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:600;letter-spacing:.5px}

.stock-tab{padding:8px 16px;font-size:12px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .12s}
.stock-tab.active{color:var(--accent2);border-bottom-color:var(--accent)}
.stock-tab:hover{color:var(--text)}
.stock-content{font-size:13px;color:var(--text2);line-height:1.7}

.news-item:hover{background:var(--surface2)}
.news-item .ni-time{font-size:10px;color:var(--text3)}

.news-item .ni-summary{font-size:11px;color:var(--text3);line-height:1.4;display:none}
.news-item:hover .ni-summary{display:block}
.news-item .ni-badges{display:flex;gap:4px;margin-top:4px}
.source-badge{font-size:9px;padding:1px 6px;border-radius:3px;font-weight:600}
.src-research{background:rgba(59,130,246,.15);color:var(--accent2)}
.src-media{background:rgba(16,185,129,.15);color:var(--green)}
.src-policy{background:rgba(239,68,68,.15);color:var(--red)}
.src-company{background:rgba(245,158,11,.15);color:var(--gold)}
.impact-badge{font-size:9px;padding:1px 6px;border-radius:3px}
.impact-bullish{background:rgba(16,185,129,.12);color:var(--green)}
.impact-bearish{background:rgba(239,68,68,.12);color:var(--red)}

.price-item{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.price-item:hover{background:var(--surface2)}

.price-item .pi-change{font-size:12px;font-weight:600;min-width:55px;text-align:right}

.price-up{color:var(--red)}.price-down{color:var(--green)}.price-flat{color:var(--text3)}
.signal-up{background:rgba(239,68,68,.12);color:var(--red)}
.signal-down{background:rgba(16,185,129,.12);color:var(--green)}
.signal-flat{background:rgba(156,163,175,.1);color:var(--text3)}

.back-btn{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--accent2);cursor:pointer;margin-bottom:10px;padding:4px 0}
.back-btn:hover{color:var(--text)}

@media(max-width:1100px){
#right-panel{display:none}

@media(max-width:800px){

#sidebar .logo h1,#sidebar .logo p,#sidebar nav .nav-item span,#sidebar .sidebar-footer{display:none}
#sidebar nav .nav-item{justify-content:center;padding:12px}
}

  if(s>=6) return 'var(--accent2)';
  return 'var(--text3)';
}
function scoreCls(s){ return s>=8.5?'score-high':s>=7?'score-mid':'score-low' }
function pegCls(p){ return p<=1?'peg-low':p<=2?'peg-mid':'peg-high' }
function riskCls(r){ return r==='high'?'risk-high':r==='medium'?'risk-medium':'risk-low' }
function srcCls(s){
  if(s.includes('研报')) return 'src-research';
  if(s.includes('媒体')) return 'src-media';
  if(s.includes('政策')) return 'src-policy';
  return 'src-company';
}
function barWidth(v,max){ return Math.max(4,Math.round(v/max*40))+'px' }
function tryParse(s){ try{return JSON.parse(s)}catch(e){return s} }
function fmt$(v){ return v>=10000?'$'+Math.round(v/1000)+'K':'$'+v }

function renderBom(){

    products[b.product_name].push(b);
  });

  let html = '<div class="detail-section"><h2>📦 BOM拆解 — 按产品分组</h2>';
  Object.entries(products).forEach(([pname,comps])=>{
    const l1 = comps.filter(c=>c.component_level===1);
    const l2 = comps.filter(c=>c.component_level===2);

        html += '</tr>';
      });
    });
    html += '</tbody></table></div>';
  });
  html += '</div>';
  document.getElementById('detail-area').innerHTML = html;

    html += '<td style="font-size:11px">'+p.unit+'</td>';
    html += '<td style="font-weight:600">'+p.latest_price+'</td>';
    html += '<td class="'+chgCls+'" style="font-weight:600">'+(p.price_change_pct>0?'+':'')+p.price_change_pct+'%</td>';
    html += '<td class="'+chgCls+'">'+(p.price_change_3m>0?'+':'')+(p.price_change_3m||0)+'%</td>';
    html += '<td>'+p.price_trend+'</td>';
    html += '<td><span class="pi-signal '+sigCls+'">'+p.signal+'</span></td>';
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  document.getElementById('detail-area').innerHTML = html;
}

// --- RIGHT PANEL ---
function renderNews(){
  const el = document.getElementById('news-timeline');
  let html = '';
  const sorted = [...NEWS].sort((a,b)=>b.event_time.localeCompare(a.event_time));
  sorted.forEach(n=>{
    const dirCls = n.impact_direction==='bullish'?'impact-bullish':'impact-bearish';
    const dirText = n.impact_direction==='bullish'?'利好':'利空';
    html += '<div class="news-item">';
    html += '<div class="ni-time">'+n.event_time+'</div>';
    html += '<div class="ni-title">'+n.title+'</div>';
    html += '<div class="ni-summary">'+n.summary+'</div>';
    html += '<div class="ni-badges">';
    html += '<span class="source-badge '+srcCls(n.source)+'">'+n.source+'</span>';
    html += '<span class="impact-badge '+dirCls+'">'+dirText+'</span>';
    html += '<span style="font-size:9px;color:var(--text3)">影响力'+n.impact_score+'/5</span>';
    if(n.impact_area) html += '<span style="font-size:9px;color:var(--text3)">'+n.impact_area+'</span>';
    html += '</div></div>';
  });
  el.innerHTML = html;
}

function renderPriceScroll(){
  const el = document.getElementById('price-scroll');
  let html = '';
  PRICES.forEach(p=>{
    const chgCls = p.price_change_pct>0?'price-up':p.price_change_pct<0?'price-down':'price-flat';
    const sigCls = p.signal.includes('利好')?'signal-up':p.signal.includes('利空')?'signal-down':'signal-flat';
    const arrow = p.price_change_pct>0?'↑':p.price_change_pct<0?'↓':'→';
    html += '<div class="price-item">';
    html += '<div class="pi-name">'+p.item_name+'</div>';
    html += '<div class="pi-price">'+p.latest_price+' <span style="font-size:10px;color:var(--text3)">'+p.unit.replace('USD/','')+'</span></div>';
    html += '<div class="pi-change '+chgCls+'">'+arrow+(p.price_change_pct>0?'+':'')+p.price_change_pct+'%</div>';
    html += '<span class="pi-signal '+sigCls+'">'+p.signal+'</span>';
    html += '</div>';
  });
  el.innerHTML = html;
}

// --- NAVIGATION ---
let currentNav = 'overview';
function navTo(page){
  currentNav = page;
  location.hash = page;
  highlightNav(page);
  const area = document.getElementById('detail-area');
  area.scrollTop = 0;
  switch(page){
    case 'overview': renderOverview(); break;
    case 'sectors': renderSectors(); break;
    case 'bom': renderBom(); break;
    case 'stocks': renderStocks(); break;
    case 'prices': renderPricesDetail(); break;
  }
}

function highlightNav(page){
  document.querySelectorAll('#sidebar nav .nav-item').forEach(el=>{
    el.classList.toggle('active',el.dataset.nav===page);
  });
}

function handleSearch(q){
  if(!q){renderNews();renderPriceScroll();return}
  q = q.toLowerCase();
  // Filter news
  const fNews = NEWS.filter(n=>n.title.toLowerCase().includes(q)||n.summary.toLowerCase().includes(q)||(n.impact_area||'').toLowerCase().includes(q));
  const nel = document.getElementById('news-timeline');
  if(fNews.length){
    let html = '';
    fNews.forEach(n=>{
      const dirCls = n.impact_direction==='bullish'?'impact-bullish':'impact-bearish';
      html += '<div class="news-item"><div class="ni-time">'+n.event_time+'</div><div class="ni-title">'+n.title+'</div><div class="ni-badges"><span class="source-badge '+srcCls(n.source)+'">'+n.source+'</span><span class="impact-badge '+dirCls+'">'+(n.impact_direction==='bullish'?'利好':'利空')+'</span></div></div>';
    });
    nel.innerHTML = html;
  } else {
    nel.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text3)">无匹配新闻</div>';
  }
  // Filter prices
  const fPrices = PRICES.filter(p=>p.item_name.toLowerCase().includes(q));
  const pel = document.getElementById('price-scroll');
  if(fPrices.length){
    let html = '';
    fPrices.forEach(p=>{
      const chgCls = p.price_change_pct>0?'price-up':p.price_change_pct<0?'price-down':'price-flat';
      const sigCls = p.signal.includes('利好')?'signal-up':p.signal.includes('利空')?'signal-down':'signal-flat';
      html += '<div class="price-item"><div class="pi-name">'+p.item_name+'</div><div class="pi-price">'+p.latest_price+'</div><div class="pi-change '+chgCls+'">'+(p.price_change_pct>0?'+':'')+p.price_change_pct+'%</div><span class="pi-signal '+sigCls+'">'+p.signal+'</span></div>';
    });
    pel.innerHTML = html;
  } else {
    pel.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text3)">无匹配价格</div>';
  }
  // Also search in sectors/stocks
  const matchNodes = NODES.filter(n=>n.node_name.toLowerCase().includes(q)||(n.description||'').toLowerCase().includes(q));
  const matchStocks = STOCKS.filter(s=>s.company_name.toLowerCase().includes(q)||s.sector.toLowerCase().includes(q)||s.ticker.includes(q));
  if(matchNodes.length===1) showSectorDetail(matchNodes[0].node_name);
  else if(matchStocks.length===1) showStockDetail(matchStocks[0].company_name);
}

// --- HASH ROUTING ---
window.addEventListener('hashchange',()=>{
  const h = location.hash.slice(1);
  if(h.startsWith('sector/')) showSectorDetail(decodeURIComponent(h.slice(7)));
  else if(h.startsWith('stock/')) showStockDetail(decodeURIComponent(h.slice(6)));
  else navTo(h||'overview');
});

// --- INIT ---
renderSummary();
renderNews();
renderPriceScroll();
const initHash = location.hash.slice(1);
if(initHash.startsWith('sector/')) showSectorDetail(decodeURIComponent(initHash.slice(7)));
else if(initHash.startsWith('stock/')) showStockDetail(decodeURIComponent(initHash.slice(6)));
else navTo(initHash||'overview');
</script>
