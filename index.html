<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI算力产业链投研看板 v13</title>
<style>
:root {
  --bg-primary: #0a0e1a;
  --bg-secondary: #111827;
  --bg-card: #1a2035;
  --bg-card-hover: #1f2847;
  --border: #2a3454;
  --text-primary: #e8eaf0;
  --text-secondary: #9ca3b8;
  --text-muted: #6b7394;
  --accent-blue: #3b82f6;
  --accent-green: #10b981;
  --accent-red: #ef4444;
  --accent-yellow: #f59e0b;
  --accent-purple: #8b5cf6;
  --accent-cyan: #06b6d4;
  --radius: 8px;
  --shadow: 0 4px 12px rgba(0,0,0,0.3);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.5;
  overflow-x: hidden;
}
.dashboard {
  display: flex;
  height: 100vh;
  overflow: hidden;
}
.main-area {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.right-sidebar {
  width: 340px;
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg-secondary);
}
/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
}
.header h1 {
  font-size: 20px;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.header-meta {
  display: flex;
  gap: 20px;
  font-size: 12px;
  color: var(--text-secondary);
}
.header-meta span { display:flex; align-items:center; gap:4px; }
/* Macro cards */
.macro-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.macro-card {
  flex: 1 1 180px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  min-width: 160px;
}
.macro-card .label { font-size:11px; color:var(--text-muted); margin-bottom:4px; }
.macro-card .value { font-size:20px; font-weight:700; }
.macro-card .sub { font-size:11px; color:var(--text-secondary); margin-top:2px; }
/* Sector row */
.sector-row {
  display: flex;
  gap: 12px;
  flex: 1;
  min-height: 380px;
}
.sector-left {
  flex: 0 1 280px;
  min-width: 240px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sector-detail {
  flex: 1 1 400px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  overflow-y: auto;
}
.sector-companies {
  flex: 1 1 400px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  overflow-y: auto;
}
/* Sector list */
.sector-left-header {
  padding: 10px 14px;
  font-weight: 600;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--bg-card);
  z-index: 2;
  display: flex;
  align-items: center;
  gap: 12px;
}
.legend {
  display: flex;
  gap: 8px;
  font-size: 10px;
  color: var(--text-muted);
  font-weight: 400;
}
.legend span { display:flex; align-items:center; gap:3px; }
.legend .dot { width:8px; height:8px; border-radius:50%; }
.sector-columns {
  display: flex;
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  gap: 6px;
}
.sector-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.sector-group-title {
  font-size: 10px;
  color: var(--text-muted);
  padding: 6px 8px 2px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 600;
}
.sector-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s;
  font-size: 12px;
}
.sector-item:hover { background: var(--bg-card-hover); }
.sector-item.active { background: rgba(59,130,246,0.15); border: 1px solid var(--accent-blue); }
.sector-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.sector-score { margin-left:auto; font-weight:600; font-size:12px; color:var(--accent-cyan); }
/* Detail panel */
.detail-header { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.detail-header h3 { font-size:16px; }
.type-badge {
  font-size:10px; padding:2px 8px; border-radius:10px;
  background:rgba(59,130,246,0.15); color:var(--accent-blue); border:1px solid rgba(59,130,246,0.3);
}
.detail-score { font-size:28px; font-weight:700; color:var(--accent-cyan); margin-left:auto; }
.detail-desc { font-size:12px; color:var(--text-secondary); margin-bottom:14px; line-height:1.6; }
.score-bars { display:flex; flex-direction:column; gap:8px; margin-bottom:14px; }
.score-bar-row { display:flex; align-items:center; gap:8px; }
.score-bar-label { width:50px; font-size:11px; color:var(--text-muted); text-align:right; }
.score-bar-track { flex:1; height:6px; background:rgba(255,255,255,0.05); border-radius:3px; overflow:hidden; }
.score-bar-fill { height:100%; border-radius:3px; transition:width 0.5s ease; }
.score-bar-val { width:28px; font-size:11px; font-weight:600; }
.local-rate { margin-bottom:14px; }
.local-rate .label { font-size:11px; color:var(--text-muted); margin-bottom:4px; }
.local-rate .bar { height:8px; background:rgba(255,255,255,0.05); border-radius:4px; overflow:hidden; }
.local-rate .fill { height:100%; background:linear-gradient(90deg, var(--accent-green), var(--accent-cyan)); border-radius:4px; }
.local-rate .val { font-size:11px; color:var(--accent-green); margin-top:2px; }
.metrics-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 14px;
}
.metric-item {
  background: rgba(255,255,255,0.03);
  border-radius: 6px;
  padding: 8px 10px;
}
.metric-item .mlabel { font-size:10px; color:var(--text-muted); }
.metric-item .mvalue { font-size:13px; font-weight:600; margin-top:2px; }
.tags-section { margin-bottom:10px; }
.tags-section .tag-title { font-size:11px; color:var(--text-muted); margin-bottom:4px; }
.tags-section .tags { display:flex; flex-wrap:wrap; gap:4px; }
.tag {
  font-size:10px; padding:3px 8px; border-radius:10px;
  background:rgba(139,92,246,0.12); color:var(--accent-purple); border:1px solid rgba(139,92,246,0.25);
}
.tag.bottleneck {
  background:rgba(239,68,68,0.12); color:var(--accent-red); border-color:rgba(239,68,68,0.25);
}
/* Company cards */
.company-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
  gap: 10px;
}
.flip-card {
  perspective: 1000px;
  height: 160px;
  cursor: pointer;
}
.flip-card-inner {
  position:relative; width:100%; height:100%;
  transition: transform 0.5s;
  transform-style: preserve-3d;
}
.flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
.flip-card-front, .flip-card-back {
  position:absolute; width:100%; height:100%;
  backface-visibility: hidden;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 12px;
  display: flex;
  flex-direction: column;
}
.flip-card-front {
  background: var(--bg-card);
}
.flip-card-back {
  background: var(--bg-secondary);
  transform: rotateY(180deg);
  overflow-y: auto;
  font-size: 11px;
  line-height: 1.5;
}
.card-name { font-size:13px; font-weight:600; }
.card-ticker { font-size:10px; color:var(--text-muted); }
.card-sector-badge {
  font-size:9px; padding:1px 6px; border-radius:8px; margin-top:4px; display:inline-block;
  background:rgba(6,182,212,0.12); color:var(--accent-cyan); border:1px solid rgba(6,182,212,0.2);
}
.card-metrics { margin-top:auto; display:flex; flex-direction:column; gap:3px; }
.card-metrics .cm { display:flex; justify-content:space-between; font-size:11px; }
.card-metrics .cm .cl { color:var(--text-muted); }
.card-metrics .cm .cv { font-weight:600; }
.back-tabs {
  display:flex; gap:0; margin-bottom:6px; border-bottom:1px solid var(--border);
}
.back-tab {
  font-size:10px; padding:4px 6px; cursor:pointer; color:var(--text-muted);
  border-bottom:2px solid transparent; white-space:nowrap;
}
.back-tab.active { color:var(--accent-blue); border-bottom-color:var(--accent-blue); }
.back-content { flex:1; overflow-y:auto; font-size:11px; color:var(--text-secondary); }
.back-content strong { color:var(--text-primary); }
.back-content .risk-high { color:var(--accent-red); }
/* BOM section */
.bom-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  min-height: 260px;
}
.bom-tabs {
  display: flex;
  gap: 0;
  overflow-x: auto;
  border-bottom: 1px solid var(--border);
  padding: 0 12px;
}
.bom-tab {
  padding: 8px 12px;
  font-size: 11px;
  cursor: pointer;
  white-space: nowrap;
  color: var(--text-muted);
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.bom-tab:hover { color: var(--text-secondary); }
.bom-tab.active { color: var(--accent-blue); border-bottom-color: var(--accent-blue); }
.bom-table-wrap { padding:12px; overflow-x:auto; max-height:220px; overflow-y:auto; }
.bom-table { width:100%; border-collapse:collapse; font-size:11px; }
.bom-table th {
  text-align:left; padding:6px 8px; color:var(--text-muted); font-weight:500;
  border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--bg-card);
}
.bom-table td { padding:6px 8px; border-bottom:1px solid rgba(255,255,255,0.03); }
.bom-table tr:hover td { background:rgba(255,255,255,0.02); }
.bn-yes { color:var(--accent-red); font-weight:600; }
.bn-no { color:var(--text-muted); }
.bom-sector-tag {
  font-size:10px; padding:1px 6px; border-radius:8px;
  background:rgba(59,130,246,0.12); color:var(--accent-blue);
  border:1px solid rgba(59,130,246,0.25); white-space:nowrap;
}
.bom-price { font-family:'SF Mono','Consolas','Monaco',monospace; font-size:11px; white-space:nowrap; }
/* Right sidebar */
.sidebar-search {
  padding: 12px;
  border-bottom: 1px solid var(--border);
}
.sidebar-search input {
  width:100%; padding:8px 12px; border-radius:6px;
  background:var(--bg-card); border:1px solid var(--border);
  color:var(--text-primary); font-size:12px; outline:none;
}
.sidebar-search input:focus { border-color:var(--accent-blue); }
.news-section {
  border-bottom: 1px solid var(--border);
  overflow: hidden;
  max-height: 260px;
}
.news-header {
  padding:10px 12px; font-size:12px; font-weight:600;
  display:flex; align-items:center; gap:6px;
  border-bottom: 1px solid var(--border);
}
.news-scroll {
  overflow: hidden;
  position: relative;
  height: 220px;
}
.news-scroll-inner {
  animation: newsScroll 40s linear infinite;
}
.news-scroll:hover .news-scroll-inner { animation-play-state:paused; }
@keyframes newsScroll {
  0% { transform: translateY(0); }
  100% { transform: translateY(-50%); }
}
.news-item {
  padding: 8px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.news-item .ni-time { font-size:10px; color:var(--text-muted); }
.news-item .ni-title { font-size:12px; margin-top:2px; }
.news-item .ni-title a { color:var(--text-primary); text-decoration:none; }
.news-item .ni-title a:hover { color:var(--accent-blue); }
.news-item .ni-source { font-size:10px; color:var(--text-muted); margin-top:2px; }
.news-item .ni-badge {
  display:inline-block; font-size:9px; padding:1px 5px; border-radius:6px; margin-left:4px;
}
.ni-badge.bullish { background:rgba(16,185,129,0.15); color:var(--accent-green); }
.ni-badge.bearish { background:rgba(239,68,68,0.15); color:var(--accent-red); }
/* Chat section */
.chat-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}
.chat-header {
  padding:10px 12px; font-size:12px; font-weight:600;
  display:flex; align-items:center; gap:6px;
  border-bottom: 1px solid var(--border);
}
.chat-status {
  margin-left:auto; font-size:10px; padding:2px 6px; border-radius:8px;
}
.chat-status.online { background:rgba(16,185,129,0.15); color:var(--accent-green); }
.chat-status.offline { background:rgba(239,68,68,0.15); color:var(--accent-red); }
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.chat-msg {
  max-width: 85%;
  padding: 8px 12px;
  border-radius: 12px;
  font-size: 12px;
  line-height: 1.5;
  animation: slideUp 0.2s ease;
}
@keyframes slideUp {
  from { opacity:0; transform:translateY(8px); }
  to { opacity:1; transform:translateY(0); }
}
.chat-msg.user {
  align-self: flex-end;
  background: var(--accent-blue);
  color: #fff;
  border-bottom-right-radius: 4px;
}
.chat-msg.ai {
  align-self: flex-start;
  background: var(--bg-card);
  color: var(--text-primary);
  border-bottom-left-radius: 4px;
  border: 1px solid var(--border);
}
.chat-msg.ai strong { color: var(--accent-cyan); }
.chat-msg.ai ul { margin:4px 0; padding-left:16px; }
.chat-msg.ai code { background:rgba(255,255,255,0.08); padding:1px 4px; border-radius:3px; font-size:11px; }
.chat-typing {
  align-self: flex-start;
  padding: 8px 12px;
  display: flex;
  gap: 4px;
}
.chat-typing .dot {
  width:6px; height:6px; border-radius:50%; background:var(--text-muted);
  animation: bounce 1.2s infinite;
}
.chat-typing .dot:nth-child(2) { animation-delay:0.2s; }
.chat-typing .dot:nth-child(3) { animation-delay:0.4s; }
@keyframes bounce {
  0%,60%,100% { transform:translateY(0); }
  30% { transform:translateY(-6px); }
}
.chat-input-area {
  padding: 10px 12px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
}
.chat-input-area input {
  flex:1; padding:8px 12px; border-radius:6px;
  background:var(--bg-card); border:1px solid var(--border);
  color:var(--text-primary); font-size:12px; outline:none;
}
.chat-input-area input:focus { border-color:var(--accent-blue); }
.chat-input-area input:disabled { opacity:0.5; }
.chat-send {
  padding:8px 14px; border-radius:6px; border:none;
  background:var(--accent-blue); color:#fff; font-size:12px;
  cursor:pointer; font-weight:500; transition:opacity 0.2s;
}
.chat-send:hover { opacity:0.85; }
.chat-send:disabled { opacity:0.4; cursor:not-allowed; }
.chat-hint {
  padding:4px 12px 8px; font-size:10px; color:var(--text-muted); text-align:center;
}
/* Scrollbar */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--text-muted); }
/* Animation */
.fade-in { animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
/* Responsive */
@media (max-width:1440px) {
  .right-sidebar { width:300px; }
  .sector-left { flex:0 1 240px; min-width:200px; }
  .company-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
}
@media (max-width:1200px) {
  .right-sidebar { display:none; }
  .company-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
}
</style>
</head>

<div class="dashboard">
<div class="main-area">
  <!-- Header -->
  <div class="header">
    <h1>AI算力产业链投研看板</h1>
    <div class="header-meta">
      <span>14 赛道</span>
      <span>27 标的</span>
      <span>11 产品BOM</span>
      <span>更新: 2026-06-03</span>
    </div>
  </div>

  <!-- Macro Row -->
  <div class="macro-row" id="macroRow"></div>

  <!-- Sector Row -->
  <div class="sector-row">
    <div class="sector-left">
      <div class="sector-left-header">
        产业链赛道
        <div class="legend">
          <span><span class="dot" style="background:var(--accent-red)"></span>上游</span>
          <span><span class="dot" style="background:var(--accent-blue)"></span>中游</span>
          <span><span class="dot" style="background:var(--accent-green)"></span>下游</span>
          <span><span class="dot" style="background:var(--accent-purple)"></span>支撑</span>
        </div>
      </div>
      <div class="sector-columns" id="sectorColumns"></div>
    </div>
    <div class="sector-detail" id="sectorDetail">
      <div style="color:var(--text-muted);font-size:13px;padding:40px 0;text-align:center;">点击左侧赛道查看详情</div>
    </div>
    <div class="sector-companies" id="sectorCompanies">
      <div style="color:var(--text-muted);font-size:13px;padding:40px 0;text-align:center;">选择赛道后显示相关公司</div>
    </div>
  </div>

  <!-- BOM Section -->
  <div class="bom-section">
    <div class="bom-tabs" id="bomTabs"></div>
    <div class="bom-table-wrap" id="bomTableWrap"></div>
  </div>
</div>

<!-- Right Sidebar -->
<div class="right-sidebar">
  <div class="sidebar-search">
    <input type="text" id="searchInput" placeholder="🔍 搜索赛道、公司、产品..." />
  </div>
  <div class="news-section">
    <div class="news-header">📰 产业新闻</div>
    <div class="news-scroll">
      <div class="news-scroll-inner" id="newsScroll"></div>
    </div>
  </div>
  <div class="chat-section">
    <div class="chat-header">
      💬 AI 助手
      <span class="chat-status" id="chatStatus">检测中</span>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="chat-msg ai">你好！我是 AI 算力产业链投研助手。你可以问我关于赛道分析、公司估值、产业趋势等问题。</div>
    </div>
    <div class="chat-input-area">
      <input type="text" id="chatInput" placeholder="输入你的问题..." />
      <button class="chat-send" id="chatSend">发送</button>
    </div>
    <div class="chat-hint">支持上下文感知 · 基于当前选中赛道/公司</div>
  </div>
</div>
</div>

<script>
// Configuration
const CHAT_API_URL = 'https://api.deepseek.com/v1/chat/completions';

}

function renderMacro() {
  const cards = [

  ];
  document.getElementById('macroRow').innerHTML = cards.map(c => `
    <div class="macro-card">
      <div class="label">${c.label}</div>
      <div class="value" style="color:${c.color}">${c.value}</div>
      <div class="sub">${c.sub}</div>
    </div>
  `).join('');

// Sectors two-column
function renderSectors() {
  const upstream = sectors.filter(s => s.node_type === 'upstream');
  const mid = sectors.filter(s => s.node_type === 'midstream');
  const down = sectors.filter(s => s.node_type === 'downstream');
  const sup = sectors.filter(s => s.node_type === 'support');

  const leftCol = [{ title:'上游核心', items:upstream }];
  const rightCol = [{ title:'中游集成', items:mid }, { title:'下游交付', items:down }, { title:'底层支撑', items:sup }];

  function renderCol(groups) {
    return groups.map(g => `
      <div class="sector-group-title">${g.title}</div>
      ${g.items.map(s => `
        <div class="sector-item" data-node="${s.node_name}" onclick="selectSector(sectors.find(x=>x.node_name==='${s.node_name}'))">
          <span class="sector-dot" style="background:${typeColors[s.node_type]}"></span>
          <span>${s.node_name}</span>
          <span class="sector-score">${fmt(s.composite_score)}</span>
        </div>
      `).join('')}
    `).join('');
  }

  document.getElementById('sectorColumns').innerHTML = `
    <div class="sector-col">${renderCol(leftCol)}</div>
    <div class="sector-col">${renderCol(rightCol)}</div>
  `;
}

  // Update active state
  document.querySelectorAll('.sector-item').forEach(el => {
    el.classList.toggle('active', el.dataset.node === sector.node_name);
  });
  renderDetail(sector);
  renderCompanies(sector);
}

// Detail panel
function renderDetail(s) {
  const bottlenecks = JSON.parse(s.bottlenecks || '[]');
  const trends = JSON.parse(s.tech_trends || '[]');
  const barColor = score => score >= 8 ? 'var(--accent-green)' : score >= 6 ? 'var(--accent-yellow)' : 'var(--accent-red)';

  document.getElementById('sectorDetail').innerHTML = `
    <div class="detail-header fade-in">
      <h3>${s.node_name}</h3>
      <span class="type-badge">${typeLabels[s.node_type]}</span>
      <span class="detail-score">${fmt(s.composite_score)}</span>
    </div>
    <div class="detail-desc fade-in">${s.description}</div>
    <div class="score-bars fade-in">
      ${[['增长',s.growth_score],['利润',s.profit_score],['壁垒',s.barrier_score],['综合',s.composite_score]].map(([l,v]) => `
        <div class="score-bar-row">
          <span class="score-bar-label">${l}</span>
          <div class="score-bar-track"><div class="score-bar-fill" style="width:${v*10}%;background:${barColor(v)}"></div></div>
          <span class="score-bar-val" style="color:${barColor(v)}">${fmt(v)}</span>
        </div>
      `).join('')}
    </div>
    <div class="local-rate fade-in">
      <div class="label">国产化率</div>
      <div class="bar"><div class="fill" style="width:${fmt(s.localization_rate)}%"></div></div>
      <div class="val">${fmt(s.localization_rate)}%</div>
    </div>
    <div class="metrics-grid fade-in">
      <div class="metric-item"><div class="mlabel">CR5集中度</div><div class="mvalue">${fmt(s.cr5_concentration)}%</div></div>
      <div class="metric-item"><div class="mlabel">替代风险</div><div class="mvalue">${s.substitute_risk === 'high' ? '高' : s.substitute_risk === 'medium' ? '中' : '低'}</div></div>
      <div class="metric-item"><div class="mlabel">替代窗口</div><div class="mvalue">${s.substitute_window || 'N/A'}</div></div>
      <div class="metric-item"><div class="mlabel">定价权</div><div class="mvalue">${s.pricing_power === 'strong' ? '强' : (s.pricing_power === 'medium' || s.pricing_power === 'moderate') ? '中' : '弱'}</div></div>
    </div>
    <div class="tags-section fade-in">
      <div class="tag-title">瓶颈因素</div>
      <div class="tags">${bottlenecks.map(b => `<span class="tag bottleneck">${b}</span>`).join('')}</div>
    </div>
    <div class="tags-section fade-in">
      <div class="tag-title">技术趋势</div>
      <div class="tags">${trends.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    </div>
  `;
}

// Companies
function renderCompanies(sector) {
  const related = stocks.filter(s => s.sector === sector.node_name);
  if (related.length === 0) {
    document.getElementById('sectorCompanies').innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:30px;text-align:center;">该赛道暂无覆盖标的</div>';
    return;
  }
  document.getElementById('sectorCompanies').innerHTML = `
    <div class="company-grid fade-in">
      ${related.map((c,i) => renderFlipCard(c,i)).join('')}
    </div>
  `;
}

function renderFlipCard(c, idx) {
  const valColor = c.valuation_rating === '低估' ? 'var(--accent-green)' : c.valuation_rating === '合理' ? 'var(--accent-cyan)' : c.valuation_rating === '高估' ? 'var(--accent-red)' : 'var(--accent-yellow)';
  return `
    <div class="flip-card" onclick="this.classList.toggle('flipped');selectedCompany='${c.company_name}'">
      <div class="flip-card-inner">
        <div class="flip-card-front">
          <div class="card-name">${c.company_name}</div>
          <div class="card-ticker">${c.ticker}</div>
          <span class="card-sector-badge">${c.sector}</span>
          <div class="card-metrics">
            <div class="cm"><span class="cl">PEG</span><span class="cv">${fmt(c.peg_ratio)}</span></div>
            <div class="cm"><span class="cl">不可替代</span><span class="cv">${c.irreplaceability ? c.irreplaceability.match(/评分([\d.]+)/)?.[1] || '-' : '-'}/10</span></div>
            <div class="cm"><span class="cl">PE消化</span><span class="cv">${fmt(c.pe_digestion_years)}年</span></div>
            <div class="cm"><span class="cl">估值</span><span class="cv" style="color:${valColor}">${c.valuation_rating}</span></div>
          </div>
        </div>
        <div class="flip-card-back">
          <div class="back-tabs">
            <div class="back-tab active" onclick="event.stopPropagation();switchBackTab(this,0)">不可替代</div>
            <div class="back-tab" onclick="event.stopPropagation();switchBackTab(this,1)">技术锁定</div>
            <div class="back-tab" onclick="event.stopPropagation();switchBackTab(this,2)">投资逻辑</div>
            <div class="back-tab" onclick="event.stopPropagation();switchBackTab(this,3)">核心风险</div>
          </div>
          <div class="back-content">
            <div class="back-page" style="display:block">${formatBackContent(c.irreplaceability, 'irreplaceability')}</div>
            <div class="back-page" style="display:none">${formatBackContent(c.tech_lockin, 'tech')}</div>
            <div class="back-page" style="display:none">${formatBackContent(c.long_term_thesis, 'thesis')}</div>
            <div class="back-page" style="display:none">${formatBackContent(c.core_risk, 'risk')}</div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function formatBackContent(text, type) {
  if (!text) return '<span style="color:var(--text-muted)">暂无数据</span>';
  let html = text;
  // Bold score
  html = html.replace(/评分([\d.]+)\/10/g, '<strong style="font-size:16px;color:var(--accent-cyan)">$1/10</strong>');
  // Bold **text**
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Numbered items
  html = html.replace(/([①②③④⑤])/g, '<br><strong style="color:var(--accent-blue)">$1</strong>');
  // Risk markers
  if (type === 'risk') {
    html = html.replace(/概率(中高|高|中|低)/g, '<span class="risk-high" style="font-weight:600">概率$1</span>');
    html = html.replace(/(⚠)/g, '<span style="color:var(--accent-red)">$1</span>');
  }
  return html;
}

function switchBackTab(tabEl, idx) {
  const card = tabEl.closest('.flip-card-back');
  card.querySelectorAll('.back-tab').forEach((t,i) => {
    t.classList.toggle('active', i === idx);
  });
  card.querySelectorAll('.back-page').forEach((p,i) => {
    p.style.display = i === idx ? 'block' : 'none';
  });
}

// BOM
function renderBomTabs() {
  const shortNames = bomProducts.map(p => {
    if (p.length > 12) return p.replace(/\s*\(.+\)/, '').substring(0,12);
    return p;
  });
  document.getElementById('bomTabs').innerHTML = bomProducts.map((p,i) => `
    <div class="bom-tab ${i===0?'active':''}" onclick="selectBomTab(${i})">${shortNames[i]}</div>
  `).join('');
  renderBomTable(0);
}

function selectBomTab(idx) {
  selectedBomTab = idx;
  document.querySelectorAll('.bom-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  renderBomTable(idx);
}

function renderBomTable(idx) {
  const product = bomProducts[idx];
  const items = bomByProduct[product] || [];
  const sector = productSectorMap[product] || '-';
  document.getElementById('bomTableWrap').innerHTML = `
    <table class="bom-table">
      <thead><tr>
        <th>组件</th><th>赛道</th><th>供应商</th><th>国家</th><th>单价(USD)</th><th>成本占比</th><th>瓶颈</th><th>可替代</th>
      </tr></thead>
      <tbody>
        ${items.map(item => `
          <tr>
            <td>${item.component_name}</td>
            <td><span class="bom-sector-tag">${sector}</span></td>
            <td>${item.supplier || '-'}</td>
            <td>${item.supplier_country || '-'}</td>
            <td class="bom-price">$${item.unit_cost_usd != null ? fmt(item.unit_cost_usd) : '-'}</td>
            <td>${fmt(item.cost_pct)}%</td>
            <td class="${item.is_bottleneck ? 'bn-yes' : 'bn-no'}">${item.is_bottleneck ? '是' : '否'}</td>
            <td>${item.substitute_available === 0 || item.substitute_available === 'no' ? '❌' : item.substitute_available === 'limited' ? '⚠️有限' : item.substitute_available === 'partial' ? '⚠️部分' : '✅'}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

// News
function renderNews() {
  const doubled = [...news, ...news];
  document.getElementById('newsScroll').innerHTML = doubled.map(n => `
    <div class="news-item">
      <div class="ni-time">${n.event_time}</div>
      <div class="ni-title">${n.source_url ? `<a href="${n.source_url}" target="_blank">${n.title}</a>` : n.title}
        <span class="ni-badge ${n.impact_direction}">${n.impact_direction === 'bullish' ? '↑利好' : '↓利空'}</span>
      </div>
      <div class="ni-source">[${n.source}] ${n.impact_area}</div>
    </div>
  `).join('');
}

// Search
function setupSearch() {
  const input = document.getElementById('searchInput');
  input.addEventListener('input', (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) return;
    // Search sectors
    const found = sectors.find(s => s.node_name.toLowerCase().includes(q));
    if (found) { selectSector(found); return; }
    // Search stocks
    const stock = stocks.find(s => s.company_name.toLowerCase().includes(q) || s.ticker.includes(q));
    if (stock) {
      const sec = sectors.find(s => s.node_name === stock.sector);
      if (sec) selectSector(sec);
    }
  });
}

// Chat
function setupChat() {
  const input = document.getElementById('chatInput');
  const btn = document.getElementById('chatSend');
  const status = document.getElementById('chatStatus');

  // Check API availability
  checkApiStatus();

  btn.addEventListener('click', sendMessage);
  input.addEventListener('keypress', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) sendMessage();
  });
}

async function checkApiStatus() {
  const status = document.getElementById('chatStatus');
  try {
    const resp = await fetch(CHAT_API_URL.replace('/chat/completions', '/models'), {
      method: 'GET',
      headers: { 'Authorization': `Bearer ${CHAT_API_KEY}` },
      signal: AbortSignal.timeout(5000)
    });
    if (resp.ok) {
      status.textContent = 'DeepSeek 在线';
      status.className = 'chat-status online';
    } else { throw new Error(); }
  } catch {
    status.textContent = 'AI助手离线';
    status.className = 'chat-status offline';
  }
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg || isTyping) return;

  // Add user message
  addMessage(msg, 'user');
  input.value = '';

  // Build context
  const context = {
    selectedSector: selectedSector ? selectedSector.node_name : null,
    selectedCompany: selectedCompany || null,
    selectedBomTab: bomProducts[selectedBomTab] || null
  };

  isTyping = true;
  showTyping();

  try {
    const sectorData = selectedSector ? sectors.find(x => x.node_name === context.selectedSector) : null;
    const companyData = context.selectedCompany ? stocks.find(x => x.company_name === context.selectedCompany) : null;

    let systemPrompt = '你是AI算力产业链投研助手。用户正在使用AI算力产业链看板分析数据。请基于以下上下文简洁专业地回答，用中文。';
    if (sectorData) systemPrompt += `\n\n当前选中赛道: ${sectorData.node_name}（${typeLabels[sectorData.node_type] || sectorData.node_type}）\n描述: ${sectorData.description}\n综合评分: ${sectorData.composite_score}/10，国产化率: ${sectorData.localization_rate}%\n瓶颈: ${sectorData.bottlenecks}\n技术趋势: ${sectorData.tech_trends}`;
    if (companyData) systemPrompt += `\n\n当前选中公司: ${companyData.company_name}(${companyData.ticker}) - ${companyData.sector}\n不可替代性: ${companyData.irreplaceability}\n长期逻辑: ${companyData.long_term_thesis}\n核心风险: ${companyData.core_risk}\nPEG: ${companyData.peg_ratio}, 估值: ${companyData.valuation_rating}`;
    if (context.selectedBomTab) systemPrompt += `\n\n当前查看产品BOM: ${context.selectedBomTab}`;

    const resp = await fetch(CHAT_API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${CHAT_API_KEY}`
      },
      body: JSON.stringify({
        model: 'deepseek-v4-flash',
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: msg }
        ],
        max_tokens: 1024,
        temperature: 0.7
      }),
      signal: AbortSignal.timeout(30000)
    });

    hideTyping();
    if (resp.ok) {
      const data = await resp.json();
      const reply = data.choices?.[0]?.message?.content || '收到回复但格式未知';
      addMessage(reply, 'ai');
    } else {
      throw new Error(`HTTP ${resp.status}`);
    }
  } catch (err) {
    hideTyping();
    const mockReply = generateMockReply(msg, context);
    addMessage(mockReply, 'ai');
  }
  isTyping = false;
}

function generateMockReply(msg, context) {
  const sector = context.selectedSector;
  const company = context.selectedCompany;

  if (msg.includes('风险') && sector) {
    const s = sectors.find(x => x.node_name === sector);
    const bottlenecks = JSON.parse(s.bottlenecks || '[]');
    return `**${sector}赛道主要风险：**\n\n` + bottlenecks.map((b,i) => `${i+1}. ${b}`).join('\n') +
      `\n\n替代风险等级：${s.substitute_risk}，替代窗口：${s.substitute_window}`;
  }
  if (msg.includes('估值') && company) {
    const c = stocks.find(x => x.company_name === company);
    if (c) return `**${c.company_name}(${c.ticker})估值分析：**\n\n- PEG: ${fmt(c.peg_ratio)}\n- PE消化周期: ${fmt(c.pe_digestion_years)}年\n- 估值评级: ${c.valuation_rating}\n\n${c.peg_ratio < 1 ? '当前PEG<1，估值具有吸引力。' : 'PEG>1，需关注业绩增速兑现。'}`;
  }
  if (msg.includes('推荐') || msg.includes('低估')) {
    const undervalued = stocks.filter(s => s.valuation_rating === '低估' || (s.valuation_rating === '合理' && s.peg_ratio < 0.8));
    return `**当前低估值标的：**\n\n` + undervalued.map(s => `- **${s.company_name}** (${s.ticker}) PEG=${fmt(s.peg_ratio)} ${s.valuation_rating}`).join('\n');
  }
  if (sector) {
    const s = sectors.find(x => x.node_name === sector);
    return `**${sector}赛道概览：**\n\n${s.description}\n\n综合评分：${fmt(s.composite_score)}/10，国产化率：${fmt(s.localization_rate)}%`;
  }
  return `我是AI算力产业链投研助手（当前为离线模式）。\n\n你可以问我：\n- 某个赛道的风险和趋势\n- 公司估值是否合理\n- 低估值标的推荐\n- 产业链上下游关系\n\n请先在左侧选择一个赛道，我可以提供更精准的分析。`;
}

function addMessage(text, type) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `chat-msg ${type}`;
  if (type === 'ai') {
    div.innerHTML = renderMarkdown(text);
  } else {
    div.textContent = text;
  }
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function renderMarkdown(text) {
  let html = text;
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>');
  html = html.replace(/\n/g, '<br>');
  return html;
}

function showTyping() {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'chat-typing';
  div.id = 'typingIndicator';
  div.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

// Initialize
init();
</script>
</body>
</html>
