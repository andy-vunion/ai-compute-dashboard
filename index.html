<style>

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--card:#161b22;--card2:#1c2128;--border:#30363d;
  --text:#c9d1d9;--text2:#8b949e;--text3:#6e7681;
  --blue:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922;--purple:#bc8cff;--orange:#f0883e;
  --sidebar-w:64px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'PingFang SC','Microsoft YaHei',sans-serif;font-size:14px;display:flex}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}

/* ── Sidebar ── */
#sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);height:100vh;
  background:#0a0f14;border-right:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;padding:12px 0;
  position:fixed;left:0;top:0;z-index:100;
}
.nav-logo{font-size:18px;font-weight:700;color:var(--blue);margin-bottom:20px;letter-spacing:1px}
.nav-item{
  width:52px;height:52px;border-radius:10px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;color:var(--text2);transition:.2s;margin-bottom:4px;
  text-decoration:none;font-size:10px;
}
.nav-item:hover{background:var(--card);color:var(--text);text-decoration:none}
.nav-item.active{background:#1f3352;color:var(--blue)}
.nav-item .ni{font-size:18px}

/* ── Main ── */
#main{
  margin-left:var(--sidebar-w);height:100vh;
  display:flex;flex-direction:column;flex:1;overflow:hidden;
}
#topbar{
  height:36px;min-height:36px;background:var(--card);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:8px;font-size:12px;color:var(--text2);
}
.bc-sep{color:var(--text3);margin:0 4px}
.bc-link{color:var(--text2)}
.bc-link:hover{color:var(--text)}
.bc-cur{color:var(--text)}
#content{flex:1;overflow-y:auto;padding:16px;background:var(--bg)}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px}
.card-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card-title .ct-action{margin-left:auto;font-size:11px;color:var(--blue);cursor:pointer;font-weight:400;text-transform:none}
.card-subtitle{font-size:12px;color:var(--text3);margin-top:-8px;margin-bottom:12px}

/* ── Grid ── */
.row{display:flex;gap:12px;margin-bottom:12px}
.row>.card{flex:1}
.col2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.col3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.col4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}

/* ── KPI Cards ── */
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:12px}
.kpi{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:10px 12px}
.kpi-label{font-size:11px;color:var(--text3);margin-bottom:4px}
.kpi-value{font-size:18px;font-weight:700}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:2px}

/* ── Chart containers ── */
.chart-wrap{height:320px;width:100%}
.chart-wrap-sm{height:220px;width:100%}
.chart-wrap-lg{height:420px;width:100%}

/* ── Tables ── */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{color:var(--text3);font-weight:500;padding:6px 10px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;font-size:11px;letter-spacing:.4px}
.tbl td{padding:8px 10px;border-bottom:1px solid #1c2128;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr.clickable:hover td{background:var(--card2);cursor:pointer}
.tbl .num{text-align:right;font-variant-numeric:tabular-nums}
.tbl .mono{font-family:monospace;font-size:12px}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;white-space:nowrap}
.badge-blue{background:#1f3352;color:var(--blue)}
.badge-green{background:#1a2e1a;color:var(--green)}
.badge-red{background:#2e1a1a;color:var(--red)}
.badge-yellow{background:#2e2712;color:var(--yellow)}
.badge-purple{background:#211e32;color:var(--purple)}
.badge-gray{background:#1c2128;color:var(--text2)}
.badge-orange{background:#2e1e0f;color:var(--orange)}
.badge-up{background:#1a2e1a;color:var(--green)}
.badge-down{background:#2e1a1a;color:var(--red)}
.badge-flat{background:#1c2128;color:var(--text2)}

/* ── Scores ── */
.score-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.score-label{width:70px;font-size:12px;color:var(--text2)}
.score-bar-bg{flex:1;height:6px;background:#1c2128;border-radius:3px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:3px;transition:width .4s}
.score-num{width:30px;font-size:12px;text-align:right;font-variant-numeric:tabular-nums}

/* ── Color utils ── */
.text-green{color:var(--green)}
.text-red{color:var(--red)}
.text-yellow{color:var(--yellow)}
.text-blue{color:var(--blue)}
.text-purple{color:var(--purple)}
.text-muted{color:var(--text3)}
.text-orange{color:var(--orange)}
.fw-bold{font-weight:700}
.fs-11{font-size:11px}
.fs-12{font-size:12px}
.fs-16{font-size:16px}
.fs-20{font-size:20px}

/* ── Tag cloud ── */
.tag{display:inline-block;padding:2px 7px;background:var(--card2);border:1px solid var(--border);border-radius:12px;font-size:11px;color:var(--text2);margin:2px}

/* ── Node grid ── */
.node-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.node-card{
  background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:14px;cursor:pointer;transition:.2s;
}
.node-card:hover{border-color:var(--blue);background:var(--card2)}
.node-card .nc-name{font-size:14px;font-weight:600;margin-bottom:6px}
.node-card .nc-score{font-size:24px;font-weight:700}
.node-card .nc-bars{margin-top:8px}

/* ── Timeline ── */
.timeline{position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--border)}
.tl-item{position:relative;margin-bottom:16px}
.tl-dot{position:absolute;left:-24px;top:4px;width:12px;height:12px;border-radius:50%;border:2px solid}
.tl-dot.bullish{background:#1a2e1a;border-color:var(--green)}
.tl-dot.bearish{background:#2e1a1a;border-color:var(--red)}
.tl-dot.neutral{background:#1c2128;border-color:var(--text3)}
.tl-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:12px}
.tl-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.tl-date{font-size:11px;color:var(--text3)}
.tl-title{font-size:14px;font-weight:600}
.tl-summary{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:8px}
.tl-footer{display:flex;align-items:center;gap:8px}
.stars{color:var(--yellow);font-size:12px;letter-spacing:1px}

/* ── Tabs ── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab-btn{
  padding:8px 16px;font-size:13px;cursor:pointer;color:var(--text2);
  border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.2s;
}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-pane{display:none}
.tab-pane.active{display:block}

/* ── Detail sections ── */
.detail-section{margin-bottom:20px}
.detail-section .ds-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail-section .ds-body{font-size:13px;color:var(--text);line-height:1.7}

/* ── Price table special ── */
.price-arrow{font-size:16px;font-weight:700}
.up{color:var(--green)}
.down{color:var(--red)}
.flat{color:var(--text3)}

/* ── Macro conclusion ── */
.conclusion-box{background:#0f1e13;border:1px solid #1f4a27;border-radius:8px;padding:12px 16px;font-size:12px;line-height:1.7;color:var(--text2)}

/* ── Bottleneck badge ── */
.bottleneck-warn{background:#2e1a00;border:1px solid #7a4000;border-radius:6px;padding:8px 12px;font-size:12px;color:var(--orange);margin-bottom:8px}

/* ── Scroll ── */
#content::-webkit-scrollbar{width:6px}
#content::-webkit-scrollbar-track{background:var(--bg)}
#content::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}

/* ── Responsive ── */
@media(max-width:900px){
  .kpi-grid{grid-template-columns:repeat(3,1fr)}
  .col4{grid-template-columns:1fr 1fr}
}
@media(max-width:600px){
  .kpi-grid{grid-template-columns:1fr 1fr}
  .row{flex-direction:column}
}

/* ── Filter bar ── */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.filter-btn{padding:4px 12px;border-radius:16px;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;font-size:12px;transition:.15s}
.filter-btn:hover{border-color:var(--blue);color:var(--blue)}
.filter-btn.active{background:#1f3352;border-color:var(--blue);color:var(--blue)}

/* ── Page header ── */
.page-header{margin-bottom:16px}
.page-header h1{font-size:20px;font-weight:700;margin-bottom:4px}
.page-header .ph-sub{font-size:12px;color:var(--text3)}

/* ── Stat highlight ── */
.stat-highlight{font-size:28px;font-weight:700;line-height:1}
.stat-label{font-size:11px;color:var(--text3);margin-top:4px}

/* ── Risk list ── */
.risk-item{padding:8px 12px;border-left:3px solid var(--red);background:#1a1010;border-radius:0 4px 4px 0;margin-bottom:6px;font-size:12px;line-height:1.6;color:var(--text2)}
.risk-item:nth-child(odd){border-left-color:var(--orange);background:#1a1600}

/* ── Section divider ── */
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}

</style>
</head>

// ─── Chart helpers ────────────────────────────────────────────────────────
let _charts = {};
function disposeCharts(){
  Object.values(_charts).forEach(c=>{try{c.dispose()}catch(e){}});
  _charts={};
}
function mkChart(id,opt){
  const el=document.getElementById(id);
  if(!el)return null;
  const c=echarts.init(el,'dark',{renderer:'canvas'});
  c.setOption(opt);
  _charts[id]=c;
  return c;
}
window.addEventListener('resize',()=>Object.values(_charts).forEach(c=>c.resize()));

// ─── DOM helpers ──────────────────────────────────────────────────────────
function setContent(html){
  disposeCharts();
  document.getElementById('content').innerHTML=html;
  document.getElementById('content').scrollTop=0;
}
function setBreadcrumb(html){
  document.getElementById('topbar').innerHTML=`<span class="text-muted fs-11">📍</span> `+html;
}
function bc(items){
  return items.map((x,i)=>{
    if(i===items.length-1) return `<span class="bc-cur">${x[0]}</span>`;
    return `<a class="bc-link" href="${x[1]}">${x[0]}</a>`;
  }).join(' <span class="bc-sep">›</span> ');
}

// ─── Formatting helpers ───────────────────────────────────────────────────
function badge(text,cls='badge-gray'){return `<span class="badge ${cls}">${text}</span>`;}
function stars(n,max=5){return`<span class="stars">${'★'.repeat(n)}${'☆'.repeat(max-n)}</span>`;}
function pctFmt(v){
  if(v===null||v===undefined||v==='')return'<span class="text-muted">—</span>';
  const n=Number(v);
  const cls=n>0?'text-green up':n<0?'text-red down':'text-muted flat';
  const arrow=n>0?'▲':n<0?'▼':'→';
  return`<span class="${cls}">${arrow} ${Math.abs(n)}%</span>`;
}
function scoreColor(v){
  if(v>=9)return'#3fb950';
  if(v>=7.5)return'#58a6ff';
  if(v>=6)return'#d29922';
  return'#8b949e';
}
function scoreBar(v){
  const pct=Math.round(v/10*100);
  const col=scoreColor(v);
  return`<div class="score-bar-bg"><div class="score-bar-fill" style="width:${pct}%;background:${col}"></div></div>`;
}
function nodeTypeBadge(t){
  const map={upstream:'badge-blue',midstream:'badge-purple',downstream:'badge-green',support:'badge-yellow'};
  const label={upstream:'上游',midstream:'中游',downstream:'下游',support:'支撑'};
  return badge(label[t]||t, map[t]||'badge-gray');
}
function valuationBadge(v){
  if(!v)return'';
  const map={'低估':'badge-green','合理':'badge-blue','合理偏贵':'badge-yellow','高估':'badge-red'};
  return badge(v,map[v]||'badge-gray');
}
function signalBadge(s){
  if(!s)return'';
  const map={'涨价利好':'badge-green','降价利空':'badge-red','正常':'badge-gray'};
  return badge(s,map[s]||'badge-gray');
}
function dirBadge(d){
  const map={bullish:'badge-green',bearish:'badge-red',neutral:'badge-gray'};
  const label={bullish:'利多',bearish:'利空',neutral:'中性'};
  return badge(label[d]||d,map[d]||'badge-gray');
}
function fmt(v,d=1){
  if(v===null||v===undefined)return'—';
  return Number(v).toFixed(d);
}
function fmtUSD(v){
  if(v===null||v===undefined)return'—';
  const n=Number(v);
  if(n>=1e6)return`$${(n/1e6).toFixed(1)}M`;
  if(n>=1e3)return`$${(n/1e3).toFixed(0)}K`;
  return`$${n.toFixed(0)}`;
}

function setNav(page){
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active',el.dataset.page===page);
  });
}

// ─── Router ───────────────────────────────────────────────────────────────
function route(){
  const hash=location.hash||'#dashboard';
  const raw=hash.replace('#','');
  const slash=raw.indexOf('/');
  const page=slash>=0?raw.slice(0,slash):raw;
  const param=slash>=0?decodeURIComponent(raw.slice(slash+1)):'';
  switch(page){
    case 'dashboard': setNav('dashboard'); renderDashboard(); break;
    case 'chain':     setNav('chain'); renderChain(); break;
    case 'node':      setNav('chain'); renderNode(param); break;
    case 'bom':
      if(param){setNav('bom');renderBOMDetail(parseInt(param));}
      else{setNav('bom');renderBOMList();}
      break;
    case 'stock':
      if(param){setNav('stocks');renderStockDetail(param);}
      else{setNav('stocks');renderStocksList();}
      break;
    case 'news':  setNav('news');  renderNews();  break;
    case 'price': setNav('price'); renderPrice(); break;
    default: setNav('dashboard'); renderDashboard();
  }
}
window.addEventListener('hashchange',route);
document.addEventListener('DOMContentLoaded',route);

              <td>${s.sector}</td>
              <td>${scoreBar(parseFloat(s.irreplaceability)||8)}<span class="fs-11 text-muted">${(s.irreplaceability||'').toString().slice(0,6)}</span></td>
              <td class="num ${s.peg_ratio<=1?'text-green':s.peg_ratio<=2?'text-yellow':'text-red'} fw-bold">${fmt(s.peg_ratio,2)}</td>
              <td>${valuationBadge(s.valuation_rating)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
      <div class="card" style="flex:1">
        <div class="card-title">AI训练服务器 BOM成本结构 TOP10 <a href="#bom" class="ct-action">全部组件 →</a></div>
        <div id="chart-bom" class="chart-wrap"></div>
      </div>
    </div>
  `);

  setBreadcrumb(bc([['🏠 AI算力投研看板','#dashboard']]));

  setTimeout(()=>{
    _initTopoChart();
    _initScatterChart();
    _initBOMChart();
  },50);
}

function _initTopoChart(){
  const nodes=D.chainNodes;
  const typeColor={upstream:'#388bfd',midstream:'#8957e5',downstream:'#3fb950',support:'#d29922'};

  // Grid positions: col × row
  const layout={
    'EDA/IP':[0,2],'半导体设备':[0,5],
    'GPU芯片':[2,0],'光模块':[2,1],'HBM先进封装':[2,2],'高端PCB':[2,3],
    '光芯片':[2,4],'高速铜连接':[2,5],'电源/PSU':[2,6],'存储(HBM/SSD)':[2,7],
    '服务器':[4,2],'交换机':[4,4],'液冷散热':[4,6],
    '云服务/智算中心':[6,4]
  };

  const W=160, H=72;
  const gNodes=nodes.map(n=>{
    const [cx,cy]=layout[n.node_name]||[2,3];
    return{
      name:n.node_name,
      x:cx*W+40, y:cy*H+20,
      value:n.composite_score,
      itemStyle:{color:typeColor[n.node_type]||'#58a6ff'},
      symbolSize:Math.max(28,n.composite_score*5),
      label:{show:true,fontSize:10,color:'#c9d1d9'},
    };
  });

  const links=[
    {source:'EDA/IP',target:'GPU芯片'},{source:'EDA/IP',target:'光芯片'},{source:'EDA/IP',target:'存储(HBM/SSD)'},
    {source:'半导体设备',target:'GPU芯片'},{source:'半导体设备',target:'HBM先进封装'},{source:'半导体设备',target:'高端PCB'},
    {source:'光芯片',target:'光模块'},{source:'存储(HBM/SSD)',target:'GPU芯片'},
    {source:'GPU芯片',target:'服务器'},{source:'HBM先进封装',target:'GPU芯片'},
    {source:'光模块',target:'服务器'},{source:'光模块',target:'交换机'},
    {source:'高端PCB',target:'服务器'},{source:'高速铜连接',target:'服务器'},{source:'高速铜连接',target:'交换机'},
    {source:'电源/PSU',target:'服务器'},{source:'液冷散热',target:'服务器'},
    {source:'服务器',target:'云服务/智算中心'},{source:'交换机',target:'云服务/智算中心'},
  ];

  mkChart('chart-topo',{
    backgroundColor:'transparent',
    tooltip:{trigger:'item',formatter:p=>{
      const n=D.chainNodes.find(x=>x.node_name===p.name)||{};
      return`<b>${p.name}</b><br>综合:${n.composite_score||'-'} 成长:${n.growth_score||'-'} 盈利:${n.profit_score||'-'}<br>${(n.description||'').slice(0,60)}...`;
    }},
    legend:{show:true,bottom:0,itemWidth:10,itemHeight:10,textStyle:{color:'#8b949e',fontSize:10},
      data:[
        {name:'上游',icon:'circle',itemStyle:{color:'#388bfd'}},
        {name:'中游',icon:'circle',itemStyle:{color:'#8957e5'}},
        {name:'下游',icon:'circle',itemStyle:{color:'#3fb950'}},
        {name:'支撑',icon:'circle',itemStyle:{color:'#d29922'}},
      ]},
    series:[{
      type:'graph',layout:'none',
      roam:true,
      nodes:gNodes,
      edges:links,
      edgeSymbol:['none','arrow'],
      edgeSymbolSize:6,
      lineStyle:{color:'#30363d',width:1.5,curveness:0.1},
      emphasis:{focus:'adjacency',lineStyle:{width:3}},
      label:{position:'bottom',fontSize:10},
      selectedMode:'single',
    }]
  });

  _charts['chart-topo'].on('click',p=>{
    if(p.dataType==='node') location.hash='#node/'+encodeURIComponent(p.name);
  });
}

function _initScatterChart(){
  const nodes=D.chainNodes;
  const typeColor={upstream:'#388bfd',midstream:'#8957e5',downstream:'#3fb950',support:'#d29922'};
  const series=nodes.map(n=>({
    name:n.node_name,
    type:'scatter',
    data:[[n.growth_score,n.profit_score,n.barrier_score,n.node_name]],
    symbolSize: d=>Math.max(16, d[2]*5),
    itemStyle:{color:typeColor[n.node_type]||'#58a6ff',opacity:0.85},
    label:{show:true,formatter:p=>p.data[3],fontSize:10,position:'top',color:'#c9d1d9'},
  }));

  const c=mkChart('chart-scatter',{
    backgroundColor:'transparent',
    tooltip:{formatter:p=>`<b>${p.data[3]}</b><br>成长性:${p.data[0]} 盈利性:${p.data[1]} 壁垒:${p.data[2]}`},
    xAxis:{name:'成长性',min:5,max:10,nameTextStyle:{color:'#8b949e'},axisLabel:{color:'#8b949e'},splitLine:{lineStyle:{color:'#1c2128'}}},
    yAxis:{name:'盈利性',min:5,max:10,nameTextStyle:{color:'#8b949e'},axisLabel:{color:'#8b949e'},splitLine:{lineStyle:{color:'#1c2128'}}},
    series:series,
    grid:{top:20,bottom:40,left:50,right:20},
  });

  if(c){
    c.on('click',p=>{
      if(p.data) location.hash='#node/'+encodeURIComponent(p.data[3]);
    });
  }
}

function _initBOMChart(){
  const items=D.bom.filter(b=>b.product_name.includes('训练服务器')).slice(0,12);
  const names=items.map(b=>b.component_name.length>12?b.component_name.slice(0,11)+'…':b.component_name);
  const vals=items.map(b=>b.cost_pct||0);
  const colors=items.map(b=>b.is_bottleneck?'#f0883e':'#388bfd');

  mkChart('chart-bom',{
    backgroundColor:'transparent',
    tooltip:{formatter:p=>{
      const b=items[p.dataIndex];
      return`<b>${b.component_name}</b><br>占比:${b.cost_pct}% | ${b.supplier}<br>${b.is_bottleneck?'⚠️ 关键卡点':''}`;
    }},
    xAxis:{type:'value',axisLabel:{color:'#8b949e',formatter:v=>v+'%'},splitLine:{lineStyle:{color:'#1c2128'}}},
    yAxis:{type:'category',data:names,axisLabel:{color:'#c9d1d9',fontSize:11},inverse:false},
    grid:{top:10,bottom:30,left:140,right:60},
    series:[{
      type:'bar',
      data:vals.map((v,i)=>({value:v,itemStyle:{color:colors[i]}})),
      label:{show:true,position:'right',formatter:p=>`${p.value}%`,color:'#8b949e',fontSize:10},
      barMaxWidth:20,
    }]
  });
}

function renderChain(){
  const byType={upstream:[],midstream:[],downstream:[],support:[]};
  D.chainNodes.forEach(n=>{ (byType[n.node_type]||byType.upstream).push(n); });
  const typeLabel={upstream:'上游核心组件',midstream:'中游集成制造',downstream:'下游应用',support:'支撑层'};
  const typeColor={upstream:'var(--blue)',midstream:'var(--purple)',downstream:'var(--green)',support:'var(--yellow)'};

  let html=`
    <div class="page-header">
      <h1>AI算力产业链</h1>
      <div class="ph-sub">共 ${D.chainNodes.length} 个核心节点，点击进入详情</div>
    </div>
    <div id="chart-chain-bar" class="chart-wrap-sm card" style="margin-bottom:14px"></div>
  `;

  ['upstream','support','midstream','downstream'].forEach(t=>{
    const arr=byType[t];
    if(!arr||!arr.length)return;
    html+=`<div style="margin-bottom:20px">
      <div style="font-size:12px;font-weight:600;color:${typeColor[t]};margin-bottom:10px;display:flex;align-items:center;gap:8px">
        <div style="width:3px;height:14px;background:${typeColor[t]};border-radius:2px"></div>
        ${typeLabel[t]} (${arr.length})
      </div>
      <div class="node-grid">
        ${arr.map(n=>`
        <div class="node-card" onclick="location.hash='#node/${encodeURIComponent(n.node_name)}'">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
            <div class="nc-name">${n.node_name}</div>
            ${nodeTypeBadge(n.node_type)}
          </div>
          <div class="nc-score" style="color:${scoreColor(n.composite_score)}">${fmt(n.composite_score)}</div>
          <div class="nc-bars" style="margin-top:10px">
            <div class="score-row"><span class="score-label">成长性</span>${scoreBar(n.growth_score)}<span class="score-num" style="color:${scoreColor(n.growth_score)}">${n.growth_score}</span></div>
            <div class="score-row"><span class="score-label">盈利性</span>${scoreBar(n.profit_score)}<span class="score-num" style="color:${scoreColor(n.profit_score)}">${n.profit_score}</span></div>
            <div class="score-row"><span class="score-label">壁垒性</span>${scoreBar(n.barrier_score)}<span class="score-num" style="color:${scoreColor(n.barrier_score)}">${n.barrier_score}</span></div>
          </div>
        </div>`).join('')}
      </div>
    </div>`;
  });

  setContent(html);
  setBreadcrumb(bc([['🏠 看板','#dashboard'],['🔗 产业链','#chain']]));

  setTimeout(()=>{
    const ns=[...D.chainNodes].sort((a,b)=>b.composite_score-a.composite_score);
    const typeC={upstream:'#388bfd',midstream:'#8957e5',downstream:'#3fb950',support:'#d29922'};
    mkChart('chart-chain-bar',{
      backgroundColor:'transparent',
      tooltip:{formatter:p=>`<b>${p.name}</b><br>综合评分: ${p.value}`},
      xAxis:{type:'category',data:ns.map(n=>n.node_name.length>6?n.node_name.slice(0,5)+'…':n.node_name),
        axisLabel:{color:'#c9d1d9',fontSize:10,interval:0},splitLine:{show:false}},
      yAxis:{type:'value',min:5,max:10,axisLabel:{color:'#8b949e'},splitLine:{lineStyle:{color:'#1c2128'}}},
      grid:{top:10,bottom:60,left:40,right:10},
      series:[{
        type:'bar',
        data:ns.map(n=>({value:n.composite_score,name:n.node_name,itemStyle:{color:typeC[n.node_type]||'#58a6ff'}})),
        label:{show:true,position:'top',formatter:p=>p.value,color:'#8b949e',fontSize:10},
        barMaxWidth:30,
      }]
    });
  },50);
}

// NODE DETAIL
// ═══════════════════════════════════════════════════════════════════════════
function renderNode(name){
  const n=D.chainNodes.find(x=>x.node_name===name);
  if(!n){setContent(`<div class="text-muted">节点 "${name}" 不存在</div>`);return;}

  const relBOM=D.bom.filter(b=>
    b.component_name.includes(name)||b.product_name.includes(name)||
    (name==='光模块'&&b.component_name.includes('光模块'))||
    (name==='光芯片'&&(b.component_name.includes('EML')||b.component_name.includes('激光器')||b.component_name.includes('CW')))||
    (name==='GPU芯片'&&b.component_name.includes('GPU'))||
    (name==='HBM先进封装'&&(b.component_name.includes('HBM')||b.component_name.includes('CoWoS')||b.component_name.includes('Interposer')))||
    (name==='高端PCB'&&(b.component_name.includes('PCB')||b.component_name.includes('覆铜板')||b.component_name.includes('铜箔')))||
    (name==='液冷散热'&&(b.component_name.includes('散热')||b.component_name.includes('冷')))||
    (name==='电源/PSU'&&b.component_name.includes('电源'))||
    (name==='存储(HBM/SSD)'&&(b.component_name.includes('HBM')||b.component_name.includes('SSD')||b.component_name.includes('内存')||b.component_name.includes('DDR')))||
    (name==='交换机'&&b.component_name.includes('交换'))||
    (name==='服务器'&&b.product_name.includes('服务器')&&b.component_level===1)
  ).slice(0,8);

  const relStocks=D.stocks.filter(s=>
    s.sector.includes(name.replace(/[/()]/g,'').slice(0,3))||
    (name==='光模块'&&s.sector.includes('光模块'))||
    (name==='光芯片'&&s.sector.includes('光芯片'))||
    (name==='GPU芯片'&&s.sector.includes('GPU'))||
    (name==='HBM先进封装'&&s.sector.includes('封装'))||
    (name==='高端PCB'&&s.sector.includes('PCB'))||
    (name==='液冷散热'&&s.sector.includes('液冷'))||
    (name==='存储(HBM/SSD)'&&s.sector.includes('HBM'))||
    (name==='服务器'&&s.sector.includes('服务器'))||
    (name==='EDA/IP'&&(s.sector.includes('EDA')||s.sector.includes('半导体')))||
    (name==='半导体设备'&&s.sector.includes('封装'))
  );

  const bottleneckBOM=relBOM.filter(b=>b.is_bottleneck);

  setContent(`
    <!-- Header -->
    <div class="row" style="align-items:flex-start;margin-bottom:16px">
      <div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
          <h1 style="font-size:22px;font-weight:700">${n.node_name}</h1>
          ${nodeTypeBadge(n.node_type)}
        </div>
        <div class="text-muted fs-12">${n.description||'暂无描述'}</div>
      </div>
      <div style="text-align:right;min-width:120px">
        <div class="stat-highlight" style="color:${scoreColor(n.composite_score)}">${fmt(n.composite_score)}</div>
        <div class="stat-label">综合评分</div>
      </div>
    </div>

    <!-- Score Cards -->
    <div class="col4" style="margin-bottom:16px">
      ${[
        ['成长性评分','growth_score','#3fb950'],
        ['盈利性评分','profit_score','#58a6ff'],
        ['壁垒性评分','barrier_score','#d29922'],
        ['综合评分','composite_score','#bc8cff'],
      ].map(([label,key,col])=>`
      <div class="kpi">
        <div class="kpi-label">${label}</div>
        <div class="kpi-value" style="color:${col}">${n[key]||'—'}<span class="text-muted fs-11">/10</span></div>
        ${scoreBar(n[key]||0)}
      </div>`).join('')}
    </div>

    <!-- Charts row -->
    <div class="row">
      <div class="card" style="flex:1">
        <div class="card-title">节点雷达评分</div>
        <div id="chart-node-radar" class="chart-wrap-sm"></div>
      </div>
      ${relBOM.length?`
      <div class="card" style="flex:1.5">
        <div class="card-title">相关BOM组件成本占比</div>
        <div id="chart-node-bom" class="chart-wrap-sm"></div>
      </div>`:''}
    </div>

    <!-- Bottleneck warnings -->
    ${bottleneckBOM.length?`
    <div class="card" style="margin-bottom:12px">
      <div class="card-title">⚠️ 供应链卡点警告</div>
      ${bottleneckBOM.map(b=>`
        <div class="bottleneck-warn">
          <b>${b.component_name}</b> — 供应商: ${b.supplier} (${b.supplier_country})<br>
          <span class="fs-11">替代方案: ${b.substitute_detail||'无'}</span>
        </div>`).join('')}
    </div>`:''}

    <!-- Related BOM table -->
    ${relBOM.length?`
    <div class="card" style="margin-bottom:12px">
      <div class="card-title">相关BOM组件 <a href="#bom" class="ct-action">查看全部 →</a></div>
      <table class="tbl">
        <thead><tr><th>组件名称</th><th>供应商</th><th>成本占比</th><th>单价</th><th>卡点</th><th>替代可用</th><th></th></tr></thead>
        <tbody>
          ${relBOM.map(b=>`
          <tr class="clickable" onclick="location.hash='#bom/${b.id}'">
            <td class="fw-bold">${b.component_name}</td>
            <td class="fs-12 text-muted">${b.supplier}</td>
            <td><div style="display:flex;align-items:center;gap:6px">
              <div class="score-bar-bg" style="width:80px"><div class="score-bar-fill" style="width:${Math.min(b.cost_pct||0,100)}%;background:${b.is_bottleneck?'#f0883e':'#388bfd'}"></div></div>
              <span class="fs-11">${fmt(b.cost_pct,1)}%</span>
            </div></td>
            <td class="num">${fmtUSD(b.unit_cost_usd)}</td>
            <td>${b.is_bottleneck?badge('卡点','badge-orange'):'—'}</td>
            <td>${b.substitute_available==='limited'?badge('有限','badge-yellow'):b.substitute_available==='yes'?badge('可替代','badge-green'):badge('不可替代','badge-red')}</td>
            <td><a href="#bom/${b.id}" class="text-blue fs-11">详情 →</a></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`:''}

    <!-- Tech trend from bom -->
    ${relBOM.filter(b=>b.tech_trend).length?`
    <div class="card" style="margin-bottom:12px">
      <div class="card-title">技术趋势</div>
      ${relBOM.filter(b=>b.tech_trend).map(b=>`
        <div style="margin-bottom:10px">
          <span class="tag">${b.component_name}</span>
          <div class="fs-12 text-muted" style="margin-top:4px;padding-left:6px">${b.tech_trend}</div>
        </div>`).join('')}
    </div>`:''}

    <!-- Related stocks -->
    ${relStocks.length?`
    <div class="card">
      <div class="card-title">相关投资标的</div>
      <div class="node-grid">
        ${relStocks.map(s=>`
        <div class="node-card" onclick="location.hash='#stock/${s.ticker}'">
          <div style="display:flex;align-items:center;justify-content:space-between">
            <div class="fw-bold">${s.company_name}</div>
            <span class="mono text-muted fs-11">${s.ticker}</span>
          </div>
          <div class="fs-12 text-muted" style="margin:4px 0">${s.sector}</div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:6px">
            <span class="fs-11 text-muted">PEG</span>
            <span class="fw-bold ${s.peg_ratio<=1?'text-green':s.peg_ratio<=2?'text-yellow':'text-red'}">${fmt(s.peg_ratio,2)}</span>
            ${valuationBadge(s.valuation_rating)}
          </div>
        </div>`).join('')}
      </div>
    </div>`:''}
  `);

  setBreadcrumb(bc([['🏠 看板','#dashboard'],['🔗 产业链','#chain'],['📍 '+name,'#node/'+encodeURIComponent(name)]]));

  setTimeout(()=>{
    mkChart('chart-node-radar',{
      backgroundColor:'transparent',
      radar:{indicator:[
        {name:'成长性',max:10},{name:'盈利性',max:10},{name:'壁垒性',max:10},
        {name:'定价权',max:10},{name:'综合',max:10},
      ],splitLine:{lineStyle:{color:'#1c2128'}},axisLine:{lineStyle:{color:'#30363d'}},
      name:{textStyle:{color:'#8b949e',fontSize:11}}},
      series:[{
        type:'radar',
        data:[{
          name:name,
          value:[n.growth_score,n.profit_score,n.barrier_score,n.profit_score*0.9,n.composite_score],
          areaStyle:{color:'rgba(88,166,255,0.15)'},lineStyle:{color:'#58a6ff'},
          itemStyle:{color:'#58a6ff'},
        }]
      }]
    });

    if(relBOM.length&&document.getElementById('chart-node-bom')){
      const bItems=relBOM.filter(b=>b.cost_pct>0).slice(0,8);
      mkChart('chart-node-bom',{
        backgroundColor:'transparent',
        tooltip:{formatter:p=>`<b>${p.name}</b><br>成本占比: ${p.value}%<br>${relBOM.find(b=>b.component_name===p.name)?.supplier||''}`},
        series:[{
          type:'pie',radius:['30%','70%'],center:['50%','50%'],
          data:bItems.map(b=>({name:b.component_name.length>10?b.component_name.slice(0,9)+'…':b.component_name,value:b.cost_pct,
            itemStyle:{color:b.is_bottleneck?'#f0883e':undefined}})),
          label:{color:'#c9d1d9',fontSize:11},
          emphasis:{itemStyle:{shadowBlur:10}},
        }]
      });
    }
  },50);
}

// BOM LIST
// ═══════════════════════════════════════════════════════════════════════════
function renderBOMList(){
  const products=[...new Set(D.bom.map(b=>b.product_name))];

  let html=`
    <div class="page-header">
      <h1>BOM 物料清单</h1>
      <div class="ph-sub">共 ${D.bom.length} 个组件，覆盖 ${products.length} 个产品</div>
    </div>
  `;

  products.forEach(prod=>{
    const items=D.bom.filter(b=>b.product_name===prod);
    const total=items.reduce((a,b)=>a+(b.total_cost_usd||0),0);
    const bottlenecks=items.filter(b=>b.is_bottleneck).length;
    html+=`
      <div class="card" style="margin-bottom:14px">
        <div class="card-title">
          ${prod}
          <span class="fs-11 text-muted" style="font-weight:normal">总成本约 ${fmtUSD(total)} | ${items.length}个组件 | ${bottlenecks}个卡点</span>
        </div>
        <table class="tbl">

function renderRiskContent(text){
  if(!text) return '<div class="text-muted fs-12">暂无数据</div>';
  // split on ① ② ③ ④ ⑤
  const parts=text.split(/(?=[①②③④⑤])/);
  if(parts.length<=1){
    return`<div class="detail-section"><div class="ds-body" style="line-height:1.8">${text}</div></div>`;
  }
  return parts.filter(p=>p.trim()).map(p=>`<div class="risk-item">${p.trim()}</div>`).join('');
}

function switchTab(i){
  document.querySelectorAll('.tab-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
  document.querySelectorAll('.tab-pane').forEach((p,j)=>p.classList.toggle('active',j===i));
}

function renderNews(){
  const areas=[...new Set(D.news.map(n=>n.impact_area))].filter(Boolean);
  let activeArea='all';

  function buildTimeline(filter){
    const items=filter==='all'?D.news:D.news.filter(n=>n.impact_area===filter);
    if(!items.length)return'<div class="text-muted">暂无相关事件</div>';
    return`<div class="timeline">
      ${items.map(n=>`
      <div class="tl-item">
        <div class="tl-dot ${n.impact_direction||'neutral'}"></div>
        <div class="tl-card">
          <div class="tl-header">
            <span class="tl-date">${n.event_time}</span>
            ${dirBadge(n.impact_direction)}
            ${badge(n.impact_area||'综合','badge-blue')}
          </div>
          <div class="tl-title">${n.title}</div>
          <div class="tl-summary">${n.summary}</div>
          <div class="tl-footer">
            ${stars(n.impact_score||0)}
            <span class="fs-11 text-muted">影响度 ${n.impact_score}/5</span>
            <span class="fs-11 text-muted" style="margin-left:auto">来源: ${n.source||'—'}</span>
          </div>
        </div>
      </div>`).join('')}
    </div>`;
  }

  setContent(`
    <div class="page-header">
      <h1>市场动态 & 新闻事件</h1>
      <div class="ph-sub">共 ${D.news.length} 条事件，按时间倒序排列</div>
    </div>
    <div class="filter-bar" id="news-filters">
      <button class="filter-btn active" data-area="all" onclick="filterNews('all')">全部</button>

  setBreadcrumb(bc([['🏠 看板','#dashboard'],['📰 新闻动态','#news']]));

  window.filterNews=function(area){
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.area===area));
    document.getElementById('news-timeline').innerHTML=buildTimeline(area);
  };
}

// PRICE
// ═══════════════════════════════════════════════════════════════════════════
function renderPrice(){
  let sortKey='price_change_pct',sortDir=-1;

  function buildTable(data){
    return`
    <table class="tbl">
      <thead><tr>
        <th>名称</th><th>类型</th><th>单位</th>
        <th class="num" style="cursor:pointer" onclick="sortPrice('latest_price')">最新价格 ↕</th>
        <th class="num" style="cursor:pointer" onclick="sortPrice('price_change_pct')">涨跌% ↕</th>
        <th class="num" style="cursor:pointer" onclick="sortPrice('price_change_3m')">3月涨跌% ↕</th>
        <th>趋势</th><th>信号</th><th>来源</th>
      </tr></thead>
      <tbody>
        ${data.map(p=>{
          const chgPct=p.price_change_pct;
          const chg3m=p.price_change_3m;
          const trendArrow=p.price_trend==='上涨'?'<span class="up price-arrow">▲</span>':p.price_trend==='下跌'?'<span class="down price-arrow">▼</span>':'<span class="flat">→</span>';
          return`<tr>
            <td class="fw-bold">${p.item_name}</td>
            <td><span class="tag fs-11">${p.item_type==='component'?'组件':p.item_type==='material'?'材料':'服务'}</span></td>
            <td class="fs-11 text-muted">${p.unit||'—'}</td>
            <td class="num">$${p.latest_price}</td>
            <td class="num">${pctFmt(chgPct)}</td>
            <td class="num">${pctFmt(chg3m)}</td>
            <td style="text-align:center">${trendArrow}</td>
            <td>${signalBadge(p.signal)}</td>
            <td class="fs-11 text-muted">${p.source||'—'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
  }

  setContent(`
    <div class="page-header">
      <h1>价格追踪</h1>
      <div class="ph-sub">AI算力产业链关键组件 & 材料实时价格监控</div>
    </div>
    <div class="row" style="margin-bottom:14px">
      <div class="card" style="flex:1">
        <div class="card-title">涨跌幅概览（近期%）</div>
        <div id="chart-price-bar" class="chart-wrap-sm"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">价格明细</div>
      <div id="price-table">${buildTable(D.prices)}</div>
    </div>
  `);

  setBreadcrumb(bc([['🏠 看板','#dashboard'],['💰 价格追踪','#price']]));

  window.sortPrice=function(key){
    if(sortKey===key) sortDir*=-1; else {sortKey=key;sortDir=-1;}
    const sorted=[...D.prices].sort((a,b)=>{
      const av=Number(a[key])||0,bv=Number(b[key])||0;
      return (av-bv)*sortDir;
    });
    document.getElementById('price-table').innerHTML=buildTable(sorted);
  };

  setTimeout(()=>{
    const sorted=[...D.prices].sort((a,b)=>b.price_change_pct-a.price_change_pct);
    mkChart('chart-price-bar',{
      backgroundColor:'transparent',
      tooltip:{formatter:p=>`<b>${p.name}</b><br>近期涨跌: ${p.value}%`},
      xAxis:{type:'category',data:sorted.map(p=>p.item_name.length>8?p.item_name.slice(0,7)+'…':p.item_name),
        axisLabel:{color:'#c9d1d9',fontSize:10,interval:0}},
      yAxis:{type:'value',axisLabel:{color:'#8b949e',formatter:v=>v+'%'},splitLine:{lineStyle:{color:'#1c2128'}}},
      grid:{top:10,bottom:70,left:50,right:10},
      series:[{
        type:'bar',
        data:sorted.map(p=>({
          value:p.price_change_pct,name:p.item_name,
          itemStyle:{color:p.price_change_pct>0?'#3fb950':p.price_change_pct<0?'#f85149':'#8b949e'}
        })),
        label:{show:true,position:'top',formatter:p=>(p.value>0?'+':'')+p.value+'%',color:'#8b949e',fontSize:10},
        barMaxWidth:40,
      }]
    });
  },50);
}

</script>
</body>
</html>
