// === TOPOLOGY ===
(function(){
var c = echarts.init(document.getElementById('topo'));
var ns = D.nodes.map(function(n){
  return {
    name: n.node_name,
    category: {upstream:0,midstream:1,downstream:2,support:3}[n.node_type]||1,
    value: n.composite_score,
    symbolSize: Math.max(20, (n.composite_score||5)*8),
    itemStyle: {color: (n.composite_score||0)>=7?'#0f9b58':(n.composite_score||0)>=5?'#e9c450':'#e94560'},
    label: {show:true,fontSize:10,color:'#eaeaea'}
  };
});
var ls = [];
D.nodes.forEach(function(s){
  D.nodes.forEach(function(t){
    if(s.node_type==='upstream'&&(t.node_type==='midstream'||t.node_type==='support'))
      ls.push({source:s.node_name,target:t.node_name});
    if(s.node_type==='midstream'&&t.node_type==='downstream')
      ls.push({source:s.node_name,target:t.node_name});
  });
});
c.setOption({
  tooltip:{formatter:function(p){return p.dataType==='node'?'<b>'+p.name+'</b><br/>综合:'+p.value.toFixed(1):p.data.source+' → '+p.data.target}},
  series:[{type:'graph',layout:'force',roam:true,draggable:true,
    force:{repulsion:300,edgeLength:[80,200]},
    data:ns,links:ls,lineStyle:{color:'#2a2a4a',opacity:0.6},emphasis:{focus:'adjacency'}}]
});
window.addEventListener('resize',function(){c.resize()});
})();

// === SCATTER ===
(function(){
var c = echarts.init(document.getElementById('scatter'));
var sd = D.nodes.filter(function(n){return n.growth_score&&n.profit_score}).map(function(n){
  return {value:[n.growth_score,n.profit_score],name:n.node_name,
    symbolSize:Math.max(10,(n.barrier_score||5)*7),
    itemStyle:{color:(n.composite_score||0)>=8.5?'#e94560':(n.composite_score||0)>=8?'#e9c450':'#4a9eff'}
  };
});
c.setOption({
  tooltip:{formatter:function(p){return '<b>'+p.data.name+'</b><br/>增长:'+p.data.value[0]+' 利润:'+p.data.value[1]+' 壁垒:'+((p.data.symbolSize/7).toFixed(1))}},
  grid:{left:50,right:20,top:20,bottom:50},
  xAxis:{name:'增长前景',min:0,max:10,nameTextStyle:{color:'#8892b0'},axisLine:{lineStyle:{color:'#2a2a4a'}}},
  yAxis:{name:'利润水平',min:0,max:10,nameTextStyle:{color:'#8892b0'},axisLine:{lineStyle:{color:'#2a2a4a'}}},
  series:[{type:'scatter',data:sd,label:{show:true,fontSize:9,color:'#eaeaea',formatter:'{b}'}}]
});
window.addEventListener('resize',function(){c.resize()});
})();

// === BOM ===
(function(){
var c = echarts.init(document.getElementById('bomchart'));
var bd = D.bom.filter(function(x){return x.value_add_pct}).sort(function(a,b){return b.value_add_pct-a.value_add_pct}).slice(0,12);
var names = bd.map(function(x){return x.component_name.substring(0,20)}).reverse();
var vals = bd.map(function(x){return [x.cost_pct||0,x.value_add_pct||0]}).reverse();
var colors = bd.map(function(x){return x.is_bottleneck?'#e94560':'#4a9eff'}).reverse();
c.setOption({
  tooltip:{formatter:function(p){return '<b>'+p.name+'</b><br/>成本:'+p.value[0].toFixed(1)+'%<br/>价值:'+p.value[1].toFixed(1)+'x'}},
  grid:{left:140,right:60,top:10,bottom:20},
  xAxis:{type:'value',name:'成本占比%',nameTextStyle:{color:'#8892b0'},axisLine:{lineStyle:{color:'#2a2a4a'}}},
  yAxis:{type:'category',data:names,axisLabel:{color:'#eaeaea',fontSize:10}},
  series:[{type:'bar',data:bd.map(function(x,i){return {name:x.component_name,value:[x.cost_pct||0,x.value_add_pct||0],itemStyle:{color:x.is_bottleneck?'#e94560':'#4a9eff'}}}),
    label:{show:true,position:'right',fontSize:9,color:'#eaeaea',formatter:function(p){return p.value[1].toFixed(1)+'x'}}
  }]
});
window.addEventListener('resize',function(){c.resize()});
})();

// === STOCK TABLE ===
(function(){
var rows = D.stocks.map(function(s){
  var r = s.valuation_rating||'';
  var cls = r.indexOf('低估')>=0?'green':r.indexOf('高估')>=0?'red':'yellow';
  return '<tr><td><b>'+s.company_name+'</b></td><td>'+s.ticker+'</td><td>'+s.sector+'</td><td>'+(s.peg_ratio?s.peg_ratio.toFixed(1):'-')+'</td><td>'+(s.pe_digestion_years?s.pe_digestion_years.toFixed(1):'-')+'</td><td><span class="tag '+cls+'">'+r+'</span></td></tr>';
});
document.getElementById('stocktable').innerHTML='<table><thead><tr><th>公司</th><th>代码</th><th>环节</th><th>PEG</th><th>PE消化(年)</th><th>评级</th></tr></thead><tbody>'+rows.join('')+'</tbody></table>';
})();

// === NODE TABLE ===
(function(){
var rows = D.nodes.map(function(n){
  var v = n.composite_score||0;
  var cls = v>=8.5?'green':v>=7?'blue':v>=5?'yellow':'red';
  return '<tr><td><b>'+n.node_name+'</b></td><td>'+n.node_type+'</td><td>'+n.growth_score+'</td><td>'+n.profit_score+'</td><td>'+n.barrier_score+'</td><td><span class="tag '+cls+'">'+v.toFixed(1)+'</span></td><td>'+(n.localization_rate||'-')+'%</td><td><span class="tag '+(n.substitute_risk==='low'?'green':n.substitute_risk==='high'?'red':'yellow')+'">'+n.substitute_risk+'</span></td><td>'+n.pricing_power+'</td></tr>';
});
document.getElementById('nodetable').innerHTML='<table><thead><tr><th>环节</th><th>类型</th><th>增长</th><th>利润</th><th>壁垒</th><th>综合</th><th>国产化率</th><th>替代风险</th><th>溢价权</th></tr></thead><tbody>'+rows.join('')+'</tbody></table>';
})();
</script>
</body>
</html>
