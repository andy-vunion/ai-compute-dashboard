// ── Entity graph helpers ──
function getNodeCompanies(nodeName) {
  // companies that compete_in this node
  const direct = EG.filter(e => e.source_type==='company' && e.target_type==='node' && e.target_id===nodeName).map(e=>e.source_id);
  // also by sector match
  const nodeObj = NODES.find(n=>n.node_name===nodeName);
  return STOCKS.filter(s => direct.includes(s.company_name) || (nodeObj && s.sector && (s.sector.includes(nodeName)||nodeName.includes(s.sector))));
}
function getCompanyProducts(companyName) {
  const prods = EG.filter(e => e.source_type==='company' && e.target_type==='product' && e.source_id===companyName).map(e=>e.target_id);
  return [...new Set(prods)].map(p => BOM.filter(b=>b.product_name===p));
}
function getProductComponents(productName) {
  return BOM.filter(b=>b.product_name===productName);
}
function getComponentPrice(compName) {
  return PRICES.filter(p => p.item_name.includes(compName) || compName.includes(p.item_name.replace(/[（(].*/,'')));
}
function getNodeNews(nodeName) {
  const nodeObj = NODES.find(n=>n.node_name===nodeName);
  return NEWS.filter(n => {
    const area = n.impact_area||'';
    const title = n.title||'';
    if(area===nodeName||title.includes(nodeName)) return true;
    if(nodeObj){
      const comps = getNodeCompanies(nodeName);
      return comps.some(c=>title.includes(c.company_name));
    }
    return false;
  });
}
function getNodePrices(nodeName) {
  const comps = getNodeCompanies(nodeName);
  const compNames = comps.map(c=>c.company_name);
  return PRICES.filter(p => {
    const n = p.item_name||'';
    return n.includes(nodeName) || compNames.some(cn=>n.includes(cn)) || (nodeName.includes('光') && n.includes('光')) || (nodeName.includes('PCB') && n.includes('PCB')) || (nodeName.includes('HBM') && n.includes('HBM')) || (nodeName.includes('服务器') && n.includes('服务器'));
  });
}
function getCompanyNews(ticker) {
  const s = STOCKS.find(x=>x.ticker===ticker);
  if(!s) return [];
  return NEWS.filter(n => (n.title||'').includes(s.company_name) || (n.impact_area||'').includes(s.sector));
}
function getCompanyPrices(ticker) {
  const s = STOCKS.find(x=>x.ticker===ticker);
  if(!s) return [];
  return PRICES.filter(p => (p.item_name||'').includes(s.sector) || (s.sector && s.sector.split('/').some(sec=>(p.item_name||'').includes(sec))));
}

// ── Navigation ──
function navTo(hash) {
  window.location.hash = hash;
}

function parsedHash() {
  const h = decodeURIComponent(window.location.hash||'#dashboard');
  const [base,...rest] = h.split('/');
  return {base, arg: rest.join('/')};
}

function setNavActive(base) {
  const map = {
    '#dashboard':'#dashboard','#nodes':'#nodes','#companies':'#companies',
    '#bom':'#bom','#news':'#news','#price':'#price',
    '#node':'#nodes','#company':'#companies','#product':'#bom','#component':'#bom'
  };
  const target = map[base]||base;
  document.querySelectorAll('.ni').forEach(el=>{
    el.classList.toggle('active', el.dataset.hash===target);
  });
}

function setBreadcrumb(items) {
  const bc = document.getElementById('bc');
  bc.innerHTML = items.map((it,i)=>{
    if(i===items.length-1) return `<span class="bci last">${it.label}</span>`;
    return `<span class="bci" onclick="navTo('${it.hash}')">${it.label}</span><span class="bc-sep">›</span>`;
  }).join('');
}

// ── Utilities ──
function scoreColor(v) {
  if(v>=8.5) return '#f85149';
  if(v>=7)   return '#e3b341';
  return '#3fb950';
}
function nodeTypeLabel(t) {
  const m={upstream:'上游',midstream:'中游',downstream:'下游',support:'支撑'};
  return m[t]||t;
}
function nodeTypeClass(t) {
  return {upstream:'nt-up',midstream:'nt-mid',downstream:'nt-down',support:'nt-sup'}[t]||'nt-up';
}
function directionBadge(d) {
  if(d==='bullish') return '<span class="badge b-green">利多</span>';
  if(d==='bearish') return '<span class="badge b-red">利空</span>';
  return '<span class="badge b-gray">中性</span>';
}
function priceTrend(pct) {
  if(pct===null||pct===undefined) return '<span class="price-flat">-</span>';
  const sign = pct>0?'+':'';
  const cls = pct>0?'price-up':pct<0?'price-down':'price-flat';
  return `<span class="${cls}">${sign}${pct.toFixed(1)}%</span>`;
}
function scoreBar(v, max=10) {
  const pct = Math.round((v/max)*100);
  const color = scoreColor(v);
  return `<div class="score-bar"><div class="score-track"><div class="score-fill" style="width:${pct}%;background:${color}"></div></div><span style="font-size:11px;color:${color};width:28px;text-align:right">${v}</span></div>`;
}
function esc(s) {
  if(!s) return '';
  return String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

  const el = document.getElementById(id);

  if(_charts[id]) { try{_charts[id].dispose();}catch(e){} }

  _charts[id] = echarts.init(el, 'dark');
  return _charts[id];
}

// ── Topology chart ──
function drawTopology(filterNode) {
  const chart = getChart('topo-chart', 500);
  if(!chart) return;

  // color by type
  const typeColor = {upstream:'#79c0ff',midstream:'#f78166',downstream:'#56d364',support:'#bc8cff'};
  const typeSymbol = {upstream:'roundRect',midstream:'diamond',downstream:'circle',support:'triangle'};

  // Node positions: arrange in lanes
  const lanes = {upstream:[], midstream:[], downstream:[], support:[]};
  NODES.forEach(n => (lanes[n.node_type]||lanes.support).push(n));

  const posMap = {};
  const laneX = {upstream:150, midstream:400, downstream:600, support:720};
  Object.entries(lanes).forEach(([type, ns])=>{
    const step = ns.length>1 ? 400/(ns.length-1) : 0;
    const startY = ns.length>1 ? 50 : 250;
    ns.forEach((n,i)=>{
      posMap[n.node_name] = {x: laneX[type], y: startY + i*step};
    });
  });

  const gdata = NODES.map(n=>{
    const pos = posMap[n.node_name]||{x:400,y:250};
    const isFilter = filterNode===n.node_name;
    const sz = isFilter ? 60 : Math.max(35, Math.round(n.composite_score*4));
    const comps = getNodeCompanies(n.node_name);
    return {
      id: n.node_name,
      name: n.node_name,
      x: pos.x, y: pos.y,
      symbolSize: sz,
      symbol: typeSymbol[n.node_type]||'circle',
      itemStyle: {
        color: isFilter ? '#f5c518' : typeColor[n.node_type]||'#79c0ff',
        borderColor: isFilter?'#fff':'transparent',
        borderWidth: isFilter?2:0,
        opacity: filterNode&&!isFilter ? 0.45 : 1
      },
      label: {
        show: true,
        color: '#e6edf3',
        fontSize: isFilter?12:11,
        fontWeight: isFilter?'bold':'normal',
        formatter: n.node_name + (n.composite_score?'\n'+n.composite_score:'')
      },
      tooltip: {
        formatter: `<b>${n.node_name}</b><br/>类型: ${nodeTypeLabel(n.node_type)}<br/>综合: ${n.composite_score}<br/>成长: ${n.growth_score} 利润: ${n.profit_score} 壁垒: ${n.barrier_score}<br/>相关标的: ${comps.map(c=>c.company_name).join(', ')||'暂无'}`
      }
    };
  });

  // edges from EG
  const nodeRels = EG.filter(e=>e.source_type==='node'&&e.target_type==='node'&&(e.relation_type==='upstream_of'||e.relation_type==='supports'));
  const edgeColor = {upstream_of:'#79c0ff', supports:'#bc8cff'};
  const gedges = nodeRels.map(e=>({
    source: e.source_id,
    target: e.target_id,
    lineStyle: {
      color: edgeColor[e.relation_type]||'#30363d',
      width: 1.5,
      opacity: filterNode ? 0.25 : 0.6,
      type: e.relation_type==='supports'?'dashed':'solid'
    },
    symbol: ['none','arrow'],
    symbolSize: [0,6]
  }));

  chart.setOption({
    backgroundColor:'transparent',
    tooltip:{trigger:'item'},
    series:[{
      type:'graph', layout:'none', roam:true, draggable:false,
      emphasis:{focus:'adjacency'},
      nodes: gdata,
      edges: gedges,
      label:{show:true,position:'bottom',color:'#e6edf3',fontSize:10},
      edgeSymbol:['none','arrow'],
      edgeSymbolSize:[0,7],
      lineStyle:{color:'#30363d',width:1.5},
    }],
    legend:[
      {data:[{name:'上游',icon:'roundRect'},{name:'中游',icon:'diamond'},{name:'下游',icon:'circle'},{name:'支撑',icon:'triangle'}],
       left:10, top:10, textStyle:{color:'#8b949e',fontSize:10},
       itemWidth:12, itemHeight:8,
       formatter:(n)=>{const m={上游:'upstream',中游:'midstream',下游:'downstream',支撑:'support'}; return n;}
      }
    ]
  });

  chart.off('click');
  chart.on('click', params=>{
    if(params.dataType==='node') {
      navTo('#node/' + params.name);
    }
  });
}

// ── Page: BOM ──
function renderBom() {
  setNavActive('#bom');
  setBreadcrumb([{label:'看板总览',hash:'#dashboard'},{label:'BOM拆解',hash:'#bom'}]);
  const products = [...new Set(BOM.map(b=>b.product_name))];
  const tabs = products.map((p,i)=>`<div class="tab ${i===0?'active':''}" onclick="switchBomTab('${encodeURIComponent(p)}',this)">${esc(p)}</div>`).join('');
  document.getElementById('content').innerHTML = `
  <div class="tabs">${tabs}</div>
  <div id="bom-content">${renderBomProduct(products[0])}</div>`;
}

function switchBomTab(productEnc, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('bom-content').innerHTML = renderBomProduct(decodeURIComponent(productEnc));
  setTimeout(()=>drawBomChart(decodeURIComponent(productEnc)),50);
}

function renderBomProduct(productName) {
  const comps = BOM.filter(b=>b.product_name===productName&&b.component_level===1);
  const total = comps.reduce((s,c)=>s+(c.total_cost_usd||0),0);
  const html = `
  <div class="g2" style="margin-bottom:16px">
    <div class="card">
      <div class="card-title">成本结构</div>
      <div id="bom-chart-${encodeURIComponent(productName)}" class="ch ch-md"></div>
    </div>
    <div class="card">
      <div class="card-title">产品信息</div>
      <div class="stats-row">
        <div class="stat"><div class="sl">总成本</div><div class="sv" style="font-size:16px">$${total.toLocaleString()}</div><div class="sd">USD</div></div>
        <div class="stat"><div class="sl">组件数</div><div class="sv">${comps.length}</div></div>
      </div>
      <div style="margin-top:12px">
        <span class="back-btn" onclick="navTo('#product/${encodeURIComponent(productName)}')">📊 查看详情页 →</span>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">组件清单</div>
    <div class="tw">${renderBomTable(comps)}</div>
  </div>`;
  setTimeout(()=>drawBomChart(productName),100);
  return html;
}

function renderBomTable(comps) {
  return `<table><thead><tr>
    <th>组件</th><th>供应商</th><th>国家</th><th>单价(USD)</th><th>占比</th><th>最新价格</th><th>1M涨跌</th><th>瓶颈</th>
  </tr></thead><tbody>
  ${comps.map(c=>{
    const prices = getComponentPrice(c.component_name);
    const pObj = prices[0];
    return `<tr onclick="navTo('#component/${encodeURIComponent(c.component_name)}')" style="cursor:pointer">
      <td><strong>${esc(c.component_name)}</strong>${c.is_bottleneck?'<span class="badge b-red" style="margin-left:6px;font-size:10px">卡点</span>':''}</td>
      <td>${esc(c.supplier||'-')}</td>
      <td><span class="badge b-gray">${esc(c.supplier_country||'-')}</span></td>
      <td>$${(c.unit_cost_usd||0).toLocaleString()}</td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <div style="width:${Math.round((c.cost_pct||0))}px;max-width:80px;height:5px;background:var(--a2);border-radius:2px"></div>
          <span style="color:var(--a2)">${(c.cost_pct||0).toFixed(1)}%</span>
        </div>
      </td>
      <td>${pObj?pObj.latest_price+' '+pObj.unit:'<span style="color:var(--t2)">-</span>'}</td>
      <td>${pObj?priceTrend(pObj.price_change_pct):'<span style="color:var(--t2)">-</span>'}</td>
      <td>${c.substitute_available==='limited'?'<span class="badge b-red">受限</span>':c.substitute_available==='available'?'<span class="badge b-green">可替代</span>':'<span class="badge b-gray">-</span>'}</td>
    </tr>`;
  }).join('')}
  </tbody></table>`;
}

function drawBomChart(productName) {
  const chartId = 'bom-chart-'+encodeURIComponent(productName);
  const chart = getChart(chartId, 300);
  if(!chart) return;
  const comps = BOM.filter(b=>b.product_name===productName&&b.component_level===1).sort((a,b)=>(b.cost_pct||0)-(a.cost_pct||0));
  chart.setOption({
    backgroundColor:'transparent',
    tooltip:{trigger:'item',formatter:p=>`${p.name}<br/>占比: ${p.value.toFixed(1)}%<br/>供应商: ${comps[p.dataIndex]?.supplier||'-'}`},
    series:[{
      type:'pie',radius:['35%','65%'],
      data: comps.map(c=>({name:c.component_name,value:c.cost_pct||0,
        itemStyle:{borderColor:'#161b22',borderWidth:2}
      })),
      label:{color:'#e6edf3',fontSize:11},
      emphasis:{itemStyle:{shadowBlur:10,shadowColor:'rgba(0,0,0,.5)'}}
    }]
  });
  chart.off('click');
  chart.on('click', params=>{
    if(params.name) navTo('#component/'+encodeURIComponent(params.name));
  });
}

function renderProductDetail(productName) {

  const comps = getProductComponents(productName);
  const l1 = comps.filter(c=>c.component_level===1);
  document.getElementById('content').innerHTML = `
  <div class="back-btn" onclick="navTo('#bom')">← 返回BOM拆解</div>
  <h2 style="font-size:18px;margin-bottom:16px">${esc(productName)}</h2>
  <div class="g2" style="margin-bottom:16px">
    <div class="card">
      <div class="card-title">成本饼图</div>
      <div id="prod-chart" class="ch ch-md"></div>
    </div>
    <div class="card">
      <div class="card-title">相关标的</div>
      ${STOCKS.map(s=>`
        <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(48,54,61,.4);cursor:pointer" onclick="navTo('#company/${s.ticker}')">

  document.getElementById('content').innerHTML = `
  <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
    <div class="back-btn" onclick="navTo('#product/${encodeURIComponent(comp.product_name)}')">← 返回 ${esc(comp.product_name)}</div>

// ── Page: Price ──
function renderPrice() {
  setNavActive('#price');
  setBreadcrumb([{label:'看板总览',hash:'#dashboard'},{label:'价格追踪',hash:'#price'}]);
  document.getElementById('content').innerHTML = `
  <div class="card">
    <div class="card-title">价格追踪 (${PRICES.length}条)</div>
    ${renderPriceTable(PRICES)}
  </div>
  <div class="card">
    <div class="card-title">价格走势图</div>
    <div id="price-chart" class="ch ch-md"></div>
  </div>`;
  setTimeout(()=>{
    const chart = getChart('price-chart',300);
    if(!chart) return;
    const sorted = [...PRICES].sort((a,b)=>(b.price_change_pct||0)-(a.price_change_pct||0));
    chart.setOption({
      backgroundColor:'transparent',
      tooltip:{trigger:'axis',axisPointer:{type:'shadow'}},
      xAxis:{type:'category',data:sorted.map(p=>p.item_name),axisLabel:{color:'#8b949e',rotate:20,fontSize:10},axisLine:{lineStyle:{color:'#30363d'}}},
      yAxis:{name:'1M涨跌%',nameTextStyle:{color:'#8b949e'},axisLabel:{color:'#8b949e'},splitLine:{lineStyle:{color:'#1c2128'}}},
      series:[{type:'bar',data:sorted.map(p=>({value:p.price_change_pct||0,itemStyle:{color:(p.price_change_pct||0)>=0?'#f85149':'#3fb950'}})),

function renderPriceTable(list) {
  if(!list||!list.length) return '<div class="empty-state">暂无价格数据</div>';

  <tbody>${list.map(p=>`<tr>
    <td><strong>${esc(p.item_name)}</strong></td>
    <td><span class="badge b-gray">${esc(p.item_type||'-')}</span></td>
    <td style="font-size:13px;font-weight:600">${p.latest_price||'-'}</td>
    <td style="color:var(--t2);font-size:11px">${esc(p.unit||'')}</td>
    <td>${priceTrend(p.price_change_pct)}</td>
    <td>${priceTrend(p.price_change_3m)}</td>
    <td>${esc(p.price_trend||'-')}</td>
    <td>${esc(p.signal||'-')}</td>
  </tr>`).join('')}</tbody></table>`;
}

// ── Main router ──
function render() {
  const {base, arg} = parsedHash();
  // parse query
  const qidx = base.indexOf('?');
  const cleanBase = qidx>=0 ? base.slice(0,qidx) : base;
  const query = qidx>=0 ? base.slice(qidx+1) : '';
  const qparams = {};
  query.split('&').forEach(kv=>{const[k,v]=kv.split('='); if(k) qparams[k]=decodeURIComponent(v||'');});

  switch(cleanBase) {
    case '#dashboard':
    case '#':
    case '':
      renderDashboard(qparams.node||null);
      break;
    case '#nodes':
      renderNodes();
      break;
    case '#node':
      renderNodeDetail(decodeURIComponent(arg));
      break;
    case '#companies':
      renderCompanies();
      break;
    case '#company':
      renderCompanyDetail(decodeURIComponent(arg));
      break;
    case '#bom':
      renderBom();
      break;
    case '#product':
      renderProductDetail(decodeURIComponent(arg));
      break;
    case '#component':
      renderComponentDetail(decodeURIComponent(arg));
      break;
    case '#news':
      renderNews();
      break;
    case '#price':
      renderPrice();
      break;
    default:
      renderDashboard(null);
  }
}

window.addEventListener('hashchange', render);
window.addEventListener('load', ()=>{
  if(!window.location.hash||window.location.hash==='#') window.location.hash='#dashboard';
  else render();
});
render();
</script>
