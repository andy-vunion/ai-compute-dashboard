<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI算力产业链研究仪表盘</title>
<style>

*{margin:0;padding:0;box-sizing:border-box}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#06080e}::-webkit-scrollbar-thumb{background:#1e2a3a;border-radius:3px}::-webkit-scrollbar-thumb:hover{background:#4f8eff}
body{background:#06080e;color:#c9d1d9;font-family:-apple-system,'PingFang SC','Microsoft YaHei','Segoe UI',sans-serif;font-size:14px;overflow:hidden;height:100vh}
.layout{display:flex;height:100vh}
.main-area{flex:1;margin-right:340px;overflow-y:auto;padding:20px 24px}
.right-panel{width:340px;position:fixed;right:0;top:0;height:100vh;background:#0a0e16;border-left:1px solid #1e2a3a;display:flex;flex-direction:column;padding:16px;z-index:100}
header{padding:12px 0 16px;display:flex;align-items:center;gap:16px;animation:fadeIn .5s}
header h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,#4f8eff,#7c4dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header .badge{font-size:11px;padding:4px 10px;background:rgba(79,142,255,.15);color:#4f8eff;border-radius:20px;border:1px solid rgba(79,142,255,.3)}
.macro-row{display:flex;gap:14px;margin-bottom:22px;animation:fadeIn .6s ease-out}
.macro-card{flex:1;background:linear-gradient(145deg,#0d1117,#161b22);border:1px solid #1e2a3a;border-radius:14px;padding:18px 14px;text-align:center;transition:transform .3s,box-shadow .3s;position:relative;overflow:hidden}
.macro-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#4f8eff,#7c4dff);opacity:.7}
.macro-card:hover{transform:translateY(-5px);box-shadow:0 8px 30px rgba(79,142,255,.12)}
.macro-card .label{font-size:12px;color:#8b949e;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.macro-card .value{font-size:26px;font-weight:700;color:#e6edf3}
.macro-card .sub{font-size:11px;color:#8b949e;margin-top:4px}
.macro-card .value.green{color:#3fb950}.macro-card .value.blue{color:#4f8eff}.macro-card .value.gold{color:#d29922}
.sector-section{display:flex;gap:14px;margin-bottom:22px;animation:slideUp .6s ease-out}
.sector-list{width:240px;flex-shrink:0;background:#0d1117;border:1px solid #1e2a3a;border-radius:14px;padding:14px;overflow-y:auto;max-height:520px}
.sector-list h3,.sector-list .legend{position:sticky;top:0;z-index:10;background:#0d1117;padding-bottom:8px}
.sector-list h3{font-size:14px;margin-bottom:10px;color:#e6edf3}
.legend{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #1e2a3a}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#8b949e}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sector-item{padding:10px 12px;border-radius:8px;cursor:pointer;margin-bottom:4px;transition:all .25s;border-left:3px solid transparent;display:flex;align-items:center;gap:8px;font-size:13px}
.sector-item:hover{background:rgba(79,142,255,.08)}
.sector-item.active{background:rgba(79,142,255,.12);border-left-color:#4f8eff}
.sector-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sector-item .score{margin-left:auto;font-size:12px;font-weight:600;color:#4f8eff}
.sector-detail{width:420px;flex-shrink:0;background:#0d1117;border:1px solid #1e2a3a;border-radius:14px;padding:18px;overflow-y:auto;max-height:520px}
.sector-detail h3{font-size:16px;margin-bottom:12px;color:#e6edf3}
.sector-detail .empty{color:#484f58;font-size:13px;text-align:center;padding-top:40px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.detail-metric{background:#161b22;border-radius:8px;padding:10px;text-align:center}
.detail-metric .dm-label{font-size:11px;color:#8b949e}
.detail-metric .dm-value{font-size:18px;font-weight:700;margin-top:2px}
.detail-tags{display:flex;flex-wrap:wrap;gap:4px;margin:8px 0}
.detail-tag{font-size:11px;padding:3px 8px;border-radius:12px;background:rgba(79,142,255,.1);color:#79a8ff}
.detail-tag.risk{background:rgba(255,68,68,.1);color:#ff6b6b}
.detail-section{margin-bottom:12px}
.detail-section h4{font-size:12px;color:#8b949e;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.progress-bar{height:6px;background:#161b22;border-radius:3px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;border-radius:3px;transition:width .5s}
.company-cards{flex:1;display:flex;flex-wrap:wrap;gap:12px;align-content:flex-start;overflow-y:auto;max-height:520px;padding:2px}
.flip-card{width:195px;height:270px;perspective:1000px;cursor:pointer;transition:transform .3s}
.flip-card:hover{transform:translateY(-3px)}
.flip-card-inner{position:relative;width:100%;height:100%;transition:transform .65s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d}
.flip-card.flipped .flip-card-inner{transform:rotateY(180deg)}
.flip-card-front,.flip-card-back{position:absolute;width:100%;height:100%;-webkit-backface-visibility:hidden;backface-visibility:hidden;border-radius:12px;border:1px solid #1e2a3a;background:#0d1117;overflow:hidden}
.flip-card-front{display:flex;flex-direction:column;padding:14px}
.flip-card-front:hover{box-shadow:0 6px 24px rgba(79,142,255,.1)}
.flip-card-front .company-name{font-size:15px;font-weight:700;color:#e6edf3;margin-bottom:2px}
.flip-card-front .company-ticker{font-size:12px;color:#4f8eff;margin-bottom:10px}
.flip-card-front .company-sector{font-size:11px;color:#8b949e;margin-bottom:12px;padding:3px 8px;background:#161b22;border-radius:12px;display:inline-block}
.flip-card-front .metrics{flex:1;display:flex;flex-direction:column;gap:8px}
.metric-row{display:flex;justify-content:space-between;align-items:center;font-size:12px}
.metric-row .ml{color:#8b949e}.metric-row .mv{font-weight:600}
.mv.good{color:#3fb950}.mv.warn{color:#d29922}.mv.bad{color:#f85149}
.flip-hint{font-size:10px;color:#484f58;text-align:center;margin-top:auto;padding-top:6px}
.flip-card-back{transform:rotateY(180deg);display:flex;flex-direction:column;padding:0}
.back-tabs{display:flex;border-bottom:1px solid #1e2a3a;flex-shrink:0}
.back-tab{flex:1;padding:8px 4px;font-size:10px;text-align:center;cursor:pointer;color:#8b949e;border-bottom:2px solid transparent;transition:all .2s;background:#0a0e16}
.back-tab.active{color:#4f8eff;border-bottom-color:#4f8eff;background:#0d1117}
.back-content{flex:1;overflow-y:auto;padding:10px 12px;font-size:11px;line-height:1.6;color:#c9d1d9}
.bom-section{animation:slideUp .8s ease-out}
.bom-section h3{font-size:16px;margin-bottom:12px;color:#e6edf3}
.bom-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.bom-tab{padding:7px 14px;background:#161b22;border:1px solid #1e2a3a;border-radius:8px;cursor:pointer;font-size:12px;color:#8b949e;transition:all .25s;white-space:nowrap}
.bom-tab:hover{border-color:#4f8eff;color:#c9d1d9}
.bom-tab.active{background:#4f8eff;border-color:#4f8eff;color:#fff}
.bom-table-wrap{overflow-x:auto;background:#0d1117;border:1px solid #1e2a3a;border-radius:14px;max-height:500px;overflow-y:auto}
table.bom-table{width:100%;border-collapse:collapse;font-size:12px;min-width:1100px}
.bom-table th{background:#0a0e16;padding:10px 8px;text-align:left;cursor:pointer;user-select:none;border-bottom:2px solid #1e2a3a;color:#8b949e;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.3px;position:sticky;top:0;z-index:1}
.bom-table th:hover{color:#4f8eff}
.bom-table th .sort-arrow{margin-left:4px;font-size:10px}
.bom-table td{padding:8px;border-bottom:1px solid rgba(30,42,58,.5);vertical-align:top}
.bom-table tr{transition:background .2s}
.bom-table tr:hover{background:rgba(79,142,255,.04)}
.bom-table tr.bottleneck{background:rgba(248,81,73,.06)}
.bom-table tr.bottleneck td:first-child{border-left:3px solid #f85149}
.indent-1{padding-left:8px!important}
.indent-2{padding-left:28px!important}
.indent-3{padding-left:48px!important}
.bottleneck-badge{display:inline-block;font-size:10px;padding:2px 6px;background:rgba(248,81,73,.15);color:#f85149;border-radius:4px;margin-left:4px}
.sub-badge{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px}
.sub-badge.yes{background:rgba(63,185,80,.12);color:#3fb950}
.sub-badge.partial{background:rgba(210,153,34,.12);color:#d29922}
.sub-badge.limited{background:rgba(248,81,73,.12);color:#f85149}
.sub-badge.no{background:rgba(248,81,73,.2);color:#f85149}
.rp-title{font-size:13px;font-weight:600;color:#e6edf3;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.rp-title .dot-live{width:6px;height:6px;border-radius:50%;background:#3fb950;animation:pulse 2s infinite}
.search-box{position:relative;margin-bottom:14px}
.search-box input{width:100%;padding:10px 14px 10px 36px;background:#161b22;border:1px solid #1e2a3a;border-radius:10px;color:#c9d1d9;font-size:13px;outline:none;transition:border-color .2s}
.search-box input:focus{border-color:#4f8eff}
.search-box .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#484f58;font-size:14px}
.search-results{position:absolute;top:100%;left:0;right:0;background:#161b22;border:1px solid #1e2a3a;border-radius:8px;max-height:200px;overflow-y:auto;z-index:200;display:none}
.search-results.show{display:block}
.search-result-item{padding:8px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid #1e2a3a}
.search-result-item:hover{background:rgba(79,142,255,.08)}
.news-timeline{flex:1;overflow:hidden;position:relative;min-height:0}
.news-scroll{display:flex;flex-direction:column}
.news-item{padding:12px;border-left:3px solid #4f8eff;margin-bottom:8px;background:#0d1117;border-radius:0 10px 10px 0;transition:transform .2s;flex-shrink:0}
.news-item:hover{transform:translateX(4px)}
.news-item .news-time{font-size:10px;color:#484f58;margin-bottom:4px}
.news-item .news-title{font-size:12px;font-weight:600;color:#e6edf3;margin-bottom:4px;line-height:1.4}
.news-item .news-summary{font-size:11px;color:#8b949e;line-height:1.4}
.news-item .news-meta{display:flex;gap:6px;margin-top:6px;align-items:center}
.news-badge{font-size:10px;padding:2px 6px;border-radius:4px}
.news-badge.bullish{background:rgba(63,185,80,.12);color:#3fb950}
.news-badge.bearish{background:rgba(248,81,73,.12);color:#f85149}
.impact-dots{display:flex;gap:2px;align-items:center}
.impact-dot{width:5px;height:5px;border-radius:50%;background:#1e2a3a}
.impact-dot.filled{background:#4f8eff}
.price-section{border-top:1px solid #1e2a3a;padding-top:12px;flex-shrink:0}
.price-ticker{overflow:hidden}
.price-scroll{display:flex;flex-direction:column}
.price-item{display:flex;align-items:center;padding:8px 10px;margin-bottom:4px;background:#0d1117;border-radius:8px;font-size:12px;transition:transform .2s;flex-shrink:0}
.price-item:hover{transform:translateX(3px);background:#161b22}
.price-name{color:#c9d1d9;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px}
.price-val{font-weight:600;margin-right:8px;white-space:nowrap;font-size:11px}
.price-chg{font-size:11px;font-weight:600;min-width:50px;text-align:right}
.price-chg.up{color:#3fb950}.price-chg.down{color:#f85149}.price-chg.flat{color:#8b949e}
.price-3m{font-size:10px;min-width:42px;text-align:right;margin-left:4px}

.flip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;width:100%}
.flip-card{perspective:1000px;height:200px;cursor:pointer}
.flip-card-inner{position:relative;width:100%;height:100%;transition:transform .5s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d}
.flip-card.flipped .flip-card-inner{transform:rotateY(180deg)}
.flip-card-front,.flip-card-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:12px;border:1px solid #1e2a3a;overflow:hidden}
.flip-card-front{background:#0d1117;padding:10px;display:flex;flex-direction:column;justify-content:space-between}
.flip-card-front:hover{box-shadow:0 4px 20px rgba(79,142,255,.15);transform:translateY(-2px)}
.flip-card-back{background:#0d1117;transform:rotateY(180deg);padding:8px;display:flex;flex-direction:column}
.fc-head{display:flex;justify-content:space-between;align-items:flex-start}
.fc-name{font-size:13px;font-weight:600;color:#e6edf3}
.fc-code{font-size:10px;color:#8b949e}
.fc-sector{font-size:9px;padding:2px 7px;background:rgba(79,142,255,.12);color:#4f8eff;border-radius:10px;cursor:pointer}
.fc-metrics{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:6px}
.fc-m{display:flex;flex-direction:column;gap:1px}
.fc-ml{font-size:9px;color:#484f58;text-transform:uppercase}
.fc-peg{padding:1px 4px;border-radius:3px;font-size:11px;font-weight:600;display:inline-block}
.fc-peg.good{background:rgba(63,185,80,.15);color:#3fb950}
.fc-peg.warn{background:rgba(210,153,34,.15);color:#d29922}
.fc-peg.bad{background:rgba(248,81,73,.15);color:#f85149}
.fc-val.good{color:#3fb950}.fc-val.warn{color:#d29922}.fc-val.bad{color:#f85149}
.fc-flip-hint{font-size:9px;color:#484f58;text-align:center;margin-top:2px}
.back-tabs{display:flex;gap:1px;margin-bottom:4px}
.back-tab{flex:1;font-size:9px;padding:3px 1px;text-align:center;background:#161b22;border-radius:4px;cursor:pointer;color:#8b949e;transition:.2s}
.back-tab:hover{background:#1e2a3a;color:#c9d1d9}
.back-tab.active{background:rgba(79,142,255,.2);color:#4f8eff}
.back-content{flex:1;overflow-y:auto;font-size:10px;line-height:1.5;color:#8b949e;padding:2px 0}
.back-detail-text{white-space:pre-wrap;word-break:break-word}
.back-detail-text b,.back-detail-text strong{color:#e6edf3}
.flip-back-btn{font-size:9px;color:#4f8eff;cursor:pointer;text-align:center;margin-top:2px;padding:3px}
.flip-back-btn:hover{color:#79a8ff}
.source-scroll-wrap{flex-shrink:0;height:80px;overflow:hidden;margin-top:6px;padding-top:4px;border-top:1px solid #1e2a3a}
.source-scroll-inner{animation:sourceScrollUp 40s linear infinite;font-size:9px;color:#484f58;line-height:1.8}
.source-scroll-inner:hover{animation-play-state:paused}
@keyframes sourceScrollUp{0%{transform:translateY(0)}100%{transform:translateY(-50%)}}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

</style>
</head>
<body>

<div class="layout">
  <main class="main-area">
    <header>
      <h1>AI算力产业链研究仪表盘</h1>
      <span class="badge">14 环节 · 27 标的 · 11 产品 · 118 BOM</span>

  <aside class="right-panel">

      <div class="price-ticker" id="priceTicker" style="height:220px;overflow:hidden"></div>

  </aside>
</div>

  var html='<div class="flip-grid">';
  sectorStocks.forEach(function(s){
    var pegColor=s.peg<=1?'good':s.peg<=2?'warn':'bad';
    var valColor=(s.valuation==='合理'||s.valuation==='低估')?'good':s.valuation==='合理偏贵'?'warn':'bad';
    var irrScore=s.irreplaceability.match(/(\d+\.?\d*)\/10/);
    irrScore=irrScore?irrScore[1]:'?';
    var contents=JSON.stringify([s.irreplaceability||'暂无数据',s.techLockin||'暂无数据',s.thesis||'暂无数据',s.risk||'暂无数据']);
    html+='<div class="flip-card" onclick="this.classList.toggle(\'flipped\');var bc=this.querySelector(\'.back-content\');if(bc&&!bc.textContent.trim()){try{bc.innerHTML=JSON.parse(bc.dataset.contents)[0];}catch(e){}}">';
    html+='<div class="flip-card-inner">';
    html+='<div class="flip-card-front">';
    html+='<div class="fc-head"><div><div class="fc-name">'+s.name+'</div><div class="fc-code">'+s.ticker+'</div></div>';
    html+='<div class="fc-sector" onclick="event.stopPropagation();selectSector(\''+s.sector+'\')">'+s.sector+'</div></div>';

    html+='<div class="fc-m"><span class="fc-ml">PE消化</span><span>'+s.peDigestion+'年</span></div>';
    html+='<div class="fc-m"><span class="fc-ml">估值</span><span class="fc-val '+valColor+'">'+s.valuation+'</span></div>';
    html+='</div><div class="fc-flip-hint">点击翻转 →</div></div>';
    html+='<div class="flip-card-back">';
    html+='<div class="back-tabs">';
    ['不可替代','技术锁定','投资逻辑','核心风险'].forEach(function(t,i){
      html+='<div class="back-tab'+(i===0?' active':'')+'" onclick="event.stopPropagation();switchBackTab(this,'+i+')">'+(i+1)+'.'+t+'</div>';

    html+='</div></div></div>';
  });
  html+='</div>';
  container.innerHTML=html;

function renderBomSection(sectorName){
  var section=document.getElementById('bomSection');
  var linked=SECTOR_PRODUCTS[sectorName]||[];
  var allProducts=[];BOM.forEach(function(b){if(allProducts.indexOf(b.product)===-1)allProducts.push(b.product);});
  var products=linked.length?linked:allProducts;
  if(!products.length){section.innerHTML='<h3>BOM 成本拆解</h3><div style="color:#484f58;padding:20px">该环节暂无关联产品</div>';return;}
  var html='<h3>BOM 成本拆解</h3><div class="bom-tabs" id="bomTabs">';
  products.forEach(function(p,i){
    html+='<div class="bom-tab'+(i===0?' active':'')+'" onclick="switchBomTab(this,\''+p.replace(/'/g,"\\'")+'\')">'+p+'</div>';
  });
  html+='</div><div class="bom-table-wrap"><table class="bom-table" id="bomTable"></table></div>';
  section.innerHTML=html;
  currentProduct=products[0];sortCol=null;sortDir=1;
  renderBomTable(currentProduct);
}

function switchBomTab(tabEl,product){
  document.querySelectorAll('.bom-tab').forEach(function(t){t.classList.remove('active');});
  tabEl.classList.add('active');currentProduct=product;sortCol=null;sortDir=1;
  renderBomTable(product);
}

function renderBomTable(product){
  var table=document.getElementById('bomTable');
  var items=BOM.filter(function(b){return b.product===product;});
  var cols=[
    {key:'component',label:'组件名称',w:'200px'},
    {key:'supplier',label:'供应商',w:'160px'},
    {key:'country',label:'产地',w:'100px'},
    {key:'unitCost',label:'单价($)',w:'80px',num:true},
    {key:'qty',label:'数量',w:'50px',num:true},
    {key:'totalCost',label:'总成本($)',w:'90px',num:true},
    {key:'costPct',label:'占比%',w:'70px',num:true},
    {key:'margin',label:'毛利率%',w:'70px',num:true},
    {key:'bottleneck',label:'瓶颈',w:'55px'},
    {key:'substitute',label:'可替代',w:'65px'}
  ];
  var sorted=items.slice();
  if(sortCol){
    var sc=cols.find(function(x){return x.key===sortCol;});
    sorted.sort(function(a,b){
      var va=a[sortCol],vb=b[sortCol];
      if(sc&&sc.num){va=parseFloat(va)||0;vb=parseFloat(vb)||0;}
      else{va=String(va||'');vb=String(vb||'');}
      return(va>vb?1:va<vb?-1:0)*sortDir;
    });
  }
  var html='<thead><tr>';
  cols.forEach(function(c){
    var arrow=sortCol===c.key?(sortDir===1?' ▲':' ▼'):'';
    html+='<th style="min-width:'+c.w+'" onclick="sortBom(\''+c.key+'\')">'+c.label+'<span class="sort-arrow">'+arrow+'</span></th>';
  });
  html+='</tr></thead><tbody>';
  sorted.forEach(function(item){
    var bn=item.bottleneck?'bottleneck':'';
    var indent='indent-'+item.level;
    var flag=getFlag(item.country);
    var subCls=item.substitute==='yes'?'yes':item.substitute==='partial'?'partial':item.substitute==='limited'?'limited':'no';
    var subMap={yes:'可替代',partial:'部分',limited:'受限',no:'不可替','':'不可替','1':'不可替','0':'可替代'};
    var subLabel=subMap[item.substitute]||item.substitute||'不可替';
    var title=(item.subDetail||'').replace(/"/g,'&quot;');
    html+='<tr class="'+bn+'" title="'+title+'">';
    html+='<td class="'+indent+'">'+item.component+(item.bottleneck?'<span class="bottleneck-badge">瓶颈</span>':'')+'</td>';
    html+='<td>'+( item.supplier||'')+'</td>';
    html+='<td>'+flag+' '+(item.country||'')+'</td>';
    html+='<td>'+(item.unitCost!=null?Number(item.unitCost).toLocaleString():'-')+'</td>';
    html+='<td>'+(item.qty||'-')+'</td>';
    html+='<td>'+(item.totalCost!=null?Number(item.totalCost).toLocaleString():'-')+'</td>';
    html+='<td>'+(item.costPct!=null?Number(item.costPct).toFixed(1):'-')+'</td>';
    html+='<td>'+(item.margin!=null?Number(item.margin).toFixed(1):'-')+'</td>';
    html+='<td>'+(item.bottleneck?'<span style="color:#f85149">●</span>':'<span style="color:#3fb950">○</span>')+'</td>';
    html+='<td><span class="sub-badge '+subCls+'">'+subLabel+'</span></td>';
    html+='</tr>';
  });
  html+='</tbody>';
  table.innerHTML=html;
}

function sortBom(col){if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=1;}renderBomTable(currentProduct);}

function renderNews(){
  var container=document.getElementById('newsTimeline');
  var items=NEWS.concat(NEWS);
  var html='<div class="news-scroll" id="newsScroll">';
  items.forEach(function(n){
    var dirCls=n.direction||'bullish';
    var dirLabel=dirCls==='bullish'?'利好':'利空';
    var dots='';for(var i=0;i<5;i++)dots+='<span class="impact-dot'+(i<n.impact?' filled':'')+'"></span>';
    html+='<div class="news-item">';
    html+='<div class="news-time">'+n.time+' · '+(n.source||'')+'</div>';
    html+='<div class="news-title">'+n.title+'</div>';
    html+='<div class="news-summary">'+n.summary+'</div>';
    html+='<div class="news-meta"><span class="news-badge '+dirCls+'">'+dirLabel+'</span><span style="font-size:10px;color:#484f58">'+(n.area||'')+'</span><div class="impact-dots">'+dots+'</div></div>';
    html+='</div>';
  });
  html+='</div>';
  container.innerHTML=html;
  startAutoScroll('newsScroll','newsTimeline',40);
}

function renderSources(){
  var s=DATA_SOURCES.concat(DATA_SOURCES);
  var h='<div class="sources-inner">'+s.map(function(x){return'<div>📄 '+x+'</div>';}).join('')+'</div>';
  document.getElementById('sourceScrollInner').innerHTML=h;
}
function renderPrices(){
  var container=document.getElementById('priceTicker');
  var items=PRICES.concat(PRICES);
  var html='<div class="price-scroll" id="priceScroll">';
  items.forEach(function(p){
    var chg=p.change||0;
    var cls=chg>0?'up':chg<0?'down':'flat';
    var arrow=chg>0?'▲':chg<0?'▼':'—';
    var chg3=p.change3m||0;
    var cls3=chg3>0?'up':chg3<0?'down':'flat';
    html+='<div class="price-item">';
    html+='<span class="price-name" title="'+p.name+'">'+p.name+'</span>';
    html+='<span class="price-val">'+p.price+'</span>';
    html+='<span class="price-chg '+cls+'">'+arrow+Math.abs(chg)+'%</span>';
    html+='<span class="price-3m price-chg '+cls3+'">'+(chg3>0?'+':'')+chg3+'%<sub>3m</sub></span>';
    html+='</div>';
  });
  html+='</div>';
  container.innerHTML=html;
  startAutoScroll('priceScroll','priceTicker',30);
}

function startAutoScroll(scrollId,containerId,speed){
  var scroll=document.getElementById(scrollId);
  var container=document.getElementById(containerId);
  if(!scroll||!container)return;
  var pos=0;var paused=false;
  container.addEventListener('mouseenter',function(){paused=true;});
  container.addEventListener('mouseleave',function(){paused=false;});
  function step(){
    if(!paused){
      pos+=0.5;
      var half=scroll.scrollHeight/2;
      if(pos>=half)pos=0;
      scroll.style.transform='translateY(-'+pos+'px)';
    }
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function initSearch(){
  var input=document.getElementById('searchInput');
  var results=document.getElementById('searchResults');
  input.addEventListener('input',function(){
    var q=this.value.trim().toLowerCase();
    if(!q){results.classList.remove('show');return;}
    var matches=[];
    NODES.forEach(function(n){if(n.name.toLowerCase().indexOf(q)>=0||n.desc.toLowerCase().indexOf(q)>=0)matches.push({type:'sector',name:n.name,sub:TYPE_LABELS[n.type]});});
    STOCKS.forEach(function(s){if(s.name.toLowerCase().indexOf(q)>=0||s.ticker.indexOf(q)>=0)matches.push({type:'stock',name:s.name,sub:s.ticker+' · '+s.sector});});
    BOM.forEach(function(b){if(b.component.toLowerCase().indexOf(q)>=0||(b.supplier||'').toLowerCase().indexOf(q)>=0)matches.push({type:'bom',name:b.component,sub:b.product});});
    matches=matches.slice(0,12);
    if(!matches.length){results.classList.remove('show');return;}
    results.innerHTML=matches.map(function(m){return'<div class="search-result-item" data-type="'+m.type+'" data-name="'+m.name.replace(/"/g,'&quot;')+'" data-sub="'+m.sub.replace(/"/g,'&quot;')+'"><strong>'+m.name+'</strong><br><span style="font-size:10px;color:#8b949e">'+(m.type==='sector'?'环节':m.type==='stock'?'标的':'BOM')+' · '+m.sub+'</span></div>';}).join('');
    results.classList.add('show');
    results.querySelectorAll('.search-result-item').forEach(function(el){
      el.addEventListener('click',function(){
        var type=this.dataset.type;var name=this.dataset.name;
        if(type==='sector')selectSector(name);
        else if(type==='stock'){var s=STOCKS.find(function(x){return x.name===name;});if(s)selectSector(s.sector);}
        else if(type==='bom'){
          var b=BOM.find(function(x){return x.component===name;});
          if(b){var sp=Object.entries(SECTOR_PRODUCTS).find(function(e){return e[1].indexOf(b.product)>=0;});if(sp)selectSector(sp[0]);}
        }
        results.classList.remove('show');input.value='';
      });
    });
  });
  document.addEventListener('click',function(e){if(!e.target.closest('.search-box'))results.classList.remove('show');});
}

document.addEventListener('DOMContentLoaded',init);

</script>
