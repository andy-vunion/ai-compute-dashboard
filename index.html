<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI算力产业链看板</title>
<style>

*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06080e;--surface:#0b1020;--card:#0d1117;
  --upstream:#4f8eff;--midstream:#9b59b6;--downstream:#2ecc71;--support:#f1c40f;
  --green:#3fb950;--red:#f85149;--gold:#d29922;
  --border:#1b2838;--text:#e6edf3;--text2:#8b949e;--text3:#c9d1d9;
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);font-size:13px}
.dashboard{display:grid;grid-template-columns:1fr 280px;height:100vh;overflow:hidden}
.main-area{overflow-y:auto;padding:16px 20px;scrollbar-width:thin;scrollbar-color:#30363d var(--surface)}
.main-area::-webkit-scrollbar{width:6px}
.main-area::-webkit-scrollbar-track{background:var(--surface)}
.main-area::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}

/* ===== HEADER ===== */
.header{display:flex;align-items:center;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.header h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,#4f8eff,#9b59b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
.header-badges{display:flex;gap:8px;flex-wrap:wrap}
.header-badge{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:3px 10px;font-size:11px;color:var(--text2)}
.header-score{margin-left:auto;background:linear-gradient(135deg,#1a3a2a,#0d1117);border:1px solid var(--green);border-radius:8px;padding:4px 12px;font-size:12px;color:var(--green);white-space:nowrap}

/* ===== MACRO ROW ===== */
.macro-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px}
.macro-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;cursor:default;transition:transform .2s,box-shadow .2s}
.macro-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(79,142,255,.15)}
.macro-card .mc-label{font-size:11px;color:var(--text2);margin-bottom:6px}
.macro-card .mc-value{font-size:20px;font-weight:700}
.macro-card .mc-sub{font-size:10px;color:var(--text2);margin-top:4px;line-height:1.4;max-height:0;overflow:hidden;transition:max-height .3s}
.macro-card:hover .mc-sub{max-height:80px}

/* ===== CONTENT AREA ===== */
.content-area{display:grid;grid-template-columns:240px minmax(280px,420px) 1fr;gap:14px;margin-bottom:16px;min-height:440px}

/* Chain column */
.chain-col{display:flex;flex-direction:column;min-height:0}
.legend{position:sticky;top:0;z-index:5;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 10px;display:flex;flex-wrap:wrap;gap:6px 14px;margin-bottom:8px;font-size:11px}
.legend-item{color:var(--c);white-space:nowrap}
.chain-list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#30363d var(--surface)}
.chain-list::-webkit-scrollbar{width:5px}
.chain-list::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
.node-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:all .2s;border-left:3px solid transparent;display:flex;align-items:center;gap:8px}
.node-item:hover{border-color:var(--node-color);background:#111827}
.node-item.active{border-left-color:var(--node-color);background:#111827;box-shadow:0 0 12px rgba(79,142,255,.08)}
.node-dot{width:8px;height:8px;border-radius:50%;background:var(--node-color);flex-shrink:0}
.node-info{flex:1;min-width:0}
.node-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node-score{font-size:11px;color:var(--text2)}
.node-type-badge{font-size:9px;padding:1px 6px;border-radius:8px;color:#fff;flex-shrink:0}

/* ===== DETAIL PANEL ===== */
.detail-panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#30363d var(--card)}
.detail-panel::-webkit-scrollbar{width:5px}
.detail-panel::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
.detail-placeholder{color:var(--text2);text-align:center;padding-top:180px;font-size:14px}
.detail-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.detail-title{font-size:16px;font-weight:700}
.detail-type{font-size:10px;padding:2px 8px;border-radius:8px;color:#fff}
.detail-desc{font-size:12px;color:var(--text3);line-height:1.6;margin-bottom:14px}
.detail-scores{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.score-item{background:var(--surface);border-radius:6px;padding:8px}
.score-label{font-size:10px;color:var(--text2);margin-bottom:4px}
.score-bar{height:6px;background:#1b2838;border-radius:3px;overflow:hidden}
.score-fill{height:100%;border-radius:3px;transition:width .6s ease}
.score-val{font-size:11px;font-weight:600;margin-top:3px}
.detail-metrics{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.metric-item{background:var(--surface);border-radius:6px;padding:8px}
.metric-label{font-size:10px;color:var(--text2)}
.metric-value{font-size:13px;font-weight:600;margin-top:2px}
.detail-section{margin-bottom:12px}
.detail-section-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;border-bottom:1px solid var(--border);padding-bottom:4px}
.detail-tag{display:inline-block;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:2px 8px;margin:2px;font-size:11px;color:var(--text3)}

/* ===== COMPANY SECTION ===== */
.company-section{overflow-y:auto;scrollbar-width:thin;scrollbar-color:#30363d var(--bg)}
.company-section::-webkit-scrollbar{width:5px}
.company-section::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
.company-header{font-size:14px;font-weight:600;margin-bottom:10px;color:var(--text2)}
.company-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;align-content:start}

/* Flip card */
.flip-card{height:230px;perspective:1000px;cursor:pointer}
.flip-card-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
.flip-card.flipped .flip-card-inner{transform:rotateY(180deg)}
.flip-card-front,.flip-card-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:10px;border:1px solid var(--border);overflow:hidden}
.flip-card-front{background:var(--card);padding:14px;display:flex;flex-direction:column;transition:transform .2s,box-shadow .2s}
.flip-card:not(.flipped):hover .flip-card-front{transform:translateY(-2px);box-shadow:0 4px 16px rgba(79,142,255,.18)}
.flip-card-back{background:var(--card);transform:rotateY(180deg);display:flex;flex-direction:column}
.card-company{font-size:15px;font-weight:700;margin-bottom:2px}
.card-ticker{font-size:11px;color:var(--text2);margin-bottom:6px}
.card-sector{display:inline-block;font-size:10px;padding:2px 8px;border-radius:8px;color:#fff;margin-bottom:8px;align-self:flex-start}
.card-metrics{flex:1;display:flex;flex-direction:column;gap:6px}
.card-metric{display:flex;justify-content:space-between;align-items:center;font-size:11px}
.card-metric-label{color:var(--text2)}
.card-metric-value{font-weight:600}
.card-flip-hint{text-align:center;font-size:10px;color:var(--text2);margin-top:auto;padding-top:4px;opacity:.6}
.peg-tooltip{cursor:help;border-bottom:1px dashed var(--text2)}

/* Card back tabs */
.card-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.card-tab-btn{flex:1;padding:8px 2px;font-size:10px;background:none;border:none;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.card-tab-btn:hover{color:var(--text)}
.card-tab-btn.active{color:var(--upstream);border-bottom-color:var(--upstream)}
.card-tab-content{flex:1;overflow-y:auto;padding:10px 12px;scrollbar-width:thin;scrollbar-color:#30363d var(--card)}
.card-tab-content::-webkit-scrollbar{width:3px}
.card-tab-content::-webkit-scrollbar-thumb{background:#30363d;border-radius:2px}
.card-tab-pane{display:none;font-size:12px;line-height:1.6;color:var(--text3)}
.card-tab-pane.active{display:block}
.card-tab-pane p{margin-bottom:8px}
.card-back-footer{flex-shrink:0;text-align:center;padding:6px;border-top:1px solid var(--border)}
.card-back-footer button{background:none;border:1px solid var(--border);color:var(--text2);padding:3px 12px;border-radius:4px;font-size:10px;cursor:pointer;transition:all .2s}
.card-back-footer button:hover{border-color:var(--upstream);color:var(--upstream)}

/* ===== BOM SECTION ===== */
.bom-section{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px}
.bom-title{font-size:14px;font-weight:600;margin-bottom:10px}
.bom-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.bom-tab{padding:5px 12px;font-size:11px;background:var(--surface);border:1px solid var(--border);border-radius:6px;cursor:pointer;color:var(--text2);transition:all .2s;white-space:nowrap}
.bom-tab:hover{border-color:var(--upstream)}
.bom-tab.active{background:rgba(79,142,255,.12);border-color:var(--upstream);color:var(--upstream)}
.bom-table-wrap{overflow-x:auto;scrollbar-width:thin}
.bom-table{width:100%;border-collapse:collapse;font-size:12px}
.bom-table th{text-align:left;padding:8px 10px;background:var(--surface);color:var(--text2);font-weight:600;border-bottom:1px solid var(--border);white-space:nowrap;font-size:11px}
.bom-table td{padding:7px 10px;border-bottom:1px solid rgba(27,40,56,.5)}
.bom-table tr:hover td{background:rgba(79,142,255,.04)}
.bom-table tr.bottleneck{background:rgba(248,81,73,.06)}
.bom-table tr.bottleneck td:first-child{border-left:3px solid var(--red)}
.bom-empty{text-align:center;color:var(--text2);padding:30px;font-size:13px}

/* ===== RIGHT SIDEBAR ===== */
.right-sidebar{display:flex;flex-direction:column;border-left:1px solid var(--border);background:var(--surface);overflow:hidden}
.search-box{padding:12px;border-bottom:1px solid var(--border);flex-shrink:0}
.search-box input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:12px;outline:none;transition:border-color .2s}
.search-box input:focus{border-color:var(--upstream)}
.search-box input::placeholder{color:var(--text2)}
.sidebar-section{flex:1;display:flex;flex-direction:column;min-height:0;border-bottom:1px solid var(--border);overflow:hidden}
.sidebar-section:last-child{border-bottom:none;flex:0 0 auto;max-height:140px}
.sidebar-section h3{font-size:13px;font-weight:600;padding:10px 12px 6px;flex-shrink:0;color:var(--text2)}
.scroll-container{flex:1;overflow:hidden;position:relative}
.scroll-content{animation:scrollUp var(--scroll-dur,40s) linear infinite}
.scroll-container:hover .scroll-content{animation-play-state:paused}
@keyframes scrollUp{0%{transform:translateY(0)}100%{transform:translateY(-50%)}}

/* News items */
.news-item{padding:8px 12px;border-bottom:1px solid rgba(27,40,56,.4)}
.news-header{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.news-dir{font-size:12px}
.news-title{font-size:12px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.news-time{font-size:10px;color:var(--text2);flex-shrink:0}
.news-summary{font-size:11px;color:var(--text2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.news-area{display:inline-block;font-size:9px;background:rgba(79,142,255,.1);color:var(--upstream);padding:1px 6px;border-radius:4px;margin-top:3px}

/* Price items */
.price-item{display:flex;align-items:center;padding:6px 12px;border-bottom:1px solid rgba(27,40,56,.4);gap:8px}
.price-name{flex:1;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.price-val{font-size:12px;font-weight:600;white-space:nowrap}
.price-change{font-size:11px;font-weight:600;white-space:nowrap;min-width:60px;text-align:right}
.price-up{color:var(--red)}
.price-down{color:var(--green)}
.price-flat{color:var(--text2)}

/* Source items */
.source-tag{display:inline-block;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:4px 10px;margin:3px 4px;font-size:11px;color:var(--text3)}

/* ===== ANIMATIONS ===== */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .4s ease both}

/* PEG colors */
.peg-low{color:var(--green)}
.peg-mid{color:var(--gold)}
.peg-high{color:var(--red)}
.peg-na{color:var(--text2)}

/* Valuation colors */
.val-low{color:var(--green)}
.val-fair{color:var(--gold)}
.val-high{color:var(--red)}

</style>
</head>
<body>
<div class="dashboard">
  <div class="main-area" id="mainArea">
    <header class="header" id="header"></header>
    <div class="macro-row" id="macroRow"></div>
    <div class="content-area">
      <div class="chain-col">
        <div class="legend" id="legend">
          <span class="legend-item" style="--c:#4f8eff">● 上游</span>
          <span class="legend-item" style="--c:#9b59b6">● 中游</span>
          <span class="legend-item" style="--c:#2ecc71">● 下游</span>
          <span class="legend-item" style="--c:#f1c40f">● 底层支撑</span>
        </div>
        <div class="chain-list" id="chainList"></div>
      </div>
      <div class="detail-panel" id="detailPanel">
        <div class="detail-placeholder">← 点击赛道查看详情</div>
      </div>
      <div class="company-section" id="companySection"></div>
    </div>
    <div class="bom-section" id="bomSection"></div>
  </div>
  <div class="right-sidebar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍 搜索赛道/公司..." oninput="handleSearch(this.value)">
    </div>
    <div class="sidebar-section news-panel">
      <h3>📰 新闻动态</h3>
      <div class="scroll-container" id="newsScroll"></div>
    </div>
    <div class="sidebar-section price-panel">
      <h3>💰 价格跟踪</h3>
      <div class="scroll-container" id="priceScroll"></div>
    </div>
    <div class="sidebar-section sources-panel">
      <h3>📚 研报信源</h3>
      <div class="scroll-container" id="sourcesScroll"></div>
    </div>
  </div>
</div>

const FLAG_MAP={
  '中国':'\u{1f1e8}\u{1f1f3}','美国':'\u{1f1fa}\u{1f1f8}','日本':'\u{1f1ef}\u{1f1f5}',

};

let selectedNodeIdx = -1;
let selectedBomProduct = '';
let searchQuery = '';

function getFlags(country) {
  if (!country) return '';
  return country.split('/').map(c => { const t = c.trim(); return FLAG_MAP[t] || t; }).join('');
}

function pegClass(v) {
  if (v == null || v === undefined) return 'peg-na';
  if (v < 1) return 'peg-low';
  if (v <= 2) return 'peg-mid';
  return 'peg-high';
}

function valClass(v) {
  if (!v) return '';
  if (v.includes('低估')) return 'val-low';
  if (v === '合理') return 'val-fair';
  return 'val-high';
}

function extractScore(text) {
  if (!text) return '—';
  const m = text.match(/(\d+\.?\d*)\/10/);
  return m ? m[1] : '—';
}

function formatText(text) {
  if (!text) return '<p>—</p>';
  let t = text.replace(/评分\d+\.?\d*\/10[。.]?\s*/g, '');
  t = t.replace(/([①②③④⑤⑥⑦⑧⑨⑩])/g, '\n$1');
  return t.split('\n').filter(s => s.trim()).map(s => '<p>' + escHtml(s.trim()) + '</p>').join('');
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

/* ===== COMPANIES ===== */
function renderCompanies() {
  var sec = document.getElementById('companySection');
  if (selectedNodeIdx < 0) { sec.innerHTML = ''; return; }
  var node = NODES[selectedNodeIdx];
  var filtered = STOCKS.filter(function(s) { return s.sector === node.name; });
  if (searchQuery) {
    filtered = filtered.filter(function(s) {
      return s.name.includes(searchQuery) || s.ticker.includes(searchQuery) || s.sector.includes(searchQuery);
    });
  }
  var color = TYPE_COLORS[node.type] || '#888';
  sec.innerHTML =
    '<div class="company-header">' + escHtml(node.name) + ' · ' + filtered.length + '家公司</div>' +
    '<div class="company-grid">' +
      filtered.map(function(s, i) { return companyCard(s, i, color); }).join('') +
    '</div>';
}

function companyCard(s, i, sectorColor) {
  var pegVal = (s.peg != null) ? s.peg.toFixed(2) : 'N/A';
  var pegCls = pegClass(s.peg);
  var valCls = valClass(s.valuation);
  var irScore = extractScore(s.irreplaceability);
  var id = 'card_' + s.ticker;

  return '<div class="flip-card fade-in" style="animation-delay:' + (i * 60) + 'ms" id="' + id + '" onclick="flipCard(\'' + id + '\',event)">' +
    '<div class="flip-card-inner">' +
      '<div class="flip-card-front">' +
        '<div class="card-company">' + escHtml(s.name) + '</div>' +
        '<div class="card-ticker">' + s.ticker + '</div>' +
        '<span class="card-sector" style="background:' + sectorColor + '">' + escHtml(s.sector) + '</span>' +
        '<div class="card-metrics">' +
          '<div class="card-metric">' +
            '<span class="card-metric-label">PEG</span>' +
            '<span class="card-metric-value ' + pegCls + ' peg-tooltip" title="PEG = PE ÷ 盈利增速，<1 低估，1-2 合理，>2 高估">' + pegVal + '</span>' +
          '</div>' +
          '<div class="card-metric">' +
            '<span class="card-metric-label">不可替代</span>' +
            '<span class="card-metric-value">' + irScore + '/10</span>' +
          '</div>' +
          '<div class="card-metric">' +
            '<span class="card-metric-label">PE消化</span>' +
            '<span class="card-metric-value">' + (s.peDigest != null ? s.peDigest + '年' : '—') + '</span>' +
          '</div>' +
          '<div class="card-metric">' +
            '<span class="card-metric-label">估值</span>' +
            '<span class="card-metric-value ' + valCls + '">' + escHtml(s.valuation || '—') + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="card-flip-hint">点击翻转 ↩</div>' +
      '</div>' +
      '<div class="flip-card-back">' +
        '<div class="card-tabs">' +
          '<button class="card-tab-btn active" onclick="switchCardTab(event,\'' + id + '\',0)">不可替代</button>' +
          '<button class="card-tab-btn" onclick="switchCardTab(event,\'' + id + '\',1)">技术锁定</button>' +
          '<button class="card-tab-btn" onclick="switchCardTab(event,\'' + id + '\',2)">投资逻辑</button>' +
          '<button class="card-tab-btn" onclick="switchCardTab(event,\'' + id + '\',3)">核心风险</button>' +
        '</div>' +
        '<div class="card-tab-content">' +
          '<div class="card-tab-pane active">' + formatText(s.irreplaceability) + '</div>' +
          '<div class="card-tab-pane">' + formatText(s.techLockin) + '</div>' +
          '<div class="card-tab-pane">' + formatText(s.thesis) + '</div>' +
          '<div class="card-tab-pane">' + formatText(s.risk) + '</div>' +
        '</div>' +
        '<div class="card-back-footer">' +
          '<button onclick="flipCard(\'' + id + '\',event)">↩ 翻转回</button>' +
        '</div>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function flipCard(id, e) {
  e.stopPropagation();
  document.getElementById(id).classList.toggle('flipped');
}

function switchCardTab(e, cardId, tabIdx) {
  e.stopPropagation();
  var card = document.getElementById(cardId);
  var btns = card.querySelectorAll('.card-tab-btn');
  var panes = card.querySelectorAll('.card-tab-pane');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('active', i === tabIdx);
  }
  for (var i = 0; i < panes.length; i++) {
    panes[i].classList.toggle('active', i === tabIdx);
  }
}

/* ===== BOM ===== */
function renderBOM() {
  var sec = document.getElementById('bomSection');
  var products = [];
  var seen = {};
  BOM.forEach(function(b) { if (!seen[b.product]) { seen[b.product] = true; products.push(b.product); } });

  var nodeProducts = [];
  if (selectedNodeIdx >= 0) {
    var nodeName = NODES[selectedNodeIdx].name;
    nodeProducts = GRAPH[nodeName] || [];
  }
  if (!selectedBomProduct && nodeProducts.length > 0) selectedBomProduct = nodeProducts[0];
  else if (!selectedBomProduct && products.length > 0) selectedBomProduct = products[0];

  var rows = BOM.filter(function(b) { return b.product === selectedBomProduct; });

  var tabsHtml = products.map(function(p) {
    var isActive = (p === selectedBomProduct) ? 'active' : '';
    var escapedP = p.replace(/'/g, "\\'");
    return '<div class="bom-tab ' + isActive + '" onclick="selectBomProduct(\'' + escapedP + '\')">' + escHtml(p) + '</div>';
  }).join('');

  var tableHtml = '';
  if (rows.length) {
    tableHtml = '<table class="bom-table"><thead><tr>' +
      '<th>组件名称</th><th>供应商</th><th>产地</th>' +
      '<th>单价($)</th><th>占比%</th><th>毛利率%</th><th>瓶颈</th>' +
    '</tr></thead><tbody>' +
    rows.map(function(r) {
      var cls = r.bottleneck ? 'bottleneck' : '';
      return '<tr class="' + cls + '">' +
        '<td>' + escHtml(r.component) + '</td>' +
        '<td style="font-size:11px">' + escHtml(r.supplier) + '</td>' +
        '<td>' + getFlags(r.country) + '</td>' +
        '<td>' + (r.unitCost != null ? '$' + r.unitCost.toLocaleString() : '—') + '</td>' +
        '<td>' + (r.costPct != null ? r.costPct + '%' : '—') + '</td>' +
        '<td>' + (r.margin != null ? r.margin + '%' : '—') + '</td>' +
        '<td>' + (r.bottleneck ? '⚠️' : '✅') + '</td>' +
      '</tr>';
    }).join('') +
    '</tbody></table>';
  } else {
    tableHtml = '<div class="bom-empty">暂无该产品BOM数据</div>';
  }

  sec.innerHTML =
    '<div class="bom-title">📦 产品BOM拆解</div>' +
    '<div class="bom-tabs">' + tabsHtml + '</div>' +
    '<div class="bom-table-wrap">' + tableHtml + '</div>';
}

function selectBomProduct(p) {
  selectedBomProduct = p;
  renderBOM();
}

        '<span class="news-title">' + escHtml(n.title) + '</span>' +
        '<span class="news-time">' + (n.time || '').substring(5, 10) + '</span>' +
      '</div>' +
      '<div class="news-summary">' + escHtml(n.summary) + '</div>' +
      '<span class="news-area">' + escHtml(n.area) + '</span>' +
    '</div>';
  }).join('');
  var dur = Math.max(NEWS.length * 6, 30);
  container.innerHTML = '<div class="scroll-content" style="--scroll-dur:' + dur + 's">' + items + items + '</div>';
}

/* ===== PRICES ===== */
function renderPrices() {
  var container = document.getElementById('priceScroll');
  var items = PRICES.map(function(p) {
    var ch = p.changePct || 0;
    var cls = ch > 0 ? 'price-up' : (ch < 0 ? 'price-down' : 'price-flat');
    var arrow = ch > 0 ? '↑' : (ch < 0 ? '↓' : '—');
    var prefix = ch > 0 ? '+' : '';
    return '<div class="price-item">' +
      '<span class="price-name">' + escHtml(p.name) + '</span>' +
      '<span class="price-val">' + p.price + ' ' + escHtml(p.unit || '') + '</span>' +
      '<span class="price-change ' + cls + '">' + prefix + ch + '% ' + arrow + '</span>' +
    '</div>';
  }).join('');
  var dur = Math.max(PRICES.length * 4, 30);
  container.innerHTML = '<div class="scroll-content" style="--scroll-dur:' + dur + 's">' + items + items + '</div>';
}

/* ===== SOURCES ===== */
function renderSources() {
  var container = document.getElementById('sourcesScroll');
  var items = SOURCES.map(function(s) {
    return '<span class="source-tag">' + escHtml(s) + '</span>';
  }).join('');
  container.innerHTML = '<div class="scroll-content" style="--scroll-dur:25s"><div style="padding:6px 8px">' + items + items + '</div></div>';
}

/* ===== SEARCH ===== */
function handleSearch(q) {
  searchQuery = q.trim();
  renderChainList();
  if (selectedNodeIdx >= 0) renderCompanies();
}

/* ===== INIT ===== */
document.addEventListener('DOMContentLoaded', function() {
  renderHeader();
  renderMacro();
  renderChainList();
  renderNews();
  renderPrices();
  renderSources();
  if (NODES.length > 0) selectNode(0);
});

</script>
</body>
</html>
