<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI算力产业链投研看板 v8</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#05070e;--surface:#0c1120;--surface2:#111830;--surface3:#162040;
  --border:#1a2545;--border2:#243060;
  --text:#e8ecf4;--text2:#8899bb;--text3:#556688;
  --accent:#4f8eff;--green:#2dd4a0;--red:#f06060;--gold:#e5a530;
  --purple:#9b6dff;--orange:#f0a030;
  --cat-upstream:#4f8eff;--cat-midstream:#9b6dff;--cat-downstream:#2dd4a0;--cat-support:#e5a530;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;font-size:13px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}

#app{display:flex;flex-direction:column;height:100vh}

/* Top Bar */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:linear-gradient(90deg,var(--surface),var(--surface2));border-bottom:1px solid var(--border);min-height:48px;flex-shrink:0}
.top-bar h1{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.top-bar .meta{display:flex;gap:16px;font-size:12px;color:var(--text2)}
.top-bar .meta span{display:flex;align-items:center;gap:4px}
.meta-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Main Layout */
.main-wrap{display:flex;flex:1;overflow:hidden}
.left-main{flex:1;overflow-y:auto;padding:16px 20px}
.right-panel{width:340px;min-width:340px;max-width:340px;border-left:1px solid var(--border);display:flex;flex-direction:column;background:var(--surface);overflow:hidden}

/* Macro Cards */
.macro-row{display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.macro-card{flex:1;min-width:160px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;cursor:default;transition:border-color .2s}
.macro-card:hover{border-color:var(--accent)}
.macro-card .bar{position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0}
.macro-card .label{font-size:11px;color:var(--text2);margin-bottom:6px}
.macro-card .value{font-size:22px;font-weight:700}
.macro-card .sub{font-size:11px;color:var(--text3);margin-top:4px}

/* Section Headers */
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin:20px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.section-hdr h2{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.section-hdr h2::before{content:'';width:3px;height:16px;background:var(--accent);border-radius:2px}

/* Legend */
.legend-bar{display:flex;gap:18px;align-items:center;margin-bottom:14px;padding:8px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:11px;color:var(--text2);flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:10px;height:10px;border-radius:2px}
.legend-line{width:24px;height:4px;border-radius:2px}

/* Chain Grid */
.chain-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.chain-col{display:flex;flex-direction:column;gap:10px}
.chain-col-title{font-size:12px;font-weight:600;padding:6px 10px;border-radius:6px;text-align:center;margin-bottom:2px}
.chain-col[data-cat="upstream"] .chain-col-title{background:rgba(79,142,255,.12);color:var(--cat-upstream);border:1px solid rgba(79,142,255,.25)}
.chain-col[data-cat="midstream"] .chain-col-title{background:rgba(155,109,255,.12);color:var(--cat-midstream);border:1px solid rgba(155,109,255,.25)}
.chain-col[data-cat="downstream"] .chain-col-title{background:rgba(45,212,160,.12);color:var(--cat-downstream);border:1px solid rgba(45,212,160,.25)}
.chain-col[data-cat="support"] .chain-col-title{background:rgba(229,165,48,.12);color:var(--cat-support);border:1px solid rgba(229,165,48,.25)}

/* Node Card */
.node-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;cursor:pointer;transition:all .2s;position:relative}
.node-card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 16px rgba(79,142,255,.12)}
.node-card.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 4px 16px rgba(79,142,255,.15)}
.node-card .name{font-size:13px;font-weight:600;margin-bottom:6px}
.node-card .score{font-size:26px;font-weight:700;margin-bottom:8px}
.node-card .mini-bars{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.mini-bar-row{display:flex;align-items:center;gap:6px}
.mini-bar-icon{font-size:10px;width:14px;text-align:center}
.mini-bar-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.mini-bar-fill{height:100%;border-radius:2px;transition:width .6s ease}
.mini-bar-val{font-size:10px;color:var(--text2);width:20px;text-align:right}
.loc-bar{margin-top:6px}
.loc-label{font-size:10px;color:var(--text2);margin-bottom:3px;display:flex;justify-content:space-between}
.loc-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.loc-fill{height:100%;border-radius:3px;transition:width .6s ease}
.company-badge{display:inline-flex;align-items:center;gap:3px;background:var(--surface3);border:1px solid var(--border);border-radius:10px;padding:2px 8px;font-size:10px;color:var(--text2);margin-top:6px}

/* BOM Section */
.bom-section{margin-top:8px}
.bom-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.bom-tab{padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;background:var(--surface);border:1px solid var(--border);color:var(--text2);transition:all .2s;white-space:nowrap}
.bom-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.bom-tab:hover:not(.active){border-color:var(--accent);color:var(--text)}
.bom-overview{display:flex;gap:12px;margin-bottom:12px}
.bom-stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;flex:1}
.bom-stat .bom-stat-label{font-size:10px;color:var(--text2)}
.bom-stat .bom-stat-val{font-size:18px;font-weight:700;margin-top:2px}
.bom-table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:8px;max-height:340px;overflow-y:auto}
table.bom-table{width:100%;border-collapse:collapse;font-size:12px}
.bom-table th{position:sticky;top:0;background:var(--surface2);padding:8px 10px;text-align:left;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
.bom-table th:hover{color:var(--accent)}
.bom-table th .sort-arrow{font-size:10px;margin-left:3px;opacity:.4}
.bom-table th.sorted .sort-arrow{opacity:1;color:var(--accent)}
.bom-table td{padding:7px 10px;border-bottom:1px solid rgba(26,37,69,.5);white-space:nowrap}
.bom-table tr{transition:background .15s}
.bom-table tr:hover{background:rgba(79,142,255,.06)}
.bom-table tr.bottleneck{background:rgba(240,96,96,.06)}
.bom-table tr.bottleneck td:first-child{border-left:3px solid var(--red)}
.bom-table tr.sub-component{opacity:.75}
.bom-table tr.sub-component td:first-child{padding-left:24px}
.cost-bar-wrap{width:80px;display:inline-flex;align-items:center;gap:4px}
.cost-bar{height:6px;border-radius:3px;background:var(--accent);min-width:2px}
.flag-badge{font-size:14px;letter-spacing:1px}
.bottleneck-tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600;background:rgba(240,96,96,.15);color:var(--red);border:1px solid rgba(240,96,96,.3)}
.bom-table tr{cursor:pointer}

/* Right Panel */
.rp-search{padding:10px 12px;border-bottom:1px solid var(--border)}
.rp-search input{width:100%;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;outline:none;transition:border-color .2s}
.rp-search input:focus{border-color:var(--accent)}
.rp-search input::placeholder{color:var(--text3)}

/* Detail Panel - slides in at top of right panel */
.detail-panel{display:none;padding:14px;border-bottom:1px solid var(--border);background:var(--surface2);overflow-y:auto;max-height:60vh;animation:slideIn .25s ease}
.detail-panel.show{display:block}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.detail-close{float:right;cursor:pointer;color:var(--text3);font-size:16px;padding:2px 6px;border-radius:4px;transition:all .15s}
.detail-close:hover{color:var(--red);background:rgba(240,96,96,.1)}
.detail-title{font-size:15px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.detail-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.detail-metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.dm-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 10px}
.dm-card .dm-label{font-size:10px;color:var(--text2)}
.dm-card .dm-val{font-size:16px;font-weight:700;margin-top:2px}
.detail-text{font-size:11px;color:var(--text2);line-height:1.6;margin:8px 0;padding:8px;background:var(--surface);border-radius:6px;border:1px solid var(--border)}
.detail-text strong{color:var(--text);font-weight:600}
.detail-list{margin:8px 0}
.detail-list-title{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:6px}
.detail-company{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;margin:2px;border-radius:5px;font-size:11px;cursor:pointer;background:var(--surface);border:1px solid var(--border);transition:all .15s}
.detail-company:hover{border-color:var(--accent);color:var(--accent)}
.detail-product{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;margin:2px;border-radius:5px;font-size:11px;cursor:pointer;background:rgba(45,212,160,.08);border:1px solid rgba(45,212,160,.2);color:var(--green);transition:all .15s}
.detail-product:hover{border-color:var(--green);background:rgba(45,212,160,.15)}

/* Stock detail in right panel */
.stock-detail .stock-tags{display:flex;gap:4px;flex-wrap:wrap;margin:6px 0}
.stock-detail .stock-tag{font-size:10px;padding:2px 8px;border-radius:4px;background:var(--surface);border:1px solid var(--border);color:var(--text2);cursor:pointer;transition:all .15s}
.stock-detail .stock-tag:hover{border-color:var(--accent);color:var(--accent)}
.peg-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:13px;font-weight:700}
.peg-green{background:rgba(45,212,160,.12);color:var(--green);border:1px solid rgba(45,212,160,.3)}
.peg-yellow{background:rgba(229,165,48,.12);color:var(--gold);border:1px solid rgba(229,165,48,.3)}
.peg-red{background:rgba(240,96,96,.12);color:var(--red);border:1px solid rgba(240,96,96,.3)}

/* News Timeline */
.rp-section{flex:1;overflow-y:auto;padding:10px 12px}
.rp-section-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:6px;position:sticky;top:0;background:var(--surface);padding:4px 0;z-index:1}
.news-item{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid rgba(26,37,69,.4);cursor:pointer;transition:background .15s}
.news-item:hover{background:rgba(79,142,255,.04)}
.news-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
.news-dot.bullish{background:var(--green);box-shadow:0 0 6px rgba(45,212,160,.4)}
.news-dot.bearish{background:var(--red);box-shadow:0 0 6px rgba(240,96,96,.4)}
.news-dot.neutral{background:var(--text3)}
.news-content{flex:1;min-width:0}
.news-title{font-size:12px;font-weight:500;line-height:1.4;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.news-meta{font-size:10px;color:var(--text3);margin-top:3px;display:flex;gap:8px}
.news-summary{font-size:11px;color:var(--text2);line-height:1.5;margin-top:6px;display:none;padding:6px 8px;background:var(--surface2);border-radius:4px}
.news-item.expanded .news-summary{display:block}
.news-impact{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600}
.news-impact.high{background:rgba(240,96,96,.12);color:var(--red)}
.news-impact.medium{background:rgba(229,165,48,.12);color:var(--gold)}

/* Price Ticker */
.rp-prices{border-top:1px solid var(--border);padding:10px 12px;overflow-y:auto}
.price-item{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(26,37,69,.3)}
.price-name{font-size:11px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.price-val{font-size:12px;font-weight:600;margin:0 8px;white-space:nowrap}
.price-chg{font-size:11px;font-weight:600;padding:2px 6px;border-radius:3px;white-space:nowrap}
.price-chg.up{background:rgba(45,212,160,.1);color:var(--green)}
.price-chg.down{background:rgba(240,96,96,.1);color:var(--red)}

/* Stock Grid in left panel */
.stock-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}
.stock-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;cursor:pointer;transition:all .2s}
.stock-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.stock-card .sc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.stock-card .sc-name{font-size:13px;font-weight:600}
.stock-card .sc-code{font-size:10px;color:var(--text3)}
.stock-card .sc-sector{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;margin-top:2px}
.stock-card .sc-metrics{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:6px}
.stock-card .sc-m{font-size:10px;color:var(--text2)}
.stock-card .sc-m span{font-weight:600;color:var(--text)}

/* BOM component detail */
.comp-detail .cd-supplier{font-size:12px;color:var(--text2);margin:6px 0}
.comp-detail .cd-row{display:flex;justify-content:space-between;padding:4px 0;font-size:11px;border-bottom:1px solid rgba(26,37,69,.3)}
.comp-detail .cd-row .cd-label{color:var(--text2)}
.comp-detail .cd-row .cd-val{font-weight:600}

/* Responsive */
@media(max-width:1200px){.chain-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){.right-panel{display:none}.chain-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app">
  <!-- Top Bar -->
  <div class="top-bar">
    <h1>AI算力产业链投研看板</h1>
    <div class="meta">
      <span><span class="meta-dot"></span> 数据更新: 2026-06-02</span>
      <span>📊 研报: <b id="report-count">0</b> 份</span>
      <span>🔗 产业节点: <b>14</b></span>
      <span>📈 标的: <b>27</b></span>
    </div>
  </div>

  <div class="main-wrap">
    <!-- Left Main Area -->
    <div class="left-main">
      <!-- Macro Cards -->
      <div class="macro-row" id="macro-row"></div>

      <!-- Industry Chain Section -->
      <div class="section-hdr">
        <h2>产业链全景总览</h2>
      </div>

      <!-- Legend -->
      <div class="legend-bar">
        <span style="font-weight:600;color:var(--text)">图例：</span>
        <div class="legend-item"><div class="legend-line" style="background:var(--green)"></div> 增长评分</div>
        <div class="legend-item"><div class="legend-line" style="background:var(--accent)"></div> 利润评分</div>
        <div class="legend-item"><div class="legend-line" style="background:var(--purple)"></div> 壁垒评分</div>
        <span style="margin-left:12px;border-left:1px solid var(--border);padding-left:12px">列分类：</span>
        <div class="legend-item"><div class="legend-dot" style="background:var(--cat-upstream)"></div> 上游核心</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--cat-midstream)"></div> 中游集成</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--cat-downstream)"></div> 下游交付</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--cat-support)"></div> 底层支撑</div>
        <span style="margin-left:12px;border-left:1px solid var(--border);padding-left:12px">国产化率：</span>
        <div class="legend-item"><div class="legend-line" style="background:linear-gradient(90deg,#f06060,#e5a530,#2dd4a0)"></div> 低→高</div>
      </div>

      <div class="chain-grid" id="chain-grid"></div>

      <!-- Stock Grid -->
      <div class="section-hdr">
        <h2>重点标的</h2>
        <span style="font-size:11px;color:var(--text3)">点击查看详情</span>
      </div>
      <div class="stock-grid" id="stock-grid"></div>

      <!-- BOM Section -->
      <div class="section-hdr" style="margin-top:24px">
        <h2>产品 BOM 成本拆解</h2>
      </div>
      <div class="bom-section">
        <div class="bom-tabs" id="bom-tabs"></div>
        <div class="bom-overview" id="bom-overview"></div>
        <div class="bom-table-wrap">
          <table class="bom-table">
            <thead id="bom-thead"></thead>
            <tbody id="bom-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="right-panel">
      <div class="rp-search">
        <input type="text" id="search-input" placeholder="🔍 搜索赛道 / 公司 / 产品...">
      </div>

      <!-- Detail Panel (slides in when something is clicked) -->
      <div class="detail-panel" id="detail-panel"></div>

      <!-- News -->
      <div class="rp-section" id="news-section" style="flex:55">
        <div class="rp-section-title">📰 产业新闻</div>
        <div id="news-list"></div>
      </div>

      <!-- Prices -->
      <div class="rp-prices" id="price-section" style="flex:40">
        <div class="rp-section-title">💰 价格跟踪</div>
        <div id="price-list"></div>
      </div>
    </div>
  </div>

// === MACRO CARDS ===
function renderMacro() {
  const m = DATA.macro;
  const cards = [
    {label:'行业增速',value:m.industry_growth_rate+'%+',sub:'CAGR',color:'var(--green)',icon:'📈'},
    {label:'产业周期',value:m.industry_cycle,sub:m.cycle_rationale?.substring(0,30)+'...',color:'var(--accent)',icon:'🔄'},
    {label:'政策支持',value:m.policy_support,sub:'东数西算+十五五',color:'var(--purple)',icon:'🏛️'},
    {label:'平均利润率',value:m.avg_profit_margin+'%',sub:'上游溢价集中',color:'var(--gold)',icon:'💰'},
    {label:'筛选评分',value:m.screening_score+'/10',sub:'强烈推荐深度拆解',color:'var(--green)',icon:'⭐'}
  ];
  const row = document.getElementById('macro-row');
  row.innerHTML = cards.map(c => `
    <div class="macro-card">
      <div class="bar" style="background:${c.color}"></div>
      <div class="label">${c.icon} ${c.label}</div>
      <div class="value" style="color:${c.color}">${c.value}</div>
      <div class="sub">${c.sub||''}</div>
    </div>
  `).join('');
}

// === CHAIN GRID ===
function getLocColor(rate) {
  if (rate < 30) return '#f06060';
  if (rate < 60) return '#e5a530';
  return '#2dd4a0';
}

function getLocGradient(rate) {
  if (rate <= 30) return `linear-gradient(90deg, #f06060, #e85030)`;
  if (rate <= 60) return `linear-gradient(90deg, #f06060, #e5a530)`;
  return `linear-gradient(90deg, #f06060, #e5a530, #2dd4a0)`;
}

function countCompanies(nodeName) {
  return DATA.nodeCompany.filter(nc => nc.node === nodeName).length;
}

function renderChainGrid() {
  const grid = document.getElementById('chain-grid');
  const groups = {upstream:[],midstream:[],downstream:[],support:[]};
  DATA.nodes.forEach(n => {
    if (groups[n.node_type]) groups[n.node_type].push(n);
  });

  const order = ['upstream','midstream','downstream','support'];
  grid.innerHTML = order.map(cat => {
    const nodes = groups[cat] || [];
    return `
      <div class="chain-col" data-cat="${cat}">
        <div class="chain-col-title">${CAT_NAMES[cat]} (${nodes.length})</div>
        ${nodes.map(n => {
          const cc = countCompanies(n.node_name);
          return `
          <div class="node-card" data-node="${n.node_name}" onclick="showNodeDetail('${n.node_name}')">
            <div class="name">${n.node_name}</div>
            <div class="score" style="color:${CAT_COLORS[cat]}">${n.composite_score}</div>
            <div class="mini-bars">
              <div class="mini-bar-row">
                <span class="mini-bar-icon" style="color:var(--green)">▲</span>
                <div class="mini-bar-track"><div class="mini-bar-fill" style="width:${n.growth_score*10}%;background:var(--green)"></div></div>
                <span class="mini-bar-val">${n.growth_score}</span>
              </div>
              <div class="mini-bar-row">
                <span class="mini-bar-icon" style="color:var(--accent)">◆</span>
                <div class="mini-bar-track"><div class="mini-bar-fill" style="width:${n.profit_score*10}%;background:var(--accent)"></div></div>
                <span class="mini-bar-val">${n.profit_score}</span>
              </div>
              <div class="mini-bar-row">
                <span class="mini-bar-icon" style="color:var(--purple)">■</span>
                <div class="mini-bar-track"><div class="mini-bar-fill" style="width:${n.barrier_score*10}%;background:var(--purple)"></div></div>
                <span class="mini-bar-val">${n.barrier_score}</span>
              </div>
            </div>
            <div class="loc-bar">
              <div class="loc-label"><span>国产化率</span><span style="color:${getLocColor(n.localization_rate)}">${n.localization_rate}%</span></div>
              <div class="loc-track"><div class="loc-fill" style="width:${n.localization_rate}%;background:${getLocGradient(n.localization_rate)}"></div></div>
            </div>
            ${cc > 0 ? `<div class="company-badge">🏢 ${cc} 家公司</div>` : ''}
          </div>`;
        }).join('')}
      </div>`;
  }).join('');
}

// === STOCK GRID ===
function getSectorColor(sector) {
  const map = {'光模块':'var(--cat-upstream)','GPU芯片':'var(--cat-upstream)','HBM先进封装':'var(--cat-upstream)','高端PCB':'var(--cat-upstream)','光芯片':'var(--cat-upstream)','高速铜连接':'var(--cat-upstream)','电源/PSU':'var(--cat-upstream)','存储(HBM/SSD)':'var(--cat-upstream)','服务器':'var(--cat-midstream)','交换机':'var(--cat-midstream)','液冷散热':'var(--cat-midstream)','EDA/IP':'var(--cat-support)','半导体设备':'var(--cat-support)','云服务/智算中心':'var(--cat-downstream)'};
  return map[sector] || 'var(--accent)';
}

function pegClass(peg) {
  if (peg < 0.8) return 'peg-green';
  if (peg <= 1.5) return 'peg-yellow';
  return 'peg-red';
}

function extractScore(irr) {
  const m = irr?.match(/(\d+\.?\d*)\/10/);
  return m ? m[1] : '-';
}

function renderStockGrid() {
  const grid = document.getElementById('stock-grid');
  grid.innerHTML = DATA.stocks.map(s => {
    const sc = getSectorColor(s.sector);
    return `
    <div class="stock-card" onclick="showStockDetail('${s.company_name}')">
      <div class="sc-head">
        <div>
          <div class="sc-name">${s.company_name}</div>
          <div class="sc-code">${s.ticker}</div>
        </div>
        <div class="sc-sector" style="background:${sc}22;color:${sc};border:1px solid ${sc}44" onclick="event.stopPropagation();showNodeDetail('${s.sector}')">${s.sector}</div>
      </div>
      <div class="sc-metrics">
        <div class="sc-m">PEG <span class="${pegClass(s.peg_ratio)}" style="padding:1px 4px;border-radius:3px;font-size:12px">${s.peg_ratio?.toFixed(1)}</span></div>
        <div class="sc-m">不可替代性 <span>${extractScore(s.irreplaceability)}</span></div>
        <div class="sc-m">PE消化 <span>${s.pe_digestion_years}年</span></div>
        <div class="sc-m">估值 <span>${s.valuation_rating}</span></div>
      </div>
    </div>`;
  }).join('');
}

// === BOM ===
const productNames = Object.keys(DATA.products);
const shortNames = {'1.6T光模块':'1.6T光模块','800G光模块 (SR8/DR8/FR4)':'800G光模块','AI数据中心交换机 (51.2T/800G)':'AI交换机','AI训练服务器 (H200/GB200级别)':'AI训练服务器','液冷散热系统 (GB200/GB300级)':'液冷散热系统'};
let currentProduct = productNames[0];
let sortCol = 'cost_pct';
let sortAsc = false;

function renderBomTabs() {
  const tabOrder = ['1.6T光模块','800G光模块 (SR8/DR8/FR4)','AI训练服务器 (H200/GB200级别)','AI数据中心交换机 (51.2T/800G)','液冷散热系统 (GB200/GB300级)'];
  const tabs = document.getElementById('bom-tabs');
  tabs.innerHTML = tabOrder.map(p => `<div class="bom-tab${p===currentProduct?' active':''}" onclick="switchProduct('${p}')">${shortNames[p]||p}</div>`).join('');
}

function switchProduct(p) {
  currentProduct = p;
  renderBomTabs();
  renderBom();
}

function renderBom() {
  const comps = DATA.products[currentProduct] || [];
  const l1 = comps.filter(c => c.component_level === 1);
  const totalCost = l1.reduce((s,c) => s + (c.total_cost_usd||0), 0);
  const bottlenecks = comps.filter(c => c.is_bottleneck);

  document.getElementById('bom-overview').innerHTML = `
    <div class="bom-stat"><div class="bom-stat-label">产品总成本</div><div class="bom-stat-val" style="color:var(--accent)">$${totalCost.toLocaleString()}</div></div>
    <div class="bom-stat"><div class="bom-stat-label">组件数量</div><div class="bom-stat-val">${comps.length}</div></div>
    <div class="bom-stat"><div class="bom-stat-label">关键瓶颈</div><div class="bom-stat-val" style="color:var(--red)">${bottlenecks.length}</div></div>
  `;

  const cols = [
    {key:'component_name',label:'组件名称'},
    {key:'supplier',label:'供应商'},
    {key:'supplier_country',label:'产地'},
    {key:'unit_cost_usd',label:'单价($)'},
    {key:'cost_pct',label:'成本占比'},
    {key:'margin_pct',label:'毛利率'},
    {key:'is_bottleneck',label:'瓶颈'}
  ];

  document.getElementById('bom-thead').innerHTML = '<tr>' + cols.map(c => 
    `<th class="${sortCol===c.key?'sorted':''}" onclick="sortBom('${c.key}')">${c.label}<span class="sort-arrow">${sortCol===c.key?(sortAsc?'▲':'▼'):'⇅'}</span></th>`
  ).join('') + '</tr>';

  const sorted = [...comps].sort((a,b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (typeof va === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    return sortAsc ? (va||0)-(vb||0) : (vb||0)-(va||0);
  });

  document.getElementById('bom-tbody').innerHTML = sorted.map(c => {
    const flags = DATA.countryFlags[c.supplier_country] || '🌐';
    const isBottle = c.is_bottleneck ? 1 : 0;
    const isSub = c.component_level > 1;
    return `<tr class="${isBottle?'bottleneck':''} ${isSub?'sub-component':''}" onclick="showCompDetail(${c.id})">
      <td>${isSub?'└ ':''}${c.component_name}</td>
      <td>${c.supplier||'-'}</td>
      <td><span class="flag-badge">${flags}</span></td>
      <td>$${(c.unit_cost_usd||0).toLocaleString()}</td>
      <td><div class="cost-bar-wrap"><div class="cost-bar" style="width:${Math.min(c.cost_pct||0,100)*0.8}px;background:${isBottle?'var(--red)':'var(--accent)'}"></div> ${(c.cost_pct||0).toFixed(1)}%</div></td>
      <td>${c.margin_pct ? c.margin_pct.toFixed(0)+'%' : '-'}</td>
      <td>${isBottle?'<span class="bottleneck-tag">瓶颈</span>':''}</td>
    </tr>`;
  }).join('');
}

function sortBom(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = false; }
  renderBom();
}

// === RIGHT PANEL DETAILS ===
function showNodeDetail(nodeName) {
  document.querySelectorAll('.node-card').forEach(c => c.classList.remove('active'));
  const card = document.querySelector(`.node-card[data-node="${nodeName}"]`);
  if (card) card.classList.add('active');

  const node = DATA.nodes.find(n => n.node_name === nodeName);
  if (!node) return;

  const companies = DATA.nodeCompany.filter(nc => nc.node === nodeName);
  const companyStocks = companies.map(nc => DATA.stocks.find(s => s.company_name === nc.company || s.ticker === nc.company)).filter(Boolean);

  const companyProducts = new Set();
  companies.forEach(nc => {
    DATA.companyProduct.filter(cp => cp.company === nc.company).forEach(cp => companyProducts.add(cp.product));
  });

  let bottlenecks = [];
  try { bottlenecks = JSON.parse(node.bottlenecks || '[]'); } catch(e) {}
  let trends = [];
  try { trends = JSON.parse(node.tech_trends || '[]'); } catch(e) {}

  const cat = node.node_type;
  const catColor = CAT_COLORS[cat];

  const panel = document.getElementById('detail-panel');
  panel.innerHTML = `
    <span class="detail-close" onclick="closeDetail()">✕</span>
    <div class="detail-title">
      ${node.node_name}
      <span class="detail-badge" style="background:${catColor}22;color:${catColor};border:1px solid ${catColor}44">${CAT_NAMES[cat]}</span>
      <span class="detail-badge" style="background:var(--accent)22;color:var(--accent)">${node.composite_score}分</span>
    </div>
    <div class="detail-metrics">
      <div class="dm-card"><div class="dm-label">▲ 增长评分</div><div class="dm-val" style="color:var(--green)">${node.growth_score}</div></div>
      <div class="dm-card"><div class="dm-label">◆ 利润评分</div><div class="dm-val" style="color:var(--accent)">${node.profit_score}</div></div>
      <div class="dm-card"><div class="dm-label">■ 壁垒评分</div><div class="dm-val" style="color:var(--purple)">${node.barrier_score}</div></div>
      <div class="dm-card"><div class="dm-label">国产化率</div><div class="dm-val" style="color:${getLocColor(node.localization_rate)}">${node.localization_rate}%</div></div>
      <div class="dm-card"><div class="dm-label">替代风险</div><div class="dm-val">${node.substitute_risk === 'high' ? '<span style="color:var(--red)">高</span>' : node.substitute_risk === 'medium' ? '<span style="color:var(--gold)">中</span>' : '<span style="color:var(--green)">低</span>'}</div></div>
      <div class="dm-card"><div class="dm-label">CR5集中度</div><div class="dm-val">${node.cr5_concentration}%</div></div>
      <div class="dm-card"><div class="dm-label">定价力</div><div class="dm-val">${node.pricing_power === 'strong' ? '<span style="color:var(--green)">强</span>' : node.pricing_power === 'moderate' ? '<span style="color:var(--gold)">中</span>' : '<span style="color:var(--text2)">弱</span>'}</div></div>
      <div class="dm-card"><div class="dm-label">替代窗口</div><div class="dm-val">${node.substitute_window||'-'}</div></div>
    </div>
    ${bottlenecks.length ? `<div class="detail-text"><strong>🔴 瓶颈：</strong><br>${bottlenecks.map(b => '• '+b).join('<br>')}</div>` : ''}
    ${trends.length ? `<div class="detail-text"><strong>🔵 技术趋势：</strong><br>${trends.map(t => '• '+t).join('<br>')}</div>` : ''}
    ${companyStocks.length ? `
    <div class="detail-list">
      <div class="detail-list-title">🏢 关联公司 (${companyStocks.length})</div>
      ${companyStocks.map(s => `<span class="detail-company" onclick="event.stopPropagation();showStockDetail('${s.company_name}')">${s.company_name} <span style="color:var(--text3);font-size:9px">${s.ticker}</span></span>`).join('')}
    </div>` : ''}
    ${companyProducts.size ? `
    <div class="detail-list">
      <div class="detail-list-title">📦 关联产品</div>
      ${[...companyProducts].map(p => `<span class="detail-product" onclick="event.stopPropagation();jumpToProduct('${p}')">${shortNames[p]||p}</span>`).join('')}
    </div>` : ''}
  `;
  panel.classList.add('show');
}

function showStockDetail(companyName) {
  const stock = DATA.stocks.find(s => s.company_name === companyName);
  if (!stock) return;

  const products = DATA.companyProduct.filter(cp => cp.company === companyName).map(cp => cp.product);
  const uniqueProducts = [...new Set(products)];

  const panel = document.getElementById('detail-panel');
  panel.innerHTML = `
    <span class="detail-close" onclick="closeDetail()">✕</span>
    <div class="detail-title stock-detail">
      ${stock.company_name}
      <span style="font-size:11px;color:var(--text3)">${stock.ticker}</span>
    </div>
    <div class="stock-detail">
      <div class="stock-tags">
        <span class="stock-tag" onclick="showNodeDetail('${stock.sector}')">${stock.sector}</span>
        <span class="stock-tag">${stock.valuation_rating}</span>
      </div>
    </div>
    <div class="detail-metrics">
      <div class="dm-card"><div class="dm-label">PEG</div><div class="dm-val"><span class="peg-badge ${pegClass(stock.peg_ratio)}">${stock.peg_ratio?.toFixed(2)}</span></div></div>
      <div class="dm-card"><div class="dm-label">不可替代性</div><div class="dm-val">${extractScore(stock.irreplaceability)}/10</div></div>
      <div class="dm-card"><div class="dm-label">PE消化年限</div><div class="dm-val">${stock.pe_digestion_years}年</div></div>
      <div class="dm-card"><div class="dm-label">估值评级</div><div class="dm-val">${stock.valuation_rating}</div></div>
    </div>
    <div class="detail-text"><strong>📋 投资逻辑：</strong><br>${stock.long_term_thesis?.substring(0,300)||'-'}...</div>
    <div class="detail-text"><strong>⚠️ 核心风险：</strong><br>${stock.core_risk?.substring(0,300)||'-'}...</div>
    <div class="detail-text"><strong>🔒 技术锁定：</strong><br>${stock.tech_lockin?.substring(0,250)||'-'}...</div>
    ${uniqueProducts.length ? `
    <div class="detail-list">
      <div class="detail-list-title">📦 关联产品</div>
      ${uniqueProducts.map(p => `<span class="detail-product" onclick="event.stopPropagation();jumpToProduct('${p}')">${shortNames[p]||p}</span>`).join('')}
    </div>` : ''}
    <div class="detail-list">
      <div class="detail-list-title">🔗 所属赛道</div>
      <span class="detail-company" onclick="event.stopPropagation();showNodeDetail('${stock.sector}')">${stock.sector}</span>
    </div>
  `;
  panel.classList.add('show');
}

function showCompDetail(bomId) {
  const comp = Object.values(DATA.products).flat().find(c => c.id === bomId);
  if (!comp) return;

  const flags = DATA.countryFlags[comp.supplier_country] || '🌐';
  const panel = document.getElementById('detail-panel');
  panel.innerHTML = `
    <span class="detail-close" onclick="closeDetail()">✕</span>
    <div class="detail-title">${comp.component_name}</div>
    <div class="comp-detail">
      <div class="cd-supplier"><span class="flag-badge">${flags}</span> ${comp.supplier||'-'} (${comp.supplier_country||'-'})</div>
      <div class="cd-row"><span class="cd-label">所属产品</span><span class="cd-val">${shortNames[comp.product_name]||comp.product_name}</span></div>
      <div class="cd-row"><span class="cd-label">单价</span><span class="cd-val">$${(comp.unit_cost_usd||0).toLocaleString()}</span></div>
      <div class="cd-row"><span class="cd-label">总成本</span><span class="cd-val">$${(comp.total_cost_usd||0).toLocaleString()}</span></div>
      <div class="cd-row"><span class="cd-label">成本占比</span><span class="cd-val">${(comp.cost_pct||0).toFixed(1)}%</span></div>
      <div class="cd-row"><span class="cd-label">毛利率</span><span class="cd-val">${comp.margin_pct ? comp.margin_pct.toFixed(0)+'%' : '-'}</span></div>
      <div class="cd-row"><span class="cd-label">瓶颈</span><span class="cd-val">${comp.is_bottleneck ? '<span class="bottleneck-tag">是</span>' : '否'}</span></div>
      <div class="cd-row"><span class="cd-label">可替代性</span><span class="cd-val">${comp.substitute_available||'-'}</span></div>
      ${comp.substitute_detail ? `<div class="detail-text"><strong>替代方案：</strong><br>${comp.substitute_detail}</div>` : ''}
      ${comp.tech_trend ? `<div class="detail-text"><strong>技术趋势：</strong><br>${comp.tech_trend}</div>` : ''}
    </div>
  `;
  panel.classList.add('show');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('show');
  document.querySelectorAll('.node-card').forEach(c => c.classList.remove('active'));
}

function jumpToProduct(pName) {
  switchProduct(pName);
  document.querySelector('.bom-section')?.scrollIntoView({behavior:'smooth'});
}

// === NEWS ===
function renderNews() {
  const list = document.getElementById('news-list');
  list.innerHTML = DATA.news.map(n => {
    const dir = n.impact_direction || 'neutral';
    const impactClass = (n.impact_score||0) >= 4 ? 'high' : 'medium';
    return `
    <div class="news-item" onclick="this.classList.toggle('expanded')">
      <div class="news-dot ${dir}"></div>
      <div class="news-content">
        <div class="news-title">${n.title}</div>
        <div class="news-meta">
          <span>${n.event_time||''}</span>
          <span class="news-impact ${impactClass}">影响 ${n.impact_score||0}/5</span>
          <span>${n.impact_area||''}</span>
        </div>
        <div class="news-summary">${n.summary||''}</div>
      </div>
    </div>`;
  }).join('');
}

// === PRICES ===
function renderPrices() {
  const list = document.getElementById('price-list');
  list.innerHTML = DATA.prices.map(p => {
    const chg = p.price_change_pct || 0;
    const cls = chg >= 0 ? 'up' : 'down';
    const arrow = chg >= 0 ? '↑' : '↓';
    return `
    <div class="price-item">
      <span class="price-name">${p.item_name}</span>
      <span class="price-val">${p.latest_price ? (p.unit?.includes('USD') ? '$' : '') + p.latest_price.toLocaleString() : '-'}</span>
      <span class="price-chg ${cls}">${arrow} ${Math.abs(chg).toFixed(1)}%</span>
    </div>`;
  }).join('');
}

// === SEARCH ===
document.getElementById('search-input').addEventListener('input', function(e) {
  const q = e.target.value.toLowerCase().trim();
  if (!q) { closeDetail(); return; }

  // Search nodes
  const matchNode = DATA.nodes.find(n => n.node_name.toLowerCase().includes(q));
  if (matchNode) { showNodeDetail(matchNode.node_name); return; }

  // Search stocks
  const matchStock = DATA.stocks.find(s => s.company_name.toLowerCase().includes(q) || s.ticker.includes(q));
  if (matchStock) { showStockDetail(matchStock.company_name); return; }

  // Search products
  const matchProd = productNames.find(p => p.toLowerCase().includes(q));
  if (matchProd) { jumpToProduct(matchProd); return; }
});

// === INIT ALL ===
renderMacro();
renderChainGrid();
renderStockGrid();
renderBomTabs();
renderBom();
renderNews();
renderPrices();
</script>
