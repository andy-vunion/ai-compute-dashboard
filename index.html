<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI算力产业链投研看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#05070e;--surface:#0c1120;--card:#0f1628;--card-hover:#141d35;
--border:#1a2340;--border-light:#253050;
--text:#e8edf5;--text-dim:#8892a8;--text-muted:#5a6478;
--accent:#4f8eff;--green:#2dd4a0;--red:#f06060;--gold:#e5a530;
--upstream:#4f8eff;--midstream:#9d7aff;--downstream:#2dd4a0;--support:#e5a530;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
background:var(--bg);color:var(--text);overflow:hidden;height:100vh;width:100vw}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}

.app{display:flex;height:100vh;width:100vw}
.main{flex:1;overflow-y:auto;padding:16px 20px;min-width:0}
.right-panel{width:340px;flex-shrink:0;display:flex;flex-direction:column;border-left:1px solid var(--border);background:var(--surface)}

/* Row 1: Macro cards */
.macro-row{display:flex;gap:12px;margin-bottom:16px}
.macro-card{flex:1;background:var(--card);border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.macro-card .bar{height:3px}
.macro-card .body{padding:12px 14px}
.macro-card .label{font-size:11px;color:var(--text-dim);margin-bottom:4px}
.macro-card .value{font-size:22px;font-weight:700}
.macro-card .sub{font-size:11px;color:var(--text-muted);margin-top:4px}

/* Row 2: 3-column sector */
.sector-row{display:flex;gap:0;margin-bottom:16px;background:var(--card);border-radius:10px;border:1px solid var(--border);height:520px;overflow:hidden}
.sector-left{width:200px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column}
.sector-left .title{padding:12px 14px 8px;font-size:13px;font-weight:600;color:var(--text-dim);border-bottom:1px solid var(--border)}
.sector-list{flex:1;overflow-y:auto;padding:4px 0}
.sector-item{display:flex;align-items:center;padding:7px 12px;cursor:pointer;transition:background .15s;gap:8px;border-left:3px solid transparent}
.sector-item:hover{background:var(--card-hover)}
.sector-item.active{background:rgba(79,142,255,.12);border-left-color:var(--accent)}
.sector-item .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sector-item .name{flex:1;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sector-item .score{font-size:11px;font-weight:600;color:var(--gold);min-width:24px;text-align:right}
.sector-item .badge{font-size:9px;background:rgba(79,142,255,.2);color:var(--accent);padding:1px 5px;border-radius:8px;min-width:18px;text-align:center}

.sector-center{flex:1;overflow-y:auto;padding:16px;min-width:0}
.sector-right{width:280px;flex-shrink:0;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sector-right .title{padding:10px 14px;font-size:13px;font-weight:600;color:var(--text-dim);border-bottom:1px solid var(--border)}
.company-list{flex:1;overflow-y:auto;padding:4px 0}
.company-item{padding:8px 12px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border)}
.company-item:hover{background:var(--card-hover)}
.company-item.active{background:rgba(79,142,255,.1)}
.company-item .top-row{display:flex;justify-content:space-between;align-items:center}
.company-item .cname{font-size:13px;font-weight:600}
.company-item .ticker{font-size:11px;color:var(--text-muted)}
.company-item .bottom-row{display:flex;gap:10px;margin-top:4px;font-size:11px;color:var(--text-dim)}
.company-item .peg-val{font-weight:600}
.peg-low{color:var(--green)}
.peg-mid{color:var(--gold)}
.peg-high{color:var(--red)}

.placeholder{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:13px}

/* Sector detail */
.sd-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.sd-header .name{font-size:20px;font-weight:700}
.sd-header .cscore{font-size:15px;font-weight:700;color:var(--gold)}
.sd-header .cat-badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
.sd-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.sd-metric{background:rgba(255,255,255,.03);border-radius:8px;padding:10px;text-align:center}
.sd-metric .ml{font-size:10px;color:var(--text-dim);margin-bottom:3px}
.sd-metric .mv{font-size:18px;font-weight:700}
.sd-metric .progress{height:4px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:6px;overflow:hidden}
.sd-metric .progress-fill{height:100%;border-radius:2px;transition:width .4s}
.sd-info-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.sd-info{background:rgba(255,255,255,.03);border-radius:6px;padding:8px 10px}
.sd-info .il{font-size:10px;color:var(--text-dim)}
.sd-info .iv{font-size:13px;font-weight:600;margin-top:2px}
.sd-section{margin-bottom:12px}
.sd-section .sl{font-size:11px;font-weight:600;color:var(--text-dim);margin-bottom:6px}
.sd-tags{display:flex;flex-wrap:wrap;gap:5px}
.sd-tag{font-size:11px;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,.06)}
.sd-tag.bottleneck{background:rgba(240,96,96,.15);color:var(--red)}
.sd-tag.trend{background:rgba(79,142,255,.12);color:var(--accent)}
.sd-desc{font-size:12px;color:var(--text-dim);line-height:1.6;margin-top:8px}

/* Row 3: Company detail */
.company-detail-row{margin-bottom:16px;background:var(--card);border-radius:10px;border:1px solid var(--border);overflow:hidden;min-height:200px;transition:all .3s}
.cd-header{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.cd-header .cname{font-size:18px;font-weight:700}
.cd-header .ticker{font-size:13px;color:var(--text-muted)}
.cd-header .sector-link{font-size:11px;padding:2px 8px;border-radius:10px;cursor:pointer;transition:opacity .2s}
.cd-header .sector-link:hover{opacity:.8}
.cd-tabs{display:flex;border-bottom:1px solid var(--border)}
.cd-tab{padding:10px 18px;font-size:12.5px;cursor:pointer;color:var(--text-dim);border-bottom:2px solid transparent;transition:all .15s}
.cd-tab:hover{color:var(--text)}
.cd-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.cd-body{padding:16px 18px;font-size:12.5px;line-height:1.8;color:var(--text-dim);max-height:240px;overflow-y:auto;white-space:pre-wrap}

/* Row 4: BOM */
.bom-row{background:var(--card);border-radius:10px;border:1px solid var(--border);overflow:hidden;margin-bottom:20px}
.bom-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.bom-header .title{font-size:15px;font-weight:700}
.bom-tabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto}
.bom-tab{padding:10px 16px;font-size:12px;cursor:pointer;color:var(--text-dim);border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.bom-tab:hover{color:var(--text)}
.bom-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.bom-summary{display:flex;gap:20px;padding:10px 18px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text-dim)}
.bom-summary span{font-weight:600;color:var(--text)}
.bom-table-wrap{overflow-x:auto;max-height:360px;overflow-y:auto}
table.bom{width:100%;border-collapse:collapse;font-size:12px}
table.bom th{position:sticky;top:0;background:var(--surface);padding:8px 12px;text-align:left;font-size:11px;color:var(--text-dim);font-weight:600;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap}
table.bom th:hover{color:var(--accent)}
table.bom td{padding:7px 12px;border-bottom:1px solid var(--border);white-space:nowrap}
table.bom tr:hover{background:rgba(255,255,255,.02)}
table.bom tr.bottleneck-row{background:rgba(240,96,96,.05)}
table.bom tr.bottleneck-row td:first-child{border-left:3px solid var(--red)}
table.bom .cost-bar{display:inline-block;height:12px;border-radius:2px;min-width:2px;vertical-align:middle}
table.bom .child{color:var(--text-dim)}
.bottleneck-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--red)}

/* Right Panel */
.search-wrap{padding:10px 12px;border-bottom:1px solid var(--border)}
.search-wrap input{width:100%;padding:7px 10px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:12px;outline:none}
.search-wrap input:focus{border-color:var(--accent)}
.news-section{flex:0 0 55%;overflow-y:auto;border-bottom:1px solid var(--border);padding:8px 0}
.news-section .sec-title{padding:6px 14px;font-size:11px;font-weight:600;color:var(--text-dim)}
.news-item{padding:8px 14px;border-left:3px solid transparent;position:relative}
.news-item::before{content:'';position:absolute;left:13px;top:0;bottom:0;width:1px;background:var(--border)}
.news-item .ni-dot{width:10px;height:10px;border-radius:50%;position:absolute;left:9px;top:12px;z-index:1}
.news-item .ni-body{margin-left:16px}
.news-item .ni-time{font-size:10px;color:var(--text-muted)}
.news-item .ni-title{font-size:12px;margin-top:2px;font-weight:500}
.news-item .ni-summary{font-size:11px;color:var(--text-dim);margin-top:2px;line-height:1.5}
.news-item .ni-impact{font-size:10px;margin-top:3px;display:flex;align-items:center;gap:4px}
.price-section{flex:0 0 40%;overflow-y:auto;padding:8px 0}
.price-section .sec-title{padding:6px 14px;font-size:11px;font-weight:600;color:var(--text-dim)}
.price-item{display:flex;align-items:center;padding:6px 14px;gap:8px;font-size:12px}
.price-item .pi-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.price-item .pi-price{font-weight:600;min-width:60px;text-align:right}
.price-item .pi-change{min-width:55px;text-align:right;font-weight:600;font-size:11px}
.price-item .pi-arrow{font-size:14px;min-width:16px}

.cat-upstream{background:rgba(79,142,255,.15);color:var(--upstream)}
.cat-midstream{background:rgba(157,122,255,.15);color:var(--midstream)}
.cat-downstream{background:rgba(45,212,160,.15);color:var(--downstream)}
.cat-support{background:rgba(229,165,48,.15);color:var(--support)}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .25s ease}
</style>
</head>

</div>

</div><!-- /main -->

<!-- Right Panel -->
<div class="right-panel">

  </div>
</div>
</div>

const CAT_COLORS = {upstream:'var(--upstream)',midstream:'var(--midstream)',downstream:'var(--downstream)',support:'var(--support)'};
const CAT_LABELS = {upstream:'上游核心',midstream:'中游集成',downstream:'下游交付',support:'底层支撑'};
const CAT_CLASSES = {upstream:'cat-upstream',midstream:'cat-midstream',downstream:'cat-downstream',support:'cat-support'};

function parseJSON(s) {
  if (!s) return [];
  try { return typeof s === 'string' ? JSON.parse(s) : s; } catch { return []; }
}

function getFlag(country) {
  if (!country) return '';
  for (const [k,v] of Object.entries(DATA.flags)) {
    if (country.includes(k)) return v;
  }
  return '';
}

function pegClass(v) {
  if (v === null || v === undefined) return '';
  if (v <= 1) return 'peg-low';
  if (v <= 2) return 'peg-mid';
  return 'peg-high';
}

let activeNode = null;

function countCompanies(nodeName) {
  return (DATA.nodeCompanyMap[nodeName] || []).length;
}

function renderSectorList() {
  const groups = {upstream:[],midstream:[],downstream:[],support:[]};
  DATA.nodes.forEach(n => {
    const t = n.node_type || 'upstream';
    if (groups[t]) groups[t].push(n);
  });
  let html = '';
  for (const [cat, items] of Object.entries(groups)) {
    items.forEach(n => {
      const cc = countCompanies(n.node_name);
      html += `<div class="sector-item" data-node="${n.node_name}" data-cat="${cat}" onclick="selectNode('${n.node_name.replace(/'/g,"\\'")}')" >
        <span class="dot" style="background:${CAT_COLORS[cat]}"></span>
        <span class="name">${n.node_name}</span>
        <span class="score">${n.composite_score.toFixed(1)}</span>
        ${cc > 0 ? `<span class="badge">${cc}</span>` : ''}
      </div>`;
    });
  }
  document.getElementById('sectorList').innerHTML = html;
}

function selectNode(name) {
  activeNode = DATA.nodes.find(n => n.node_name === name);
  if (!activeNode) return;
  // Highlight
  document.querySelectorAll('.sector-item').forEach(el => el.classList.toggle('active', el.dataset.node === name));
  renderSectorDetail();
  renderCompanyList();
}

// ===== BOM =====
let activeBomProduct = null;
let bomSortCol = null;
let bomSortAsc = true;

function getProducts() {
  const seen = new Set();
  return DATA.bom.filter(b => {
    if (seen.has(b.product_name)) return false;
    seen.add(b.product_name);
    return true;
  }).map(b => b.product_name);
}

function getShortProduct(name) {
  if (name.includes('1.6T')) return '1.6T光模块';
  if (name.includes('800G')) return '800G光模块';
  if (name.includes('训练服务器')) return 'AI训练服务器';
  if (name.includes('交换机')) return 'AI交换机';
  if (name.includes('液冷')) return '液冷散热系统';
  return name;
}

function renderBomTabs() {
  const products = getProducts();
  activeBomProduct = products[0];
  document.getElementById('bomTabs').innerHTML = products.map(p => 
    `<div class="bom-tab ${p===activeBomProduct?'active':''}" onclick="selectBomProduct('${p.replace(/'/g,"\\'")}')">${getShortProduct(p)}</div>`
  ).join('');
  renderBomTable();
}

function selectBomProduct(name) {
  activeBomProduct = name;
  document.querySelectorAll('.bom-tab').forEach(el => el.classList.toggle('active', el.textContent === getShortProduct(name)));
  bomSortCol = null;
  renderBomTable();
}

function renderBomTable() {
  let items = DATA.bom.filter(b => b.product_name === activeBomProduct);
  const totalCost = items.reduce((s,b) => s + (b.component_level === 1 ? (b.unit_cost_usd||0) : 0), 0);
  const bottleneckCount = items.filter(b => b.is_bottleneck).length;

  document.getElementById('bomSummary').innerHTML = `总成本 <span>$${totalCost.toLocaleString()}</span> &nbsp;|&nbsp; 组件 <span>${items.length}</span> &nbsp;|&nbsp; 瓶颈 <span style="color:var(--red)">${bottleneckCount}</span>`;

  if (bomSortCol) {
    items = [...items].sort((a,b) => {
      let va = a[bomSortCol], vb = b[bomSortCol];
      if (typeof va === 'number' && typeof vb === 'number') return bomSortAsc ? va-vb : vb-va;
      va = String(va||''); vb = String(vb||'');
      return bomSortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    });
  }

  document.getElementById('bomHead').innerHTML = `<tr>
    <th onclick="sortBom('component_name')">组件名</th>
    <th onclick="sortBom('supplier')">供应商</th>
    <th>产地</th>
    <th onclick="sortBom('unit_cost_usd')">单价(USD)</th>
    <th onclick="sortBom('cost_pct')">成本占比</th>
    <th onclick="sortBom('margin_pct')">毛利率</th>
    <th>瓶颈</th>
  </tr>`;

  const maxCost = Math.max(...items.map(b => b.cost_pct || 0));
  document.getElementById('bomBody').innerHTML = items.map(b => {
    const isChild = b.component_level > 1;
    const isBottleneck = b.is_bottleneck;
    const barW = maxCost > 0 ? ((b.cost_pct||0)/maxCost*100) : 0;
    const barColor = isBottleneck ? 'var(--red)' : 'var(--accent)';
    const flags = getFlag(b.supplier_country);
    return `<tr class="${isBottleneck ? 'bottleneck-row' : ''}">
      <td class="${isChild ? 'child' : ''}">${isChild ? '&nbsp;&nbsp;└ ' : ''}${b.component_name}</td>
      <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis">${b.supplier || ''}</td>
      <td>${flags} ${b.supplier_country || ''}</td>
      <td>$${(b.unit_cost_usd||0).toLocaleString()}</td>
      <td><span class="cost-bar" style="width:${barW}px;background:${barColor}">&nbsp;</span> ${(b.cost_pct||0).toFixed(1)}%</td>
      <td>${b.margin_pct ? b.margin_pct.toFixed(1)+'%' : '-'}</td>
      <td>${isBottleneck ? '<span class="bottleneck-dot"></span>' : ''}</td>
    </tr>`;
  }).join('');
}

function sortBom(col) {
  if (bomSortCol === col) bomSortAsc = !bomSortAsc;
  else { bomSortCol = col; bomSortAsc = true; }
  renderBomTable();
}

}

// ===== RIGHT PANEL: PRICES =====
function renderPrices() {
  document.getElementById('priceTracker').innerHTML = DATA.prices.map(p => {
    const pct = p.price_change_pct || 0;
    const color = pct > 0 ? 'var(--green)' : pct < 0 ? 'var(--red)' : 'var(--text-dim)';
    const arrow = pct > 0 ? '▲' : pct < 0 ? '▼' : '─';
    return `<div class="price-item">
      <span class="pi-name">${p.item_name}</span>
      <span class="pi-price">$${p.latest_price.toLocaleString()}</span>
      <span class="pi-change" style="color:${color}">${pct > 0 ? '+' : ''}${pct.toFixed(1)}%</span>
      <span class="pi-arrow" style="color:${color}">${arrow}</span>
    </div>`;
  }).join('');
}

// ===== SEARCH =====
document.getElementById('searchInput').addEventListener('input', function(e) {
  const q = e.target.value.trim().toLowerCase();
  if (!q) {
    document.querySelectorAll('.sector-item').forEach(el => el.style.display = '');
    return;
  }
  // Search nodes
  document.querySelectorAll('.sector-item').forEach(el => {
    const name = el.dataset.node.toLowerCase();
    el.style.display = name.includes(q) ? '' : 'none';
  });
  // Try to find company
  for (const [sector, companies] of Object.entries(DATA.nodeCompanyMap)) {
    const match = companies.find(c => c.name.toLowerCase().includes(q) || c.ticker.includes(q));
    if (match) {
      selectNode(sector);
      setTimeout(() => selectCompany(match.ticker), 100);
      break;
    }
  }
});

// ===== INIT =====
renderMacro();
renderSectorList();
renderBomTabs();
renderNews();
renderPrices();
</script>
</body>
</html>
