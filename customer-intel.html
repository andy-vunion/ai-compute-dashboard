<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客户情报看板 v1</title>
<style>
:root {
  --bg: #0f1117; --card: #1a1d2e; --border: #2a2f45;
  --text: #e0e4f0; --muted: #7b8299; --blue: #3b82f6;
  --green: #10b981; --red: #ef4444; --yellow: #f59e0b; --purple: #8b5cf6;
  --radius: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system,'PingFang SC',sans-serif; background:var(--bg); color:var(--text); line-height:1.5; }
.header { padding:16px 20px; background:var(--card); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:16px; }
.header h1 { font-size:18px; background:linear-gradient(135deg,var(--blue),var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.header .meta { font-size:12px; color:var(--muted); margin-left:auto; }
.dashboard { display:flex; height:calc(100vh - 57px); }
.main { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:14px; }
.right { width:360px; border-left:1px solid var(--border); overflow-y:auto; background:var(--card); }

/* Stats row */
.stats-row { display:flex; gap:10px; flex-wrap:wrap; }
.stat-card { flex:1 1 140px; background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:12px 14px; min-width:130px; }
.stat-card .label { font-size:11px; color:var(--muted); }
.stat-card .value { font-size:20px; font-weight:700; margin-top:2px; }
.stat-card .sub { font-size:10px; color:var(--muted); margin-top:2px; }

/* Customer table */
.customer-table { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.table-header { padding:10px 14px; font-weight:600; font-size:13px; border-bottom:1px solid var(--border); display:flex; gap:12px; align-items:center; }
.table-header input { flex:1; padding:6px 10px; border-radius:6px; background:var(--bg); border:1px solid var(--border); color:var(--text); font-size:12px; outline:none; }
.table-header input:focus { border-color:var(--blue); }
.table-wrap { overflow-x:auto; max-height:400px; overflow-y:auto; }
table { width:100%; border-collapse:collapse; font-size:11px; }
th { text-align:left; padding:7px 10px; color:var(--muted); font-weight:500; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--card); z-index:1; cursor:pointer; }
th:hover { color:var(--text); }
td { padding:7px 10px; border-bottom:1px solid rgba(255,255,255,0.03); }
tr:hover td { background:rgba(255,255,255,0.02); cursor:pointer; }
tr.selected td { background:rgba(59,130,246,0.1); }
.tag { font-size:9px; padding:2px 6px; border-radius:8px; white-space:nowrap; }
.tag-a { background:rgba(16,185,129,0.12); color:var(--green); }
.tag-b { background:rgba(59,130,246,0.12); color:var(--blue); }
.tag-c { background:rgba(139,92,246,0.12); color:var(--purple); }
.score-bar { width:40px; height:4px; background:rgba(255,255,255,0.05); border-radius:2px; overflow:hidden; display:inline-block; vertical-align:middle; margin-right:4px; }
.score-bar .fill { height:100%; border-radius:2px; }
.rev { font-family:'SF Mono',Consolas,monospace; text-align:right; }
.rev-up { color:var(--green); }
.rev-down { color:var(--red); }

/* Detail panel */
.detail-panel { padding:14px; }
.detail-panel h3 { font-size:15px; margin-bottom:8px; display:flex; align-items:center; gap:8px; }
.detail-section { margin-bottom:14px; }
.detail-section .s-title { font-size:11px; color:var(--muted); margin-bottom:4px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
.detail-section .s-text { font-size:12px; color:var(--text); line-height:1.6; }
.empty-state { padding:40px; text-align:center; color:var(--muted); font-size:13px; }

/* Tracking list */
.tracking-list { padding:14px; }
.tracking-item { padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.04); font-size:11px; }
.tracking-item .t-week { color:var(--muted); font-size:10px; }
.tracking-item .t-type { font-size:9px; padding:1px 5px; border-radius:6px; margin-right:6px; }
.t-type-机会 { background:rgba(16,185,129,0.15); color:var(--green); }
.t-type-风险 { background:rgba(239,68,68,0.15); color:var(--red); }
.t-type-动态 { background:rgba(59,130,246,0.15); color:var(--blue); }
.t-type-none { background:rgba(255,255,255,0.05); color:var(--muted); }

.scrollbar::-webkit-scrollbar { width:4px; }
.scrollbar::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>
<div class="header">
  <h1>📊 客户情报看板</h1>
  <div class="meta"><span id="updateTime"></span></div>
</div>
<div class="dashboard">
<div class="main scrollbar">
  <div class="stats-row" id="statsRow"></div>
  <div class="customer-table">
    <div class="table-header">
      核心客户
      <input type="text" id="searchInput" placeholder="搜索客户..." />
      <span style="font-size:11px;color:var(--muted)" id="rowCount"></span>
    </div>
    <div class="table-wrap scrollbar">
      <table><thead><tr>
        <th data-sort="name">客户</th><th data-sort="group">分组</th><th data-sort="score">战略分</th>
        <th data-sort="rev">累计收入</th><th data-sort="ytd">年累计</th><th data-sort="margin">毛利率</th>
      </tr></thead><tbody id="custBody"></tbody></table>
    </div>
  </div>
</div>
<div class="right scrollbar" id="detailPanel">
  <div class="empty-state">← 点击客户查看详情</div>
</div>
</div>

const fmt = n => typeof n === 'number' ? parseFloat(n.toFixed(2)) : n;
const fmtRev = n => n >= 1e8 ? (n/1e8).toFixed(1)+'亿' : n >= 1e4 ? (n/1e4).toFixed(0)+'万' : fmt(n);

let sortCol = 'score', sortDir = -1, selected = null;

function init() {
  document.getElementById('updateTime').textContent = '更新: 2026-06-03';
  renderStats();
  renderTable();
  document.getElementById('searchInput').addEventListener('input', renderTable);
  document.querySelectorAll('th[data-sort]').forEach(th => {
    th.addEventListener('click', () => { sortCol = th.dataset.sort; sortDir *= -1; renderTable(); });
  });
}

function renderStats() {
  const cs = DATA.customers;
  const totalRev = cs.reduce((s,c) => s + (DATA.sales_stats[c.name]?.total_rev||0), 0);
  const ytdRev = cs.reduce((s,c) => s + (DATA.sales_stats[c.name]?.ytd_rev||0), 0);
  const avgScore = cs.reduce((s,c) => s + (c.strat_score||0), 0) / cs.length;
  const signals = DATA.tracking.filter(t => t.type !== 'none').length;
  document.getElementById('statsRow').innerHTML = [
    {label:'核心客户', value:cs.length, sub:'家', color:'var(--blue)'},
    {label:'累计收入', value:fmtRev(totalRev), sub:'历史总计', color:'var(--green)'},
    {label:'年累计', value:fmtRev(ytdRev), sub:'2026', color:'var(--purple)'},
    {label:'平均战略分', value:fmt(avgScore), sub:'/10', color:'var(--yellow)'},
    {label:'本周信号', value:signals, sub:'条', color:'var(--red)'},
  ].map(c => `<div class="stat-card"><div class="label">${c.label}</div><div class="value" style="color:${c.color}">${c.value}</div><div class="sub">${c.sub}</div></div>`).join('');
}

function renderTable() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  let cs = DATA.customers.filter(c => !q || c.name.toLowerCase().includes(q));
  
  cs.sort((a,b) => {
    let va, vb;
    switch(sortCol) {
      case 'name': va=a.name; vb=b.name; break;
      case 'group': va=a.group_tag||''; vb=b.group_tag||''; break;
      case 'score': va=a.strat_score||0; vb=b.strat_score||0; break;
      case 'rev': va=DATA.sales_stats[a.name]?.total_rev||0; vb=DATA.sales_stats[b.name]?.total_rev||0; break;
      case 'ytd': va=DATA.sales_stats[a.name]?.ytd_rev||0; vb=DATA.sales_stats[b.name]?.ytd_rev||0; break;
      case 'margin': va=DATA.sales_stats[a.name]?.avg_margin||0; vb=DATA.sales_stats[b.name]?.avg_margin||0; break;
      default: va=0; vb=0;
    }
    return typeof va === 'string' ? va.localeCompare(vb) * sortDir : (va - vb) * sortDir;
  });

  document.getElementById('rowCount').textContent = `${cs.length} 家`;
  document.getElementById('custBody').innerHTML = cs.map(c => {
    const s = DATA.sales_stats[c.name] || {};
    const sc = c.strat_score || 0;
    const scColor = sc >= 8 ? 'var(--green)' : sc >= 5 ? 'var(--blue)' : 'var(--yellow)';
    const tagClass = c.group_tag === 'A' ? 'tag-a' : c.group_tag === 'B' ? 'tag-b' : 'tag-c';
    return `<tr class="${selected===c.id?'selected':''}" onclick="selectCustomer(${c.id})">
      <td><strong>${c.name}</strong></td>
      <td><span class="tag ${tagClass}">${c.group_tag||'-'}</span></td>
      <td><span class="score-bar"><span class="fill" style="width:${sc*10}%;background:${scColor}"></span></span>${sc}</td>
      <td class="rev">${fmtRev(s.total_rev||0)}</td>
      <td class="rev ${(s.ytd_rev||0)>1e6?'rev-up':''}">${fmtRev(s.ytd_rev||0)}</td>
      <td>${fmt(s.avg_margin||0)}%</td>
    </tr>`;
  }).join('');
}

function selectCustomer(id) {
  selected = id;
  renderTable();
  const c = DATA.customers.find(x => x.id === id);
  if (!c) return;
  const s = DATA.sales_stats[c.name] || {};
  const ct = DATA.tracking.filter(t => t.customer === c.name).slice(0, 8);
  document.getElementById('detailPanel').innerHTML = `
    <div class="detail-panel">
      <h3>${c.name} <span class="tag ${c.group_tag==='A'?'tag-a':c.group_tag==='B'?'tag-b':'tag-c'}">${c.group_tag||'-'}</span></h3>
      <div class="detail-section"><div class="s-title">行业</div><div class="s-text">${c.industry||'-'}</div></div>
      <div class="detail-section"><div class="s-title">合作历史</div><div class="s-text">${c.coop_history||'-'}</div></div>
      <div class="detail-section"><div class="s-title">备注</div><div class="s-text">${c.notes||'-'}</div></div>
      <div class="detail-section"><div class="s-title">监控关键词</div><div class="s-text">${c.monitor_keywords||'-'}</div></div>
      <div class="detail-section">
        <div class="s-title">财务数据</div>
        <div class="s-text">
          累计收入: ${fmtRev(s.total_rev||0)} · 年累计: ${fmtRev(s.ytd_rev||0)}<br>
          订单数: ${s.orders||0} · 毛利率: ${fmt(s.avg_margin||0)}%
        </div>
      </div>
      ${ct.length > 0 ? `
      <div class="detail-section">
        <div class="s-title">最近情报信号</div>
        <div class="tracking-list">${ct.map(t => `
          <div class="tracking-item">
            <span class="t-week">${t.week}</span>
            <span class="t-type t-type-${t.type}">${t.type==='none'?'无':t.type}</span>
            ${t.summary}<br><span style="color:var(--muted);font-size:10px">${t.source||''} ${t.trend||''}</span>
          </div>`).join('')}</div>
      </div>` : ''}
      <div class="detail-section">
        <div class="s-title">战略评分</div>
        <div class="s-text" style="font-size:24px;font-weight:700;color:${(c.strat_score||0)>=8?'var(--green)':(c.strat_score||0)>=5?'var(--blue)':'var(--yellow)'}">${c.strat_score}/10</div>
      </div>
    </div>`;
}

init();
</script>
