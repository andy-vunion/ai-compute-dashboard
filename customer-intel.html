<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客户情报追踪看板 v1</title>
<style>
:root {
  --bg: #0f1117; --card: #1a1d2e; --border: #2a2f45;
  --text: #e0e4f0; --muted: #7b8299; --blue: #3b82f6;
  --green: #10b981; --red: #ef4444; --yellow: #f59e0b; --purple: #8b5cf6; --cyan: #06b6d4;
  --radius: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system,'PingFang SC',sans-serif; background:var(--bg); color:var(--text); line-height:1.5; }
.dashboard { display:flex; height:100vh; }
.sidebar { width:300px; background:var(--card); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
.sidebar-header { padding:14px; border-bottom:1px solid var(--border); }
.sidebar-header h1 { font-size:16px; background:linear-gradient(135deg,var(--cyan),var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.sidebar-header .sub { font-size:11px; color:var(--muted); margin-top:2px; }
.sidebar-search { padding:10px 14px; border-bottom:1px solid var(--border); }
.sidebar-search input { width:100%; padding:7px 10px; border-radius:6px; background:var(--bg); border:1px solid var(--border); color:var(--text); font-size:12px; outline:none; }
.sidebar-search input:focus { border-color:var(--blue); }
.cust-list { flex:1; overflow-y:auto; }
.cust-item { padding:10px 14px; border-bottom:1px solid rgba(255,255,255,0.03); cursor:pointer; transition:all 0.15s; display:flex; align-items:center; gap:10px; }
.cust-item:hover { background:rgba(255,255,255,0.03); }
.cust-item.active { background:rgba(59,130,246,0.1); border-left:2px solid var(--blue); }
.cust-item .c-name { font-size:13px; font-weight:500; flex:1; }
.cust-item .c-tag { font-size:9px; padding:2px 6px; border-radius:6px; white-space:nowrap; }
.tag-a { background:rgba(16,185,129,0.15); color:var(--green); }
.tag-b { background:rgba(59,130,246,0.15); color:var(--blue); }
.tag-c { background:rgba(139,92,246,0.15); color:var(--purple); }
.cust-item .c-score { font-size:11px; font-weight:600; }
.cust-item .c-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }

.main { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:16px; }
.empty-state { display:flex; align-items:center; justify-content:center; height:100%; color:var(--muted); font-size:14px; }

/* Detail header */
.detail-header { display:flex; align-items:center; gap:12px; }
.detail-header h2 { font-size:20px; }
.detail-header .ind-badge { font-size:10px; padding:2px 8px; border-radius:8px; background:rgba(6,182,212,0.12); color:var(--cyan); border:1px solid rgba(6,182,212,0.2); }
.detail-header .s-score { margin-left:auto; font-size:24px; font-weight:700; }
.detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

/* Info cards */
.info-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:14px; }
.info-card h4 { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; }
.info-card .text { font-size:12px; line-height:1.7; color:var(--text); }
.info-card .text .hl { color:var(--cyan); font-weight:600; }

/* Signals */
.signal-timeline { display:flex; flex-direction:column; gap:8px; }
.signal-item { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:12px 14px; display:flex; gap:12px; }
.signal-dot { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
.signal-dot.机会 { background:rgba(16,185,129,0.15); border:1px solid rgba(16,185,129,0.3); }
.signal-dot.风险 { background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.3); }
.signal-dot.动态 { background:rgba(59,130,246,0.15); border:1px solid rgba(59,130,246,0.3); }
.signal-dot.none { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); }
.signal-body { flex:1; }
.signal-body .s-week { font-size:10px; color:var(--muted); }
.signal-body .s-summary { font-size:12px; margin-top:2px; }
.signal-body .s-source { font-size:10px; color:var(--muted); margin-top:2px; }

/* Keywords tag cloud */
.tag-cloud { display:flex; flex-wrap:wrap; gap:6px; }
.kw-tag { font-size:10px; padding:3px 10px; border-radius:12px; background:rgba(139,92,246,0.1); color:var(--purple); border:1px solid rgba(139,92,246,0.2); }

/* Score bars */
.score-section { display:flex; gap:20px; align-items:center; }
.score-circle { width:60px; height:60px; border-radius:50%; border:3px solid; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:700; flex-shrink:0; }

.scrollbar::-webkit-scrollbar { width:4px; }
.scrollbar::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

/* Filters */
.filter-row { display:flex; gap:8px; padding:8px 14px; border-bottom:1px solid var(--border); }
.filter-btn { font-size:10px; padding:3px 8px; border-radius:6px; background:var(--bg); border:1px solid var(--border); color:var(--muted); cursor:pointer; }
.filter-btn.active { background:rgba(59,130,246,0.15); color:var(--blue); border-color:rgba(59,130,246,0.3); }
</style>
</head>
<body>
<div class="dashboard">
<div class="sidebar scrollbar">
  <div class="sidebar-header">
    <h1>🔍 客户情报追踪</h1>
    <div class="sub">22家核心客户 · 45条情报信号</div>
  </div>
  <div class="sidebar-search"><input type="text" id="searchInput" placeholder="搜索客户..." /></div>
  <div class="filter-row" id="filterRow">
    <span class="filter-btn active" data-tag="all">全部</span>
    <span class="filter-btn" data-tag="A">A组</span>
    <span class="filter-btn" data-tag="B">B组</span>
    <span class="filter-btn" data-tag="C">C组</span>
  </div>
  <div class="cust-list scrollbar" id="custList"></div>
</div>
<div class="main scrollbar" id="mainPanel">
  <div class="empty-state">← 选择客户查看情报详情</div>
</div>
</div>

const fmt = n => typeof n === 'number' ? parseFloat(n.toFixed(1)) : n;

let customers = DATA.customers;
let tracking = DATA.tracking;
let selectedId = null;
let activeTag = 'all';

function init() {
  document.getElementById('searchInput').addEventListener('input', renderList);
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeTag = btn.dataset.tag;
      renderList();
    });
  });
  renderList();
  if (customers.length > 0) selectCustomer(customers[0].id);
}

function renderList() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  let cs = customers.filter(c => {
    if (activeTag !== 'all' && c.group_tag !== activeTag) return false;
    if (q && !c.name.toLowerCase().includes(q) && !(c.industry||'').toLowerCase().includes(q)) return false;
    return true;
  });
  
  document.getElementById('custList').innerHTML = cs.map(c => {
    const ct = tracking.filter(t => t.customer === c.name);
    const latestSignal = ct.length > 0 ? ct[0] : null;
    const hasAlert = ct.some(t => t.type === '风险' || t.alert);
    const dotColor = hasAlert ? 'var(--red)' : latestSignal && latestSignal.type === '机会' ? 'var(--green)' : latestSignal && latestSignal.type === '动态' ? 'var(--blue)' : 'var(--muted)';
    const sc = c.strat_score || 0;
    const scColor = sc >= 8 ? 'var(--green)' : sc >= 5 ? 'var(--blue)' : 'var(--yellow)';
    const tagClass = c.group_tag === 'A' ? 'tag-a' : c.group_tag === 'B' ? 'tag-b' : 'tag-c';
    return `<div class="cust-item ${selectedId===c.id?'active':''}" onclick="selectCustomer(${c.id})">
      <span class="c-dot" style="background:${dotColor}"></span>
      <span class="c-name">${c.name}</span>
      <span class="c-tag ${tagClass}">${c.group_tag||'-'}</span>
      <span class="c-score" style="color:${scColor}">${sc}</span>
    </div>`;
  }).join('');
}

function selectCustomer(id) {
  selectedId = id;
  renderList();
  const c = customers.find(x => x.id === id);
  if (!c) return;
  const ct = tracking.filter(t => t.customer === c.name);
  const sc = c.strat_score || 0;
  const scColor = sc >= 8 ? 'var(--green)' : sc >= 5 ? 'var(--blue)' : 'var(--yellow)';
  const kws = (c.monitor_keywords || '').split(/[\s,，]+/).filter(x => x);
  
  document.getElementById('mainPanel').innerHTML = `
    <div class="detail-header">
      <h2>${c.name}</h2>
      <span class="ind-badge">${c.industry||'未分类'}</span>
      <span class="s-score" style="color:${scColor}">${sc}</span>
    </div>
    <div class="detail-grid">
      <div class="info-card" style="grid-column:1/-1">
        <h4>公司概况</h4>
        <div class="text">${c.company_profile||'暂无'}</div>
      </div>
      <div class="info-card">
        <h4>主营产品</h4>
        <div class="text">${c.main_products||'暂无'}</div>
      </div>
      <div class="info-card">
        <h4>市场地位</h4>
        <div class="text">${c.market_position||'暂无'}</div>
      </div>
      <div class="info-card">
        <h4>供应链关系</h4>
        <div class="text">${c.supply_chain||'暂无'}</div>
      </div>
      <div class="info-card">
        <h4>竞对格局</h4>
        <div class="text">${c.competitors||'暂无'}</div>
      </div>
      <div class="info-card">
        <h4>合作历史</h4>
        <div class="text">${c.coop_history||'暂无'}</div>
      </div>
      <div class="info-card">
        <h4>关键联系人</h4>
        <div class="text">${c.org_key_people||'待补充'}</div>
      </div>
      <div class="info-card">
        <h4>战略评分</h4>
        <div class="score-section">
          <div class="score-circle" style="border-color:${scColor};color:${scColor}">${sc}</div>
          <div class="text">${c.notes||'暂无评估'}</div>
        </div>
      </div>
      <div class="info-card" style="grid-column:1/-1">
        <h4>监控关键词</h4>
        <div class="tag-cloud">${kws.map(k => `<span class="kw-tag">${k}</span>`).join('')||'<span style="font-size:12px;color:var(--muted)">暂无</span>'}</div>
      </div>
    </div>
    <div class="info-card">
      <h4>情报信号 (${ct.length}条)</h4>
      <div class="signal-timeline">
        ${ct.length === 0 ? '<div style="color:var(--muted);font-size:12px;padding:16px;text-align:center">暂无情报信号</div>' : ct.map(t => `
          <div class="signal-item">
            <div class="signal-dot ${t.type}">${t.type==='机会'?'📈':t.type==='风险'?'⚠️':t.type==='动态'?'📡':'—'}</div>
            <div class="signal-body">
              <div class="s-week">${t.week} · <span style="color:var(--muted)">${t.type}</span> ${t.trend||''}</div>
              <div class="s-summary">${t.summary}</div>
              ${t.source ? `<div class="s-source">来源: ${t.source}</div>` : ''}
            </div>
          </div>
        `).join('')}
      </div>
    </div>`;
}

init();
</script>
